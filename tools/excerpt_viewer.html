<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KR Excerpt Review</title>
<link href="https://fonts.googleapis.com/css2?family=Amiri:ital,wght@0,400;0,700;1,400&family=Noto+Naskh+Arabic:wght@400;700&family=Outfit:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0E0D12;
  --surface: #17161D;
  --surface2: #1F1E27;
  --surface3: #282733;
  --card: #1C1B24;
  --text: #E3DDD5;
  --text2: #8B8598;
  --text3: #5E586B;
  --gold: #C9A96E;
  --gold-soft: rgba(201,169,110,0.15);
  --gold-dim: rgba(201,169,110,0.06);
  --accent: #7FA8D2;
  --accent-soft: rgba(127,168,210,0.12);
  --green: #6BAF7B;
  --green-soft: rgba(107,175,123,0.12);
  --amber: #CFA24E;
  --amber-soft: rgba(207,162,78,0.12);
  --red: #BF6B6B;
  --red-soft: rgba(191,107,107,0.12);
  --border: #252430;
  --border2: #32303F;
  --font-ar: "Amiri", "Noto Naskh Arabic", serif;
  --font-ui: "Outfit", system-ui, sans-serif;
  --font-mono: "IBM Plex Mono", monospace;
  --radius: 8px;
  --radius-sm: 5px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{font-size:15px}
body{font-family:var(--font-ui);background:var(--bg);color:var(--text);line-height:1.5;height:100vh;overflow:hidden}

/* ── Package Picker ─────────── */
#pkg-picker{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;gap:1.2rem;background:radial-gradient(ellipse at 50% 40%, rgba(201,169,110,0.04) 0%, transparent 70%)}
.picker-mark{font-family:var(--font-ar);font-size:3rem;color:var(--gold);opacity:0.7;line-height:1}
#pkg-picker h1{font-size:1.3rem;font-weight:300;letter-spacing:0.08em;color:var(--text)}
#pkg-picker h1 span{color:var(--gold);font-weight:600}
#pkg-picker .sub{color:var(--text2);font-size:0.82rem;letter-spacing:0.02em}
#pkg-list{display:flex;flex-wrap:wrap;gap:0.7rem;justify-content:center;max-width:720px;margin-top:0.5rem}
.pkg-card{padding:0.9rem 1.3rem;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);cursor:pointer;transition:all .2s;min-width:150px}
.pkg-card:hover{border-color:var(--gold);background:var(--surface2);transform:translateY(-2px);box-shadow:0 4px 16px rgba(0,0,0,0.3)}
.pkg-card .n{font-weight:500;font-size:0.9rem}.pkg-card .m{font-size:0.75rem;color:var(--text2);margin-top:0.25rem}
.pkg-card .m b{color:var(--gold)}
.pkg-card.empty{opacity:0.25;cursor:default;pointer-events:none}
#load-error{color:var(--red);font-size:0.8rem;padding:0.5rem;display:none}

/* ── Three-Column Layout ────── */
#viewer{display:none;height:100vh;grid-template-columns:250px minmax(0,1fr) clamp(400px,31vw,480px);grid-template-rows:44px 1fr;overflow:hidden}
#viewer.active{display:grid}

/* ── Top Bar ────────────────── */
#topbar{grid-column:1/-1;display:flex;align-items:center;justify-content:space-between;padding:0 1rem;background:var(--surface);border-bottom:1px solid var(--border);z-index:10}
.nav{display:flex;align-items:center;gap:0.4rem}
.nbtn{background:none;border:1px solid var(--border);border-radius:4px;padding:0.2rem 0.55rem;color:var(--text2);cursor:pointer;font-family:var(--font-ui);font-size:0.8rem;transition:all .15s}
.nbtn:hover{border-color:var(--gold);color:var(--text)}
.nbtn:disabled{opacity:0.15;cursor:default;pointer-events:none}
#pos{font-size:0.78rem;color:var(--text2);margin:0 0.5rem;font-family:var(--font-mono)}
#pkg-label{font-size:0.82rem;color:var(--gold);font-weight:500;cursor:pointer;letter-spacing:0.01em}
#pkg-label:hover{text-decoration:underline}
.tbar-r{display:flex;gap:0.3rem;align-items:center}
.tbtn{background:none;border:none;color:var(--text2);cursor:pointer;font-size:0.75rem;padding:0.3rem 0.5rem;border-radius:4px;font-family:var(--font-ui)}
.tbtn:hover{background:var(--surface2);color:var(--text)}

/* ── Left Panel ─────────────── */
#left-wrap{grid-column:1;display:flex;flex-direction:column;background:var(--surface);border-right:1px solid var(--border);overflow:hidden}
.filter-bar{display:flex;gap:2px;padding:0.4rem 0.5rem;border-bottom:1px solid var(--border);flex-shrink:0}
.fbtn{flex:1;padding:0.25rem 0;border:none;border-radius:4px;background:transparent;color:var(--text3);cursor:pointer;font-family:var(--font-ui);font-size:0.68rem;font-weight:500;letter-spacing:0.04em;text-transform:uppercase;transition:all .1s}
.fbtn:hover{color:var(--text2);background:var(--surface2)}
.fbtn.active{color:var(--gold);background:var(--gold-dim)}
#left{flex:1;overflow-y:auto;padding:0.4rem}
#left::-webkit-scrollbar{width:4px}#left::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}
.exc-item{padding:0.5rem 0.6rem;border-radius:6px;cursor:pointer;margin-bottom:2px;transition:background .1s;position:relative}
.exc-item:hover{background:var(--surface2)}
.exc-item.active{background:var(--gold-dim);border-left:2px solid var(--gold)}
.exc-item .top-row{display:flex;align-items:center;gap:0.3rem}
.exc-item .idx{font-size:0.62rem;color:var(--text3);font-family:var(--font-mono)}
.exc-item .fn{font-size:0.65rem;padding:0.08rem 0.3rem;border-radius:3px;background:var(--surface3);color:var(--accent);display:inline-block}
.exc-item .verdict-dot{width:7px;height:7px;border-radius:50%;margin-left:auto;flex-shrink:0}
.exc-item .snip{font-size:0.82rem;font-family:var(--font-ar);direction:rtl;color:var(--text);margin-top:0.2rem;line-height:1.5;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:220px}
.exc-item .badges{display:flex;gap:0.3rem;margin-top:0.2rem;align-items:center}
.dot{width:6px;height:6px;border-radius:50%;display:inline-block}
.dot-full{background:var(--green)}.dot-partial{background:var(--amber)}.dot-dep{background:var(--red)}
.dot-gate{background:var(--red);box-shadow:0 0 4px var(--red)}
.issue-count{font-size:0.58rem;color:var(--text3);font-family:var(--font-mono);margin-left:auto}

/* ── Center: Reading Zone ───── */
#center{grid-column:2;overflow-y:auto;padding:2rem 2.5rem;background:var(--bg)}
#center::-webkit-scrollbar{width:5px}#center::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}

.doc{background:var(--card);border:1px solid var(--border);border-radius:10px;max-width:700px;margin:0 auto;overflow:hidden;box-shadow:0 6px 32px rgba(0,0,0,0.35)}
.doc-header{padding:1rem 1.5rem;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:flex-start;gap:1rem}
.doc-title{font-family:var(--font-ar);font-size:1.05rem;direction:rtl;color:var(--gold);line-height:1.5;flex:1}
.doc-meta{font-size:0.68rem;color:var(--text3);text-align:right;white-space:nowrap;font-family:var(--font-mono)}

.doc-body{padding:1.5rem 2rem}
.doc-text{font-family:var(--font-ar);font-size:1.45rem;line-height:2.1;direction:rtl;text-align:right;color:var(--text);white-space:pre-wrap;word-wrap:break-word}
.doc-gloss{font-family:var(--font-ar);font-size:0.95rem;direction:rtl;text-align:right;color:var(--text2);margin-top:1rem;padding-top:0.75rem;border-top:1px dashed var(--border);line-height:1.7}

.warn-band{margin:1rem 0 0;padding:0.6rem 0.9rem;border-radius:6px;font-family:var(--font-ar);font-size:0.92rem;direction:rtl;text-align:right;line-height:1.7}
.warn-band.partial{background:var(--amber-soft);border-right:3px solid var(--amber)}
.warn-band.dependent{background:var(--red-soft);border-right:3px solid var(--red)}
.warn-band .wlabel{font-family:var(--font-ui);font-size:0.62rem;text-transform:uppercase;letter-spacing:0.12em;color:var(--text2);direction:ltr;display:block;margin-bottom:0.2rem}
.warn-band .ctx{font-size:0.82rem;color:var(--text2);margin-top:0.3rem;padding-top:0.3rem;border-top:1px dashed var(--border)}

/* Topics inside the document card */
.doc-topics{padding:0.75rem 2rem 0;display:flex;flex-wrap:wrap;gap:0.35rem;direction:rtl}
.topic-chip{display:inline-flex;align-items:center;padding:0.2rem 0.6rem;border-radius:12px;font-size:0.72rem;font-weight:500;background:var(--gold-soft);color:var(--gold);border:1px solid rgba(201,169,110,0.2);font-family:var(--font-ui)}

.doc-footer{padding:0.7rem 1.5rem;border-top:1px solid var(--border);display:flex;flex-wrap:wrap;gap:0.4rem;align-items:center;margin-top:0.75rem}
.chip{display:inline-flex;align-items:center;padding:0.15rem 0.5rem;border-radius:4px;font-size:0.7rem;font-weight:500;gap:0.25rem}
.chip-fn{background:var(--accent-soft);color:var(--accent)}
.chip-full{background:var(--green-soft);color:var(--green)}
.chip-partial{background:var(--amber-soft);color:var(--amber)}
.chip-dependent{background:var(--red-soft);color:var(--red)}
.chip-school{background:var(--gold-dim);color:var(--text2);border:1px solid var(--border)}

/* Sections below the doc */
.section{margin-top:0.8rem;max-width:700px;margin-left:auto;margin-right:auto}
.sec-title{font-size:0.62rem;text-transform:uppercase;letter-spacing:0.12em;color:var(--text3);margin-bottom:0.35rem;display:flex;align-items:center;gap:0.4rem;cursor:pointer;padding:0.3rem 0;font-weight:600;transition:color .1s}
.sec-title:hover{color:var(--text2)}
.sec-title .arrow{font-size:0.55rem;transition:transform .15s}.sec-title .arrow.open{transform:rotate(90deg)}
.sec-body{display:none;padding:0.3rem 0 0.5rem;font-size:0.82rem;color:var(--text)}.sec-body.open{display:block}
.stbl{width:100%;border-collapse:collapse;font-size:0.8rem}
.stbl th{text-align:left;font-size:0.62rem;text-transform:uppercase;letter-spacing:.08em;color:var(--text3);padding:0.25rem 0.5rem;border-bottom:1px solid var(--border);font-weight:500}
.stbl td{padding:0.3rem 0.5rem;border-bottom:1px solid var(--border);vertical-align:top}
.stbl .ar{font-family:var(--font-ar);direction:rtl}
.muted{color:var(--text3);font-style:italic;font-size:0.8rem}

/* ── Right Panel ────────────── */
#right{grid-column:3;overflow-y:auto;background:var(--surface);border-left:1px solid var(--border);display:flex;flex-direction:column}
#right::-webkit-scrollbar{width:4px}#right::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}

/* ── Review Zone (TOP of right panel) ── */
.review-zone{padding:1.1rem 1.25rem 1.2rem;border-bottom:1px solid var(--border2);background:linear-gradient(180deg, var(--surface2) 0%, var(--surface) 100%)}
.review-header{font-size:0.65rem;text-transform:uppercase;letter-spacing:0.15em;color:var(--gold);margin-bottom:0.7rem;font-weight:600;display:flex;align-items:center;justify-content:space-between}
.review-header .progress-text{font-size:0.62rem;color:var(--text3);font-weight:400;letter-spacing:0}

/* Verdict buttons */
.verdict-row{display:flex;gap:0.4rem;margin-bottom:0.7rem}
.vbtn{flex:1;padding:0.55rem 0.3rem;border:1px solid var(--border2);border-radius:var(--radius);background:transparent;color:var(--text2);cursor:pointer;font-family:var(--font-ui);font-size:0.72rem;transition:all .15s;text-align:center;display:flex;flex-direction:column;align-items:center;gap:0.15rem;line-height:1.2}
.vbtn .v-icon{font-size:1rem}
.vbtn .v-key{font-size:0.55rem;color:var(--text3);font-family:var(--font-mono);margin-top:0.1rem}
.vbtn:hover{border-color:var(--text3);background:var(--surface3)}
.vbtn.sel-accept{border-color:var(--green);color:var(--green);background:var(--green-soft)}
.vbtn.sel-needs_work{border-color:var(--amber);color:var(--amber);background:var(--amber-soft)}
.vbtn.sel-reject{border-color:var(--red);color:var(--red);background:var(--red-soft)}

/* Issue tags */
.issues-label{font-size:0.6rem;text-transform:uppercase;letter-spacing:0.1em;color:var(--text3);margin-bottom:0.35rem;font-weight:500}
.issues-row{display:flex;flex-wrap:wrap;gap:0.3rem;margin-bottom:0.7rem}
.issue-tag{padding:0.22rem 0.55rem;border:1px solid var(--border2);border-radius:12px;background:transparent;color:var(--text3);cursor:pointer;font-family:var(--font-ui);font-size:0.65rem;transition:all .12s;font-weight:500}
.issue-tag:hover{border-color:var(--text2);color:var(--text2)}
.issue-tag.selected{border-color:var(--amber);color:var(--amber);background:var(--amber-soft)}

/* Comment textarea */
#comment{width:100%;min-height:220px;max-height:45vh;padding:0.85rem 0.95rem;border:1px solid var(--border2);border-radius:var(--radius);background:var(--bg);color:var(--text);font-family:var(--font-ui);font-size:0.9rem;resize:vertical;line-height:1.6;transition:border-color .15s}
#comment:focus{outline:none;border-color:var(--gold);box-shadow:0 0 0 2px var(--gold-dim)}
#comment::placeholder{color:var(--text3);font-style:italic}

/* Save row */
.save-row{display:flex;justify-content:space-between;align-items:center;margin-top:0.6rem;gap:0.5rem}
#save-btn{padding:0.45rem 1.2rem;background:var(--surface3);color:var(--text2);border:1px solid var(--border2);border-radius:var(--radius-sm);cursor:pointer;font-size:0.8rem;font-family:var(--font-ui);font-weight:500;transition:all .15s;flex-shrink:0}
#save-btn:hover{opacity:0.85}
#save-btn.has-review{background:var(--gold);color:#111;border-color:var(--gold)}
.progress-wrap{flex:1;display:flex;flex-direction:column;align-items:flex-end;gap:0.2rem}
.progress-bar{width:100%;max-width:120px;height:3px;background:var(--border);border-radius:2px;overflow:hidden}
.progress-fill{height:100%;background:var(--gold);border-radius:2px;transition:width .3s}
#progress{font-size:0.62rem;color:var(--text3);font-family:var(--font-mono)}

/* ── Diagnostics (collapsed by default) ── */
.diag-section{border-bottom:1px solid var(--border)}
.diag-header{font-size:0.6rem;text-transform:uppercase;letter-spacing:0.12em;color:var(--text3);padding:0.55rem 1.1rem;cursor:pointer;display:flex;align-items:center;gap:0.4rem;transition:color .1s;font-weight:500}
.diag-header:hover{color:var(--text2)}
.diag-header .arrow{font-size:0.5rem;transition:transform .15s}.diag-header .arrow.open{transform:rotate(90deg)}
.diag-body{display:none;padding:0 1.1rem 0.6rem}
.diag-body.open{display:block}

.rrow{display:flex;gap:0.4rem;margin-bottom:0.15rem;font-size:0.76rem;flex-wrap:wrap}
.rlabel{color:var(--text3);min-width:72px;flex-shrink:0;font-size:0.68rem;font-weight:500}
.rval{color:var(--text2);word-break:break-all;font-size:0.76rem}
.ctbl{width:100%;border-collapse:collapse;font-size:0.68rem;margin-top:0.2rem}
.ctbl th{text-align:left;font-size:0.58rem;color:var(--text3);padding:0.15rem 0.3rem;border-bottom:1px solid var(--border);font-weight:500}
.ctbl td{padding:0.15rem 0.3rem;border-bottom:1px solid var(--border);color:var(--text2)}
.flag{display:inline-block;padding:0.1rem 0.4rem;border-radius:3px;font-size:0.68rem;font-weight:500;margin:0.1rem}
.flag-gate{background:var(--red-soft);color:var(--red)}
.flag-review{background:var(--amber-soft);color:var(--amber)}

/* ── Shortcuts Modal ────────── */
#shortcuts{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.55);z-index:200;align-items:center;justify-content:center;backdrop-filter:blur(2px)}
#shortcuts.open{display:flex}
#shortcuts .modal{background:var(--surface);border:1px solid var(--border2);border-radius:12px;padding:1.5rem 2rem;max-width:340px;box-shadow:0 12px 48px rgba(0,0,0,0.5)}
#shortcuts h3{font-size:0.95rem;font-weight:400;margin-bottom:0.6rem;color:var(--gold)}
.krow{display:flex;justify-content:space-between;padding:0.2rem 0;font-size:0.78rem;color:var(--text2)}
.krow kbd{background:var(--surface3);border:1px solid var(--border2);border-radius:3px;padding:0.05rem 0.4rem;font-family:var(--font-mono);font-size:0.68rem;color:var(--text)}
.ksep{height:1px;background:var(--border);margin:0.35rem 0}

/* ── Animations ─────────────── */
@keyframes fadeIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}
.doc{animation:fadeIn .2s ease-out}
</style>
</head>
<body>

<div id="pkg-picker">
  <div class="picker-mark">خ</div>
  <h1><span>KR</span> Excerpt Review</h1>
  <div class="sub">Select a package to review</div>
  <div id="pkg-list"></div>
  <div id="load-error"></div>
</div>

<div id="viewer">
  <div id="topbar">
    <div class="nav">
      <button class="nbtn" id="prev-btn" title="Previous (←)">&#9664;</button>
      <span id="pos">0/0</span>
      <button class="nbtn" id="next-btn" title="Next (→)">&#9654;</button>
    </div>
    <span id="pkg-label" title="Back to packages"></span>
    <div class="tbar-r">
      <span id="live-dot" style="width:7px;height:7px;border-radius:50%;background:var(--green);display:none" title="Live — polling for new excerpts"></span>
      <button class="tbtn" id="shortcuts-btn" title="Shortcuts (?)">?</button>
    </div>
  </div>
  <div id="left-wrap">
    <div class="filter-bar">
      <button class="fbtn active" data-filter="all">All</button>
      <button class="fbtn" data-filter="unreviewed">Unreviewed</button>
      <button class="fbtn" data-filter="flagged">Flagged</button>
    </div>
    <div id="left"></div>
  </div>
  <div id="center"></div>
  <div id="right"></div>
</div>

<div id="shortcuts">
  <div class="modal">
    <h3>Keyboard Shortcuts</h3>
    <div class="krow"><span>Navigate</span><span><kbd>&larr;</kbd> <kbd>&rarr;</kbd></span></div>
    <div class="krow"><span>First / Last</span><span><kbd>Home</kbd> <kbd>End</kbd></span></div>
    <div class="krow"><span>Go to #</span><span><kbd>g</kbd></span></div>
    <div class="ksep"></div>
    <div class="krow"><span>Accept</span><span><kbd>a</kbd></span></div>
    <div class="krow"><span>Needs Work</span><span><kbd>w</kbd></span></div>
    <div class="krow"><span>Reject</span><span><kbd>r</kbd></span></div>
    <div class="krow"><span>Focus notes</span><span><kbd>n</kbd></span></div>
    <div class="ksep"></div>
    <div class="krow"><span>Save &amp; Next</span><span><kbd>Ctrl+Enter</kbd></span></div>
    <div class="krow"><span>Packages</span><span><kbd>Esc</kbd></span></div>
    <div class="krow"><span>Shortcuts</span><span><kbd>?</kbd></span></div>
    <div style="margin-top:0.8rem;text-align:center"><button class="nbtn" onclick="$('shortcuts').classList.remove('open')">Close</button></div>
  </div>
</div>

<script>
let excerpts=[], currentIndex=0, currentPackage="", feedback={}, pollTimer=null;
let selectedIssues=new Set();
let currentFilter="all";
const $=id=>document.getElementById(id);
const esc=s=>{if(s==null)return"\u2014";const d=document.createElement("div");d.textContent=String(s);return d.innerHTML};
const v=val=>(val===null||val===undefined||val===""?"\u2014":val);

const ISSUE_TAGS=[
  {id:"boundary",label:"Boundaries"},
  {id:"function",label:"Function"},
  {id:"topics",label:"Topics"},
  {id:"school",label:"School"},
  {id:"attribution",label:"Attribution"},
  {id:"containment",label:"Containment"},
  {id:"text_quality",label:"Text Quality"},
  {id:"needs_split",label:"Split"},
  {id:"needs_merge",label:"Merge"},
];

// ── Package Loading ──
async function loadPackages(){
  try{
    const r=await fetch("/api/packages");const pkgs=await r.json();
    if(!pkgs.length){$("pkg-list").innerHTML='<div style="color:var(--text2)">Waiting for excerpts...</div>';setTimeout(loadPackages,5000);return}
    $("pkg-list").innerHTML=pkgs.map(p=>{
      const pct=p.excerpt_count&&p.feedback_count?Math.round(p.feedback_count/p.excerpt_count*100):0;
      return `<div class="pkg-card${p.excerpt_count?'':' empty'}" onclick="${p.excerpt_count?`selectPkg('${p.name}')`:''}"><div class="n">${p.name}</div><div class="m"><b>${p.excerpt_count}</b> excerpts${p.feedback_count?` \xb7 ${p.feedback_count} reviewed (${pct}%)`:''}</div></div>`;
    }).join("");
    setTimeout(loadPackages,10000);
  }catch{setTimeout(loadPackages,3000)}
}

async function selectPkg(pkg){
  currentPackage=pkg;
  try{
    const[er,fr]=await Promise.all([fetch(`/api/excerpts/${pkg}`),fetch(`/api/feedback/${pkg}`)]);
    excerpts=await er.json();feedback=await fr.json();
    if(!excerpts.length){alert("No excerpts yet.");return}
    currentIndex=0;currentFilter="all";
    $("pkg-picker").style.display="none";$("viewer").classList.add("active");$("pkg-label").textContent=pkg;
    document.querySelectorAll(".fbtn").forEach(b=>{b.classList.toggle("active",b.dataset.filter==="all")});
    renderList();render();startPolling();
  }catch(e){alert("Load failed: "+e.message)}
}

function backToPackages(){
  if(pollTimer)clearInterval(pollTimer);
  $("viewer").classList.remove("active");$("pkg-picker").style.display="flex";
  excerpts=[];currentIndex=0;loadPackages();
}

function startPolling(){
  $("live-dot").style.display="inline-block";
  if(pollTimer)clearInterval(pollTimer);
  pollTimer=setInterval(async()=>{
    try{const r=await fetch(`/api/excerpts/${currentPackage}`);const f=await r.json();
      if(f.length>excerpts.length){excerpts=f;renderList();$("pos").textContent=`${currentIndex+1}/${excerpts.length}`}
    }catch{}
  },10000);
}

// ── Filtering ──
function getFilteredIndices(){
  if(currentFilter==="all")return excerpts.map((_,i)=>i);
  if(currentFilter==="unreviewed")return excerpts.map((_,i)=>i).filter(i=>!feedback[excerpts[i].excerpt_id]);
  if(currentFilter==="flagged")return excerpts.map((_,i)=>i).filter(i=>{const ex=excerpts[i];return(ex.gate_flags||[]).length>0||(ex.review_flags||[]).length>0});
  return excerpts.map((_,i)=>i);
}

// ── List Panel ──
function renderList(){
  const indices=getFilteredIndices();
  $("left").innerHTML=indices.map(i=>{
    const ex=excerpts[i];
    const fb=feedback[ex.excerpt_id];
    const sc=ex.self_containment||"FULL";
    const dotCls=sc==="FULL"?"dot-full":sc==="PARTIAL"?"dot-partial":"dot-dep";
    const hasGate=(ex.gate_flags||[]).length>0;
    let verdictDot="";
    if(fb&&fb.verdict){
      const vc=fb.verdict==="accept"?"var(--green)":fb.verdict==="reject"?"var(--red)":"var(--amber)";
      verdictDot=`<span class="verdict-dot" style="background:${vc}"></span>`;
    }
    const issueN=fb&&fb.issues&&fb.issues.length?`<span class="issue-count">${fb.issues.length} issues</span>`:"";
    return `<div class="exc-item${i===currentIndex?' active':''}" data-i="${i}" onclick="go(${i})">
      <div class="top-row"><span class="idx">#${i+1}</span><span class="fn">${ex.primary_function||"?"}</span>${verdictDot}</div>
      <div class="snip">${esc(ex.text_snippet||ex.primary_text?.substring(0,60)||"")}</div>
      <div class="badges"><span class="dot ${dotCls}"></span>${hasGate?'<span class="dot dot-gate"></span>':''}${issueN}</div>
    </div>`;
  }).join("");
  if(!indices.length)$("left").innerHTML=`<div style="padding:1rem;color:var(--text3);text-align:center;font-size:0.8rem">${currentFilter==="unreviewed"?"All reviewed!":"No matches"}</div>`;
}

function go(i){currentIndex=i;render();renderList()}

// ── Center: Reading Zone ──
function render(){
  const ex=excerpts[currentIndex];if(!ex)return;
  $("pos").textContent=`${currentIndex+1}/${excerpts.length}`;
  $("prev-btn").disabled=currentIndex===0;$("next-btn").disabled=currentIndex===excerpts.length-1;

  const divPath=(ex.div_path||[]).join(" \u203A ");
  const pp=ex.physical_pages;
  const pageStr=pp?`Vol ${pp.volume||"?"}, pp ${pp.start_page}${pp.end_page!==pp.start_page?"\u2013"+pp.end_page:""}`:""

  const sc=ex.self_containment||"FULL";
  const scCls=sc==="FULL"?"full":sc==="PARTIAL"?"partial":"dependent";
  let warnHtml="";
  if(sc!=="FULL"){
    const cls=sc==="PARTIAL"?"partial":"dependent";
    warnHtml=`<div class="warn-band ${cls}"><span class="wlabel">${sc}</span>${esc(ex.self_containment_notes||"")}${ex.context_hint?`<div class="ctx">${esc(ex.context_hint)}</div>`:""}</div>`;
  }

  // Topics — embedded in document card
  const topics=(ex.excerpt_topic||[]).map(t=>`<span class="topic-chip">${esc(t)}</span>`).join("");

  // Scholars
  let scholarsHtml="";
  if(ex.quoted_scholars?.length){
    const rows=ex.quoted_scholars.map(s=>`<tr><td class="ar" dir="rtl">${esc(s.mention_text)}</td><td class="ar" dir="rtl">${v(s.resolved_name)}</td><td>${v(s.role)}</td><td>${s.confidence!=null?s.confidence.toFixed(2):"\u2014"}</td></tr>`).join("");
    scholarsHtml=`<table class="stbl"><thead><tr><th>Mention</th><th>Resolved</th><th>Role</th><th>Conf</th></tr></thead><tbody>${rows}</tbody></table>`;
  }

  // Evidence
  const refs=ex.evidence_refs||[],tak=ex.takhrij_data||[],xrefs=ex.cross_references||[];
  let evidHtml="";
  if(refs.length+tak.length+xrefs.length===0)evidHtml='<span class="muted">No evidence</span>';
  else{
    if(tak.length)evidHtml+=tak.map(t=>`<div style="margin-bottom:0.3rem;font-family:var(--font-ar);direction:rtl">${esc(t.hadith_text_snippet||"\u2014")}</div>`).join("");
    if(refs.length)evidHtml+=refs.map(r=>`<div style="font-size:0.76rem">${v(r.type)}: <span class="ar" dir="rtl">${esc(r.text_snippet||r.marker_text||"\u2014")}</span></div>`).join("");
    if(xrefs.length)evidHtml+=xrefs.map(x=>`<div style="font-size:0.76rem">\u2192 ${esc(x.target_description||x.reference_text||"\u2014")} ${x.resolved?"\u2713":"\u2717"}</div>`).join("");
  }

  const la=ex.primary_author_layer||{};

  $("center").innerHTML=`
    <div class="doc">
      <div class="doc-header">
        <div class="doc-title" dir="rtl" lang="ar">${esc(divPath)}</div>
        <div class="doc-meta">${pageStr}${pageStr?"<br>":""}${la.layer_id||"\u2014"} \xb7 ${la.author_id||"\u2014"}</div>
      </div>
      <div class="doc-body">
        <div class="doc-text" dir="rtl" lang="ar">${esc(ex.primary_text)}</div>
        ${ex.description_arabic?`<div class="doc-gloss" dir="rtl" lang="ar">${esc(ex.description_arabic)}</div>`:""}
        ${warnHtml}
      </div>
      ${topics?`<div class="doc-topics">${topics}</div>`:""}
      <div class="doc-footer">
        <span class="chip chip-fn">${v(ex.primary_function)}</span>
        <span class="chip chip-${scCls}">${sc}</span>
        ${(ex.secondary_functions||[]).map(f=>`<span class="chip" style="background:var(--surface3);color:var(--text2)">${f}</span>`).join("")}
        ${ex.school?`<span class="chip chip-school" dir="rtl">${esc(ex.school)}</span>`:""}
      </div>
    </div>
    ${scholarsHtml?`<div class="section"><div class="sec-title" onclick="toggleSec(this)"><span class="arrow open">\u25B8</span> Scholars Cited</div><div class="sec-body open">${scholarsHtml}</div></div>`:""}
    ${refs.length+tak.length+xrefs.length>0?`<div class="section"><div class="sec-title" onclick="toggleSec(this)"><span class="arrow">\u25B8</span> Evidence &amp; References</div><div class="sec-body">${evidHtml}</div></div>`:""}
  `;

  renderRight(ex);
  const active=$("left").querySelector(".active");if(active)active.scrollIntoView({block:"nearest"});
}

function toggleSec(el){el.querySelector(".arrow").classList.toggle("open");el.nextElementSibling.classList.toggle("open")}

// ── Right Panel ──
function renderRight(ex){
  // Restore feedback state
  const fb=feedback[ex.excerpt_id]||{};
  selectedIssues=new Set(fb.issues||[]);

  // Verdict buttons
  const verdicts=["accept","needs_work","reject"];
  const labels={accept:"\u2713 Accept",needs_work:"\u26A0 Needs Work",reject:"\u2717 Reject"};
  const icons={accept:"\u2713",needs_work:"\u26A0",reject:"\u2717"};
  const keys={accept:"a",needs_work:"w",reject:"r"};
  const btns=verdicts.map(vv=>{
    const sel=fb.verdict===vv?` sel-${vv}`:"";
    return `<button class="vbtn${sel}" data-v="${vv}"><span class="v-icon">${icons[vv]}</span>${labels[vv]}<span class="v-key">${keys[vv]}</span></button>`;
  }).join("");

  // Issue tags
  const tagsHtml=ISSUE_TAGS.map(t=>{
    const sel=selectedIssues.has(t.id)?" selected":"";
    return `<button class="issue-tag${sel}" data-tag="${t.id}">${t.label}</button>`;
  }).join("");

  // Progress
  const reviewed=Object.keys(feedback).length;
  const pct=excerpts.length?Math.round(reviewed/excerpts.length*100):0;

  // Diagnostics
  const cm=ex.consensus_metadata;
  let consHtml='<span class="muted">\u2014</span>';
  if(cm?.decisions?.length){
    const rows=cm.decisions.map(d=>`<tr><td>${v(d.decision_type)}</td><td>${v(d.enrichment_value)}</td><td>${v(d.verifier_value)}</td><td>${d.verifier_agrees?"\u2713":"\u2717"}</td><td>${v(d.final_value)}</td></tr>`).join("");
    consHtml=`<table class="ctbl"><thead><tr><th>Type</th><th>Enrich</th><th>Verify</th><th>Agr</th><th>Final</th></tr></thead><tbody>${rows}</tbody></table>`;
  }
  const gates=(ex.gate_flags||[]).map(g=>`<span class="flag flag-gate">${esc(g)}</span>`).join("")||'<span class="muted">None</span>';
  const reviews=(ex.review_flags||[]).map(r=>`<span class="flag flag-review">${esc(r)}</span>`).join("")||'<span class="muted">None</span>';
  const scholConf=(ex.quoted_scholars||[]).map(s=>`${esc(s.mention_text)} <b>${s.confidence!=null?s.confidence.toFixed(2):"\u2014"}</b>`).join(", ")||"\u2014";

  $("right").innerHTML=`
    <div class="review-zone">
      <div class="review-header"><span>Review</span><span class="progress-text">${reviewed}/${excerpts.length} (${pct}%)</span></div>
      <div class="verdict-row">${btns}</div>
      <div class="issues-label">What needs fixing?</div>
      <div class="issues-row">${tagsHtml}</div>
      <textarea id="comment" spellcheck="false" autocomplete="off" autocorrect="off" autocapitalize="off" placeholder="Notes \u2014 what specifically is wrong or could be better?">${esc(fb.comment||"")}</textarea>
      <div class="save-row">
        <button id="save-btn"${fb.verdict||selectedIssues.size||fb.comment?' class="has-review"':''}>${fb.verdict||selectedIssues.size?"Save & Next \u2192":"Skip \u2192"}</button>
        <div class="progress-wrap">
          <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
          <span id="progress">${reviewed} of ${excerpts.length}</span>
        </div>
      </div>
    </div>
    <div class="diag-section">
      <div class="diag-header" onclick="toggleDiag(this)"><span class="arrow">\u25B8</span> Pipeline Diagnostics</div>
      <div class="diag-body">
        <div class="rrow"><span class="rlabel">ID</span><span class="rval" style="font-family:var(--font-mono);font-size:0.62rem">${esc(ex.excerpt_id)}</span></div>
        <div class="rrow"><span class="rlabel">chunk/unit</span><span class="rval">${v(ex.chunk_index)}/${v(ex.unit_index)}</span></div>
        <div class="rrow"><span class="rlabel">words</span><span class="rval">${v(ex.start_word)}\u2013${v(ex.end_word)}</span></div>
        <div class="rrow"><span class="rlabel">segments</span><span class="rval">[${(ex.segment_indices||[]).join(",")}]</span></div>
        <div class="rrow"><span class="rlabel">attr conf</span><span class="rval">${ex.attribution_confidence!=null?ex.attribution_confidence.toFixed(2):"\u2014"}</span></div>
        <div class="rrow"><span class="rlabel">school conf</span><span class="rval">${ex.school_confidence!=null?ex.school_confidence.toFixed(2):"\u2014"}</span></div>
        <div class="rrow"><span class="rlabel">scholars</span><span class="rval" style="font-size:0.7rem">${scholConf}</span></div>
      </div>
    </div>
    <div class="diag-section">
      <div class="diag-header" onclick="toggleDiag(this)"><span class="arrow">\u25B8</span> Consensus</div>
      <div class="diag-body">${consHtml}</div>
    </div>
    <div class="diag-section">
      <div class="diag-header" onclick="toggleDiag(this)"><span class="arrow">\u25B8</span> Flags</div>
      <div class="diag-body">
        <div class="rrow"><span class="rlabel">Gates</span><span class="rval">${gates}</span></div>
        <div class="rrow"><span class="rlabel">Review</span><span class="rval">${reviews}</span></div>
      </div>
    </div>
  `;

  // Wire verdict buttons
  document.querySelectorAll(".vbtn").forEach(b=>b.addEventListener("click",()=>selectVerdict(b.dataset.v)));
  // Wire issue tags
  document.querySelectorAll(".issue-tag").forEach(b=>b.addEventListener("click",()=>toggleIssue(b.dataset.tag)));
  // Wire save
  $("save-btn").addEventListener("click",saveAndNext);
  // Wire comment changes to update save button
  const c=$("comment");if(c)c.addEventListener("input",updateSaveBtn);
}

function toggleDiag(el){el.querySelector(".arrow").classList.toggle("open");el.nextElementSibling.classList.toggle("open")}

function selectVerdict(vv){
  document.querySelectorAll(".vbtn").forEach(bb=>bb.className="vbtn");
  const btn=document.querySelector(`.vbtn[data-v="${vv}"]`);
  if(btn)btn.classList.add(`sel-${vv}`);
  updateSaveBtn();
}

function toggleIssue(tagId){
  if(selectedIssues.has(tagId))selectedIssues.delete(tagId);
  else selectedIssues.add(tagId);
  const btn=document.querySelector(`.issue-tag[data-tag="${tagId}"]`);
  if(btn)btn.classList.toggle("selected");
  updateSaveBtn();
}

function updateSaveBtn(){
  const btn=$("save-btn");if(!btn)return;
  const hasVerdict=document.querySelector('.vbtn[class*="sel-"]');
  const hasIssues=selectedIssues.size>0;
  const hasComment=$("comment")?.value.trim();
  if(hasVerdict||hasIssues||hasComment){
    btn.textContent="Save & Next \u2192";btn.classList.add("has-review");
  }else{
    btn.textContent="Skip \u2192";btn.classList.remove("has-review");
  }
}

// ── Feedback ──
async function saveAndNext(){
  const ex=excerpts[currentIndex];
  const vbtn=document.querySelector(".vbtn[class*='sel-']");
  const verdict=vbtn?vbtn.dataset.v:null;
  const comment=$("comment")?$("comment").value.trim():"";
  const issues=Array.from(selectedIssues);
  if(!verdict&&!comment&&!issues.length){if(currentIndex<excerpts.length-1){currentIndex++;render();renderList()}return}

  const cm=ex.consensus_metadata;
  let csum="\u2014";
  if(cm?.decisions)csum=cm.decisions.map(d=>`${d.decision_type}: ${d.verifier_agrees?"agree":"disagree"}`).join(", ");

  const entry={
    excerpt_id:ex.excerpt_id,
    content_hash:ex._content_hash||"",
    timestamp:new Date().toISOString(),
    verdict:verdict||"skip",
    issues,
    comment,
    excerpt_context:{
      primary_function:ex.primary_function,self_containment:ex.self_containment,
      school:ex.school,school_confidence:ex.school_confidence,
      primary_author_layer:ex.primary_author_layer,div_path:ex.div_path,
      text_snippet:ex.text_snippet,gate_flags:ex.gate_flags,
      review_flags:ex.review_flags,consensus_summary:csum
    },
    review_meta:{source_file:currentPackage,excerpt_position:`${currentIndex+1}/${excerpts.length}`,reviewer:"owner"}
  };
  feedback[ex.excerpt_id]=entry;
  try{await fetch(`/api/feedback/${currentPackage}`,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(entry)})}catch(e){console.error("Save failed:",e)}
  if(currentIndex<excerpts.length-1){currentIndex++;render();renderList()}else{render();renderList()}
}

// ── Navigation ──
$("prev-btn").addEventListener("click",()=>{if(currentIndex>0){currentIndex--;render();renderList()}});
$("next-btn").addEventListener("click",()=>{if(currentIndex<excerpts.length-1){currentIndex++;render();renderList()}});
$("pkg-label").addEventListener("click",backToPackages);
$("shortcuts-btn").addEventListener("click",()=>$("shortcuts").classList.toggle("open"));

// ── Filter buttons ──
document.querySelectorAll(".fbtn").forEach(b=>b.addEventListener("click",()=>{
  currentFilter=b.dataset.filter;
  document.querySelectorAll(".fbtn").forEach(bb=>bb.classList.remove("active"));
  b.classList.add("active");
  renderList();
}));

// ── Keyboard ──
document.addEventListener("keydown",e=>{
  if(e.target.tagName==="TEXTAREA"||e.target.tagName==="INPUT"){
    if(e.key==="Enter"&&e.ctrlKey){e.preventDefault();saveAndNext()}
    if(e.key==="Escape"){e.target.blur()}
    return;
  }
  if(e.key==="ArrowLeft"){if(currentIndex>0){currentIndex--;render();renderList()}}
  else if(e.key==="ArrowRight"){if(currentIndex<excerpts.length-1){currentIndex++;render();renderList()}}
  else if(e.key==="Home"){currentIndex=0;render();renderList()}
  else if(e.key==="End"){currentIndex=excerpts.length-1;render();renderList()}
  else if(e.key==="g"){const n=prompt(`Go to (1\u2013${excerpts.length}):`);if(n){const i=parseInt(n)-1;if(i>=0&&i<excerpts.length){currentIndex=i;render();renderList()}}}
  else if(e.key==="a")selectVerdict("accept");
  else if(e.key==="w")selectVerdict("needs_work");
  else if(e.key==="r")selectVerdict("reject");
  else if(e.key==="n"){const c=$("comment");if(c)c.focus()}
  else if(e.key==="?"&&!e.shiftKey)$("shortcuts").classList.toggle("open");
  else if(e.key==="Escape"){$("shortcuts").classList.remove("open");backToPackages()}
});

loadPackages();
</script>
</body>
</html>
