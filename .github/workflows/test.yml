name: KR Pipeline Tests

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run engine tests
        env:
          PYTHONIOENCODING: utf-8
        run: |
          python -m pytest engines/*/tests/ -x -q --tb=short

      - name: Run shared module tests
        env:
          PYTHONIOENCODING: utf-8
        run: |
          python -m pytest shared/*/tests/ -x -q --tb=short 2>/dev/null || echo "No shared tests yet"

      - name: Verify metadata flow (D-023)
        run: |
          python3 scripts/verify_metadata_flow.py

      - name: Cross-engine contract validation
        env:
          PYTHONIOENCODING: utf-8
        run: |
          python3 tools/check_cross_engine_contracts.py
