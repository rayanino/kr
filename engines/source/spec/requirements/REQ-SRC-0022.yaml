id: REQ-SRC-0022
type: requirement
status: proposed
title: PDF normalization route defaults to OCR-primary
topic: trust
priority: critical
confidence: high
provenance: domain_inference
source: Added from reference/pdf_fixture_observations_2026-04-14.md and owner cross-validation on 2026-04-14 that normalization, not source, owns PDF-to-text conversion
created: "2026-04-14"
updated: "2026-04-14"
depends_on:
  - REQ-SRC-0021
  - CON-SRC-0004
impacts:
  - normalization_routing
  - downstream_handoff
behavior:
  trigger: A successful PDF SourceMetadata record is emitted.
  preconditions:
    - source_metadata.source_format=pdf.
    - REQ-SRC-0021 has set source_metadata.pdf_text_layer_status and source_metadata.page_count_physical.
    - The source engine output contract contains metadata only and does not require normalized text emission.
  postconditions:
    - source_metadata.normalization_route is set to pdf_ocr_primary.
    - The source-engine handoff for a PDF contains source_metadata.page_count_physical and source_metadata.pdf_text_layer_status.
    - The source engine emits no normalized_text field for a PDF handoff.
    - source_metadata.pdf_text_layer_status=clean is preserved only as auxiliary evidence for normalization review and does not skip OCR-primary routing.
  error_conditions:
    - condition: source_metadata.source_format=pdf but source_metadata.pdf_text_layer_status is missing.
      action: Abort intake with SRC-E-PDF-STATUS-MISSING.
      severity: fatal
    - condition: source_metadata.source_format=pdf but source_metadata.normalization_route is not pdf_ocr_primary.
      action: Abort intake with SRC-E-PDF-ROUTE.
      severity: fatal
acceptance_criteria:
  - id: AC-1
    given: tests/fixtures/ibn_aqil_alfiyyah/vol6.pdf
    when: the SourceMetadata handoff is finalized
    then: source_metadata.normalization_route="pdf_ocr_primary", source_metadata.pdf_text_layer_status="absent", source_metadata.page_count_physical=398, and the handoff contains no normalized_text field.
    test_type: integration
  - id: AC-2
    given: tests/fixtures/waraqat_usul/waraqat.pdf
    when: the SourceMetadata handoff is finalized
    then: source_metadata.normalization_route="pdf_ocr_primary", source_metadata.pdf_text_layer_status="corrupt", source_metadata.page_count_physical=13, and the handoff contains no normalized_text field.
    test_type: integration
  - id: AC-3
    given: A temporary PDF generated during the test run with one Arabic page containing clean embedded text
    when: the SourceMetadata handoff is finalized
    then: source_metadata.normalization_route="pdf_ocr_primary", source_metadata.pdf_text_layer_status="clean", and the handoff contains no normalized_text field.
    test_type: deterministic
