id: REQ-SRC-0003
type: requirement
status: proposed
title: Minimal owner review load
topic: trust
priority: critical
confidence: high
provenance: owner_interview
source: Derived from OF-SRC-0003; amended per contract-architect-review.yaml
created: "2026-04-14"
updated: "2026-04-14"
depends_on:
  - OF-SRC-0003
  - REQ-SRC-0006
impacts:
  - owner_queue
  - autonomous_decision_rate
behavior:
  trigger: Metadata inference reaches a case that cannot be finalized automatically.
  preconditions:
    - Base metadata inference and internal disagreement handling have completed.
    - owner_review_case.route_reason is limited to zero_author_evidence, agent_cannot_determine, or new_science_not_in_registry.
  postconditions:
    - Cases with evidence-backed automatic resolution do not create owner_review_case records.
    - Routed cases write owner_review_case with fields route_reason, target_field, evidence_summary, and candidate_positions.
    - Owner review is never requested for reasons outside the approved route_reason taxonomy.
  error_conditions:
    - condition: An unresolved case does not match zero_author_evidence, agent_cannot_determine, or new_science_not_in_registry.
      action: Block owner routing with SRC-E-UNCLASSIFIED-OWNER-ROUTE until the case is reclassified.
      severity: blocking
acceptance_criteria:
  - id: AC-1
    given: tests/fixtures/shamela_real/06_usul/book.htm
    when: source metadata resolution completes
    then: No owner_review_case is written.
    test_type: integration
  - id: AC-2
    given: A Shamela HTML source whose metadata card, title, and colophon contain no author signal
    when: source metadata resolution completes
    then: owner_review_case.route_reason="zero_author_evidence" and owner_review_case.target_field="author_name".
    test_type: deterministic
  - id: AC-3
    given: A source classified as mustalah_al_hadith while science_registry lacks that entry
    when: science classification completes
    then: owner_review_case.route_reason="new_science_not_in_registry" and owner_review_case.target_field="science_scope".
    test_type: integration
