id: REQ-SRC-0004
type: requirement
status: proposed
title: Multi-model consensus for author attribution
topic: metadata
priority: critical
confidence: high
provenance: owner_interview
source: Derived from OF-SRC-0004
created: "2026-04-14"
updated: "2026-04-14"
depends_on:
  - OF-SRC-0004
  - INV-SRC-0002
impacts:
  - author_attribution
  - consensus_pipeline
behavior:
  trigger: The source engine needs to assign an author to a book.
  preconditions:
    - Candidate author evidence has been collected.
    - At least two independent attribution agents are available.
  postconditions:
    - Every author claim is verified by two or more independent agents.
    - Disputed authorship yields evidence-backed multiple positions rather than a single forced value.
  error_conditions:
    - condition: Fewer than two independent author-verification agents are available.
      action: Abort final author attribution and mark the case as unresolved.
      severity: fatal
acceptance_criteria:
  - id: AC-1
    given: The 13 source fixtures with known authors.
    when: Multi-agent attribution runs.
    then: The correct author is identified for every fixture.
    test_type: integration
  - id: AC-2
    given: A book with a genuinely disputed author.
    when: Attribution evidence conflicts.
    then: The result stores multiple supported author positions with evidence.
    test_type: integration

