id: REQ-SRC-0007
type: requirement
status: deferred
title: Level detection from content
topic: metadata
priority: medium
confidence: medium
provenance: owner_interview
source: Derived from OF-SRC-0007
created: "2026-04-14"
updated: "2026-04-14"
depends_on:
  - OF-SRC-0007
  - OQ-SRC-0001
impacts:
  - level_metadata
  - taxonomy_preparation
behavior:
  trigger: The source engine needs to preserve or infer a difficulty level for a book.
  preconditions:
    - The source metadata contract includes a level field.
    - Content analysis outputs or an equivalent downstream signal are available for the final design.
  postconditions:
    - The level field is preserved in the source contract.
    - The final detection owner is decided through OQ-SRC-0001 rather than silently guessed in code.
  error_conditions:
    - condition: The level-detection owner is unresolved at implementation time.
      action: Preserve the field and record the unresolved design dependency instead of fabricating a detector.
      severity: warning
acceptance_criteria:
  - id: AC-1
    given: A level value is supplied by a later analysis stage.
    when: Source metadata is handed forward.
    then: The level field survives handoff unchanged.
    test_type: deterministic
  - id: AC-2
    given: The architecture still has not resolved who computes level.
    when: The spec is reviewed for implementation readiness.
    then: The blocker is recorded against OQ-SRC-0001 instead of being silently implemented.
    test_type: deterministic

