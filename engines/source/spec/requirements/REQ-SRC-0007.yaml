id: REQ-SRC-0007
type: requirement
status: proposed
title: Level field preservation across handoff
topic: metadata
priority: medium
confidence: medium
provenance: owner_interview
source: Derived from OF-SRC-0007; narrowed per contract-architect-review.yaml
created: "2026-04-14"
updated: "2026-04-14"
depends_on:
  - OF-SRC-0007
impacts:
  - level_metadata
  - source_normalization_boundary
behavior:
  trigger: The source engine serializes source metadata for downstream handoff.
  preconditions:
    - The handoff schema defines a nullable level field.
    - Any populated level value has already been written before serialization.
  postconditions:
    - The handoff payload always includes the level key.
    - A populated level value is passed through unchanged.
    - An unknown level is serialized as null rather than omitted.
  error_conditions:
    - condition: The handoff payload omits the level key.
      action: Reject serialization with SRC-E-LEVEL-FIELD-MISSING.
      severity: blocking
acceptance_criteria:
  - id: AC-1
    given: tests/fixtures/shamela_real/06_usul/book.htm with source_metadata.level="intermediate"
    when: source-to-normalization handoff serialization executes
    then: The serialized payload contains level="intermediate".
    test_type: deterministic
  - id: AC-2
    given: tests/fixtures/shamela_real/12_multi_muq/001.htm with source_metadata.level=null
    when: source-to-normalization handoff serialization executes
    then: The serialized payload contains the key level with value null.
    test_type: deterministic
