id: REQ-SRC-0002
type: requirement
status: proposed
title: Optional owner hints as cross-validation
topic: acquisition
priority: high
confidence: high
provenance: owner_interview
source: Derived from OF-SRC-0002; amended per contract-architect-review.yaml
created: "2026-04-14"
updated: "2026-04-14"
depends_on:
  - OF-SRC-0002
  - INV-SRC-0001
  - DEC-SRC-0001
impacts:
  - confidence_resolution
  - owner_hint_audit
behavior:
  trigger: The owner submits optional intake hints together with a source path.
  preconditions:
    - owner_hint_payload contains only author_name, science_scope, and genre keys.
    - Base inference has already written inferred_metadata.author_name, inferred_metadata.science_scope, and inferred_metadata.genre.
  postconditions:
    - owner_hint_payload values are stored separately from inferred_metadata values.
    - Matching author_name hints may increase author_identification_confidence without changing inferred_metadata.author_name.
    - Matching genre hints may increase genre_confidence without changing inferred_metadata.genre.
    - Matching science_scope hints may increase science_scope_confidence without changing inferred_metadata.science_scope.
    - Hint contradictions write hint_investigation with fields field, hint_value, inferred_value, status, and opened_reason.
  error_conditions:
    - condition: owner_hint_payload contains a key outside author_name, science_scope, or genre.
      action: Reject the hint payload with SRC-E-HINT-FIELD and continue intake without the invalid hint.
      severity: warning
    - condition: A hint contradicts inferred metadata.
      action: Open hint_investigation with status=open while preserving both hint and inference values.
      severity: blocking
acceptance_criteria:
  - id: AC-1
    given: tests/fixtures/shamela_real/03_fiqh/book.htm with owner_hint_payload.author_name="عبد الله بن إبراهيم الزاحم"
    when: post-inference hint comparison executes
    then: inferred_metadata.author_name remains "عبد الله بن إبراهيم الزاحم" and author_identification_confidence increases.
    test_type: deterministic
  - id: AC-2
    given: tests/fixtures/shamela_real/03_fiqh/book.htm with owner_hint_payload.genre="matn"
    when: post-inference hint comparison executes
    then: hint_investigation.field="genre", hint_investigation.hint_value="matn", and inferred_metadata.genre remains "risalah".
    test_type: integration
  - id: AC-3
    given: tests/fixtures/shamela_real/06_usul/book.htm with owner_hint_payload.publisher="دار الفكر"
    when: hint payload validation executes
    then: The invalid hint key is rejected with error_code=SRC-E-HINT-FIELD and base inference still runs.
    test_type: deterministic
