id: REQ-SRC-0017
type: requirement
status: proposed
title: Multi-volume directory intake
topic: acquisition
priority: critical
confidence: high
provenance: coworker_review
source: Added from adversary-review.yaml ADV-001
created: "2026-04-14"
updated: "2026-04-14"
depends_on:
  - CON-SRC-0001
  - CON-SRC-0004
impacts:
  - source_metadata
  - freezing_pipeline
behavior:
  trigger: Owner submits a directory path containing numbered .htm volume files for intake.
  preconditions:
    - The path resolves to a readable directory.
    - The directory contains at least 2 files whose basenames match [0-9]+ and suffix .htm.
    - Numbered volume files are ordered by integer filename stem before freezing and before setting source_metadata.volume_count.
    - source_metadata.source_sha256 is computed as SHA-256 of the sorted JSON object mapping each numbered volume filename to that file's SHA-256 digest.
  postconditions:
    - All numbered volume files are frozen under one source_metadata.source_id and one source_metadata.registry_entry_id.
    - source_metadata.volume_count equals the number of frozen numbered volume files and is at least 2.
    - source_metadata.source_sha256 stores the composite hash of the numbered volume files.
    - source_metadata.frozen_blob_path points to the immutable frozen directory for the shared source_id.
    - When non-numbered .htm files are present, interactive intake prompts for supplementary inclusion and non-interactive intake auto-skips those files while recording supplementary_file_decision.
  error_conditions:
    - condition: The submitted directory path does not exist.
      action: Abort intake with SRC-E-PATH-NOT-FOUND.
      severity: fatal
    - condition: The submitted directory path exists but cannot be read.
      action: Abort intake with SRC-E-PATH-UNREADABLE.
      severity: fatal
    - condition: The directory contains fewer than 2 .htm files whose basenames match [0-9]+.
      action: Abort intake with SRC-E-EMPTY-DIRECTORY.
      severity: fatal
    - condition: Numbered and non-numbered .htm files appear together.
      action: Open supplementary_file_decision for the non-numbered files or auto-skip them when interaction is unavailable.
      severity: warning
    - condition: The composite source_metadata.source_sha256 matches an existing source_metadata.source_sha256.
      action: Abort intake with SRC-E-DUPLICATE-INGEST.
      severity: blocking
acceptance_criteria:
  - id: AC-1
    given: tests/fixtures/shamela_real/11_multi_small
    when: intake executes
    then: All .htm volumes are frozen under one source_metadata.source_id, source_metadata.volume_count=3, and exactly one source_metadata.registry_entry_id is written.
    test_type: integration
  - id: AC-2
    given: A directory containing only non-numbered .htm files
    when: intake executes
    then: Intake aborts with error_code=SRC-E-EMPTY-DIRECTORY.
    test_type: deterministic
  - id: AC-3
    given: A directory containing 001.htm, 002.htm, and appendix.htm while interaction is unavailable
    when: intake executes
    then: source_metadata.volume_count=2 and supplementary_file_decision.mode="auto_skip".
    test_type: deterministic
