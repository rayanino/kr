id: REQ-SRC-0010
type: requirement
status: proposed
title: Graduated muhaqiq standing
topic: metadata
priority: medium
confidence: high
provenance: owner_interview
source: Derived from OF-SRC-0010; amended per both coworker reviews
created: "2026-04-14"
updated: "2026-04-14"
depends_on:
  - OF-SRC-0010
  - INV-SRC-0005
  - DEC-SRC-0005
impacts:
  - muhaqiq_metadata
  - edition_annotation
behavior:
  trigger: The engine researches the muhaqiq for an edition.
  preconditions:
    - A muhaqiq name or null value is extracted from the source.
    - Standing thresholds are unknown=0 verified sources, barely_known=1 verified source, known=2 verified source types, well_known=3 verified sources including scholarly_database or library_catalog, and elite=4 verified sources including both scholarly_database and library_catalog.
  postconditions:
    - muhaqiq_assessment stores standing_level, evidence_sources, and last_verified.
    - standing_level is one of unknown, barely_known, known, well_known, or elite.
    - Unknown or low standing never blocks source intake.
  error_conditions:
    - condition: No verified source supports the extracted muhaqiq.
      action: Set muhaqiq_assessment.standing_level=unknown and evidence_sources=[].
      severity: warning
acceptance_criteria:
  - id: AC-1
    given: A muhaqiq research result with zero verified evidence sources
    when: muhaqiq standing assessment executes
    then: muhaqiq_assessment.standing_level="unknown", muhaqiq_assessment.evidence_sources=[], and muhaqiq_assessment.last_verified is populated.
    test_type: deterministic
  - id: AC-2
    given: A muhaqiq research result with one verified library_catalog source
    when: muhaqiq standing assessment executes
    then: muhaqiq_assessment.standing_level="barely_known".
    test_type: deterministic
  - id: AC-3
    given: A muhaqiq research result with verified sources from scholarly_database, library_catalog, islamic_reference, and general_web
    when: muhaqiq standing assessment executes
    then: muhaqiq_assessment.standing_level="elite" and len(muhaqiq_assessment.evidence_sources)=4.
    test_type: deterministic
