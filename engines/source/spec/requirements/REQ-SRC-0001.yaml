id: REQ-SRC-0001
type: requirement
status: proposed
title: Autonomous source acquisition
topic: acquisition
priority: critical
confidence: high
provenance: owner_interview
source: Derived from OF-SRC-0002; amended per contract-architect-review.yaml and adversary-review.yaml ADV-001
created: "2026-04-14"
updated: "2026-04-14"
depends_on:
  - OF-SRC-0002
  - CON-SRC-0001
  - REQ-SRC-0017
  - REQ-SRC-0020
impacts:
  - source_metadata
  - freezing_pipeline
behavior:
  trigger: Owner submits a single filesystem path for source intake.
  preconditions:
    - The path resolves to one readable file or one readable directory.
    - File input is non-empty and decodes as a supported single-file intake format before freezing.
    - Directory input is routed to REQ-SRC-0017 before freeze-time hashing.
  postconditions:
    - File input writes source_metadata.source_id, source_metadata.source_sha256, source_metadata.frozen_blob_path, and source_metadata.registry_entry_id.
    - Directory input routes to REQ-SRC-0017 and never emits SRC-E-DIRECTORY-INPUT.
    - The written source_metadata.source_sha256 is linked to source_metadata.registry_entry_id for duplicate detection.
  error_conditions:
    - condition: The submitted path does not exist.
      action: Abort intake with SRC-E-PATH-NOT-FOUND.
      severity: fatal
    - condition: The submitted path exists but cannot be read.
      action: Abort intake with SRC-E-PATH-UNREADABLE.
      severity: fatal
    - condition: The submitted file has zero bytes.
      action: Abort intake with SRC-E-EMPTY-FILE.
      severity: fatal
    - condition: The submitted file cannot be decoded as UTF-8 without repair.
      action: Abort intake with SRC-E-ENCODING.
      severity: fatal
    - condition: The submitted file is not a supported single-file intake format.
      action: Abort intake with SRC-E-FORMAT.
      severity: fatal
    - condition: The routed intake flow produces a source_metadata.source_sha256 that already exists in the source registry.
      action: Abort intake with SRC-E-DUPLICATE-INGEST.
      severity: blocking
acceptance_criteria:
  - id: AC-1
    given: tests/fixtures/shamela_real/03_fiqh/book.htm
    when: source engine intake executes
    then: source_metadata.source_id is non-empty, source_metadata.source_sha256 is a 64-character SHA-256 hex digest, source_metadata.frozen_blob_path is non-empty, and source_metadata.registry_entry_id is non-empty.
    test_type: integration
  - id: AC-2
    given: Missing path tests/fixtures/shamela_real/does_not_exist/book.htm
    when: source engine intake executes
    then: Intake aborts with error_code=SRC-E-PATH-NOT-FOUND.
    test_type: deterministic
  - id: AC-3
    given: Directory path tests/fixtures/shamela_real/11_multi_small
    when: source engine intake executes
    then: The request routes to REQ-SRC-0017 and does not emit error_code=SRC-E-DIRECTORY-INPUT.
    test_type: deterministic
  - id: AC-4
    given: A 0-byte HTML file at a valid temporary intake path
    when: source engine intake executes
    then: Intake aborts with error_code=SRC-E-EMPTY-FILE.
    test_type: deterministic
  - id: AC-5
    given: tests/fixtures/shamela_real/03_fiqh/book.htm after the same file has already been frozen once
    when: source engine intake executes again
    then: Intake aborts with error_code=SRC-E-DUPLICATE-INGEST.
    test_type: integration
