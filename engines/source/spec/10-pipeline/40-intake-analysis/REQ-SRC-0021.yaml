id: REQ-SRC-0021
type: requirement
status: proposed
title: PDF intake analysis and text-layer quality classification
topic: acquisition
layer: pipeline
step: intake_analysis
priority: critical
confidence: high
provenance: owner_interview
source: Derived from OWNER_SANITY_CHECK_ANSWERS.md Q10, reference/pdf_fixture_observations_2026-04-14.md, and owner correction that PDF text-layer judgment belongs to intake analysis and must use text quality, not text presence alone.
created: '2026-04-14'
updated: '2026-04-14'
depends_on:
- REQ-SRC-0018
- REQ-SRC-0019
- CON-SRC-0001
impacts:
- intake_dossier
- normalization_routing
behavior:
  trigger: Intake analysis runs on a frozen source candidate whose container_type is pdf.
  preconditions:
  - The frozen PDF opens without parse error.
  - The PDF has at least 1 physical page.
  - Direct text extraction is sampled on representative physical pages before the intake dossier is finalized.
  - The text-layer assessment checks intelligibility on sampled pages and does not rely only on extracted-text presence, extracted-text area, Arabic-character ratio, or raw diacritic count.
  postconditions:
  - intake_dossier.source_format is set to pdf.
  - intake_dossier.declared_vs_observed_counts.physical_page_count is set from the PDF page count.
  - intake_dossier.normalization_route is set to pdf_ocr_primary.
  - intake_dossier.pdf_text_layer_status is set to absent when sampled content pages yield no extractable visible text.
  - intake_dossier.pdf_text_layer_status is set to corrupt when sampled pages yield extractable text but the text-layer assessment rejects that text as unusable.
  - intake_dossier.pdf_text_layer_status is set to clean when sampled pages yield extractable text and the text-layer assessment accepts that text as intelligible.
  error_conditions:
  - condition: The frozen PDF cannot be opened or parsed during intake analysis.
    action: Abort intake analysis with SRC-E-PDF-CORRUPT.
    severity: fatal
  - condition: The frozen PDF has 0 pages.
    action: Abort intake analysis with SRC-E-EMPTY-FILE.
    severity: fatal
acceptance_criteria:
- id: AC-1
  given: tests/fixtures/ibn_aqil_alfiyyah/vol6.pdf
  when: intake analysis executes
  then: intake_dossier.source_format="pdf", intake_dossier.pdf_text_layer_status="absent", intake_dossier.normalization_route="pdf_ocr_primary", and intake_dossier.declared_vs_observed_counts.physical_page_count=398.
  test_type: integration
- id: AC-2
  given: tests/fixtures/waraqat_usul/waraqat.pdf
  when: intake analysis executes
  then: intake_dossier.source_format="pdf", intake_dossier.pdf_text_layer_status="corrupt", intake_dossier.normalization_route="pdf_ocr_primary", and intake_dossier.declared_vs_observed_counts.physical_page_count=13.
  test_type: integration
- id: AC-3
  given: A temporary PDF generated during the test run with one Arabic page containing the literal string "بِسْمِ اللَّهِ الرَّحْمَٰنِ الرَّحِيمِ" as embedded text
  when: intake analysis executes
  then: intake_dossier.source_format="pdf", intake_dossier.pdf_text_layer_status="clean", intake_dossier.normalization_route="pdf_ocr_primary", and intake_dossier.declared_vs_observed_counts.physical_page_count=1.
  test_type: deterministic
- id: AC-4
  given: A corrupted or password-protected PDF at a valid temporary intake path
  when: intake analysis executes
  then: Intake analysis aborts with error_code=SRC-E-PDF-CORRUPT.
  test_type: deterministic
