id: REQ-SRC-0047
type: requirement
status: confirmed
title: Owner override pathway for level at intake
topic: metadata
layer: pipeline
step: intake_analysis
priority: medium
confidence: high
provenance: deep_research
source: >-
  Initial formulation on 2026-04-16 from dr-chatgpt-level-detection-20260416.yaml
  SEC-4. Amended on 2026-04-17 after the 3-of-3 unanimous OPT-B
  adjudication (Codex CLI, Gemini CLI runs 1 and 2, Gemini DR): (a)
  error severity downgraded fatal → blocking per reviewer finding that
  an invalid override should reject the override but not terminate
  intake (intake proceeds with level=null, level_status=pending_synthesis);
  (b) three distinct error conditions now distinguish absent vs empty
  vs invalid override values (previously conflated); (c) audit-trail
  entry structure enriched to include the raw override token, the
  validation verdict, and the enum-value whitelist that was applied;
  (d) integrates with the CON-SRC-0004 middle-path level_status field.
  Amended on 2026-04-23 (Phase 5b item 4, Option E-prime-final) after
  the 3-cycle pre-commit dispatch (A/B/C/D → E → E-prime; 2-run
  Gemini CLI unanimous findings + Codex CLI per cycle): the
  non-applicable rejection path now cites the INV-SRC-0012 3-axis
  gate. Axis 1 lists the six-value genre set {mushaf, hadith_collection,
  mashyakhah, thabat, barnamaj, fahrasah}; Axis 2 fires on
  composite_work_type == "majmu" (REQ-SRC-0038); Axis 3 is deferred
  to Phase 5b item 23. See follow-ups 21-26. Amended on 2026-04-23
  (Phase 5b item 7, ownership story closure) for the synchronized
  `pending_taxonomy` → `pending_synthesis` rename across six
  verbatim occurrences (rationale, postcondition, AC-2, AC-4, AC-5,
  behavior.preconditions). The rename follows the 3-of-3
  UNANIMOUS_OWN_SYNTHESIS verdict (Codex CLI gpt-5.4
  architectural-fit + Gemini CLI 2-run gemini-3.1-pro-preview
  + gemini-2.5-pro classical-scholarly) on CON-SRC-0004 enum.
  Error codes, severity, behaviour, and acceptance criteria shape
  unchanged. Amended on 2026-04-23 (Phase 5b item 10) to add the
  ADV-012 stickiness postcondition and AC-6. ADV-012's proposed_fix
  had two halves: (1) add mandatory level_provenance enum — LANDED
  in Phase 5b item 1 (commit `62647cb2b`) via the LevelProvenance
  enum and the SourceMetadata.enforce_level_invariants Pydantic
  model_validator; (2) add stickiness postcondition to REQ-SRC-0047
  — LANDED here as a cross-engine contract declaration: owner
  override produces level_provenance="owner_override", and any
  downstream actor with level-writing authority (synthesis per
  DEC-SRC-0003 synthesis-owns-level) MUST honor this provenance
  signal as the "do not silently overwrite" beacon. Silent
  overwrite of an owner-asserted level is a T-2 knowledge-
  integrity corruption vector — the owner's direct library
  assertion would be contradicted without audit, producing a
  level value that appears content-derived while it actually
  overrides an owner assertion, or vice versa. See Adversary
  ADV-012 verbatim at `.kr/runtime/adversary_phase5a_20260417
  .md`:296-307. Closure-wave amendment 2026-04-23 (Codex CAF-4
  HIGH): narrowed the stickiness postcondition and AC-6 scope
  to match what `enforce_level_invariants` in contracts.py
  actually blocks — PAIR-CLEARING attacks (level-alone-null or
  provenance-alone-null), NOT value-swap attacks where both
  fields stay non-null. An earlier draft overstated the
  guarantee by claiming the IFF invariant blocks value-swap
  (e.g. mubtadiʾ→muntahī with provenance untouched); it does
  not, because (muntahī, OWNER_OVERRIDE) is a structurally
  valid pair under pair-consistency rules. Value-swap
  protection is a cross-engine contract: the synthesis engine
  per DEC-SRC-0003 synthesis-owns-level is required to refuse
  silent overwrite on records with level_provenance=
  OWNER_OVERRIDE, producing a structured disagreement entry
  instead. Source engine's contribution is the IFF invariant
  at the data-model layer plus byte-exact provenance
  preservation through REQ-SRC-0007 handoff — the signal the
  synthesis engine consumes. Reviewer output at
  `.kr/runtime/closure_wave_codex_cli_20260423.md`.
  Amended on 2026-04-28 (Phase 5b follow-up 37 closure) to WIDEN
  the owner-override entrance from per-source ``owner_level_override``
  (a single ``Optional[WorkLevel]``) to ALSO accept per-constituent
  keying via ``MetadataDeliberationInput.owner_constituent_level_overrides:
  dict[int, WorkLevel]`` for *majmūʿ* sources whose constituents span
  the pedagogical spectrum (e.g. *Majmūʿ Fatāwā Ibn Taymiyyah* binding
  *al-ʿUbūdiyyah* mubtadiʾ-accessible with *Maʿārij al-Wuṣūl* muntahī).
  4-of-4 cross-provider scholarly+structural convergence at HIGH
  confidence: Codex CLI structural (a-lite) ISOMORPHIC + Gemini Run A
  scholarly (a+b) HIGH + Gemini Run B scholarly INDEPENDENT (a+b) HIGH
  + arabic-reviewer Anthropic Agent (a+b) HIGH with NOVEL classical
  anchor al-Suyūṭī *Tadrīb al-Rāwī* Muqaddimah on *iʿtibār* discipline
  (genuinely independent — not in either Gemini's verdict or the
  sealed prior-evaluator block). Classical justification (al-Zarnūjī
  *Taʿlīm al-Mutaʿallim* Ch. IV pp. 58-66): *tawaqquf* is applied
  per-text, so an owner-override system that only accepts
  container-level overrides cannot express "I have read
  *al-ʿUbūdiyyah* (accessible) but *Maʿārij al-Wuṣūl* (advanced) is
  beyond me, both being in *Majmūʿ Fatāwā Ibn Taymiyyah*".
  Per-constituent overrides at intake are ALWAYS QUEUED (deferred to
  synthesis) because constituent-level genre is not classified at the
  source-engine intake stage; synthesis acquires constituent metadata
  later and applies/rejects via the standard INV-SRC-0012 3-axis gate
  per DEC-SRC-0003. Source engine NEVER WRITES per-constituent level
  (DEC-SRC-0003 — synthesis owns level writes); the entrance only
  RECORDS the per-constituent intent and PROPAGATES the queued record
  forward via ``MetadataDeliberationResult.pending_constituent_level_overrides:
  list[PendingLevelOverride]``. Two new structural CRITICAL findings
  from arabic-reviewer closed in this widening: CRIT-AR-1
  (PendingLevelOverride was per-source-keyed; now carries optional
  ``constituent_idx: Optional[int] = Field(default=None, ge=0)``);
  CRIT-AR-2 (GenreDisputePosition lacked constituent identifier; now
  carries optional ``constituent_idx`` for per-constituent dispute
  snapshots in PendingLevelOverride.dispute_snapshot). Methodology
  gap disclosure: the arabic-reviewer wrapper at
  ``.kr/runtime/_followup_37_arabic_reviewer_wrapper_optimized.md``
  contained the sealed prior-evaluator block in-file, so file-read
  sequence independence is technically compromised; analytical
  independence is supported by the novel al-Suyūṭī anchor + novel
  structural findings + novel framing ("rasm al-wirāqah vs pedagogical
  fact"). New error code SRC-E-LEVEL-OVERRIDE-CONSTITUENT-INVALID
  added at contracts.py for intake-boundary rejection of
  per-constituent keying on non-composite sources or out-of-range
  ``constituent_idx``. New AC-7 added below. Open follow-ups remaining
  after FU-37 closure: 18, 27, 28, 36.
created: '2026-04-16'
updated: '2026-04-28'
depends_on:
- DEC-SRC-0003
- INV-SRC-0011
- INV-SRC-0012
- CON-SRC-0004
- CON-SRC-0011
impacts:
- level_metadata
- level_status
rationale: >-
  ChatGPT Deep Research dr-chatgpt-level-detection-20260416 (SEC-4,
  grounded in paragraphs p16 and p20) established that while the source
  engine must not infer level from shallow metadata (INV-SRC-0011), the
  owner retains authority to assert a level directly at intake when he
  has prior knowledge of the text. The override pathway is the only
  mechanism by which SourceMetadata.level is populated before taxonomy
  runs, and every override is recorded with explicit provenance so
  downstream engines can distinguish owner-asserted values from
  content-derived classifications. The override is rejected (not fatal)
  when the declared value is absent-but-expected, empty, not a valid
  WorkLevel enum value (CON-SRC-0011), or when the source's genre falls
  in the non-applicable set (INV-SRC-0012). In all rejection cases,
  intake continues with level=null and level_status set by the standard
  source-engine rules (pending_synthesis for leveled genres,
  non_applicable_reference for non-applicable genres), so an invalid
  override never aborts source admission.
behavior:
  trigger: The owner supplies an optional level override on a RawUploadRecord or equivalent intake surface when admitting a new source.
  preconditions:
  - owner_level_override, if present, is a string whose value MAY be one of the CON-SRC-0011 WorkLevel enum values (mubtadiʾ, mutawassiṭ, muntahī) — the enum-value whitelist is read from CON-SRC-0011 at validation time, not hard-coded at this atom.
  - The source's genre has been classified by metadata deliberation (REQ-SRC-0030) OR is still pending (override validation is deferred to the genre-resolved point when genre is not yet known at the intake surface).
  postconditions:
  - When owner_level_override is absent (the field is not present on the intake payload), SourceMetadata.level remains null and level_status is set per standard source-engine rules — pending_synthesis when no INV-SRC-0012 non-applicability axis fires, non_applicable_reference when at least one axis fires (Axis 1 genre ∈ {mushaf, hadith_collection, mashyakhah, thabat, barnamaj, fahrasah} OR Axis 2 composite_work_type == "majmu").
  - When owner_level_override is present AND the value passes the CON-SRC-0011 enum whitelist AND NO INV-SRC-0012 non-applicability axis fires (Axis 1 genre not in the six-value set AND Axis 2 composite_work_type != "majmu"), SourceMetadata.level is populated with the exact enum value and level_status is set to "assigned".
  - An audit-trail entry is written with provenance="owner_override", the raw override token received at intake, the validation verdict (accepted | rejected_invalid | rejected_nonapplicable | rejected_empty), the CON-SRC-0011 whitelist that was applied (enumerated snapshot), and an ISO 8601 timestamp of when the override was evaluated.
  - The override value, when accepted, survives through source admission and normalization handoff packaging unchanged (per REQ-SRC-0007 AC-3).
  - >-
    The (SourceMetadata.level, SourceMetadata.level_provenance) pair
    produced by an accepted owner override is ADV-012-STICKY. At the
    data-model level, contracts.py SourceMetadata.enforce_level_invariants
    (a Pydantic model_validator running under validate_assignment=True)
    enforces the IFF-style pair-consistency invariant — level non-null
    ↔ level_provenance non-null — so any single-field reassignment
    that BREAKS the pair (clearing level alone, clearing
    level_provenance alone) trips a ValidationError. The invariant
    does NOT block value-swap mutations where both elements stay
    non-null (e.g. replacing level=mutawassiṭ with level=muntahī
    while provenance remains OWNER_OVERRIDE) — that scenario
    satisfies the IFF pair-consistency rule at the Pydantic layer,
    so value-swap protection is not a single-engine invariant.
    The Codex closure-wave finding (CAF-4, 2026-04-23) surfaced
    this correctly: an earlier draft of this postcondition claimed
    the invariant blocked value-swap, which overstated what the
    code enforces. The accurate statement is that the invariant is
    a pair-clearing defense only; value-swap is governed by the
    cross-engine contract below. At the cross-engine
    contract level, any downstream actor with level-writing authority
    (the synthesis engine per DEC-SRC-0003 synthesis-owns-level) MUST
    inspect level_provenance on the received SourceMetadata record and,
    if level_provenance equals "owner_override", MUST NOT replace the
    level value without producing a structured
    level-override-disagreement entry — a non-silent escalation path
    whose specific shape is defined in the owning-engine spec. Silent
    overwriting of an owner-asserted level is a T-2 knowledge-integrity
    corruption vector — the owner's direct library assertion ("I, the
    student, declare this text mutawassiṭ") would be contradicted by a
    downstream content-derived classification without audit, producing
    a level value that masquerades as an owner assertion when it has
    been silently replaced (if provenance is left at "owner_override"),
    or as content-derived when it reflects the owner's override (if
    provenance is reassigned). The source engine's handoff packaging
    preserves the (level, level_provenance) pair byte-exactly through
    REQ-SRC-0007 AC-3, surfacing the provenance signal intact to every
    downstream consumer.
  error_conditions:
  - condition: owner_level_override is present but is an empty string ("") or a string consisting only of whitespace.
    action: Reject the override with SRC-E-LEVEL-OVERRIDE-EMPTY; SourceMetadata.level remains null; level_status is set per standard source-engine rules; intake_analysis continues.
    severity: blocking
  - condition: owner_level_override is present and non-empty but the value is not one of the CON-SRC-0011 WorkLevel enum values.
    action: Reject the override with SRC-E-LEVEL-OVERRIDE-INVALID; SourceMetadata.level remains null; level_status is set per standard source-engine rules; intake_analysis continues.
    severity: blocking
  - condition: owner_level_override is provided with a valid WorkLevel enum value on a source for which at least one INV-SRC-0012 non-applicability axis fires — Axis 1 (genre is one of {mushaf, hadith_collection, mashyakhah, thabat, barnamaj, fahrasah}) OR Axis 2 (composite_work_type == "majmu"). Axis 3 (HadithSubgenre carve-out) is deferred to Phase 5b item 23.
    action: Reject the override with SRC-E-LEVEL-OVERRIDE-NONAPPLICABLE; SourceMetadata.level remains null; level_status="non_applicable_reference"; intake_analysis continues. The error message MUST identify which axis fired so the audit trail captures the triggering signal.
    severity: blocking
acceptance_criteria:
- id: AC-1
  given: >-
    tests/fixtures/shamela_real/06_usul/book.htm (genre="matn" or
    "sharh") submitted with owner_level_override="mutawassiṭ"
  when: intake analysis processes the raw upload
  then: >-
    SourceMetadata.level="mutawassiṭ", SourceMetadata.level_status=
    "assigned", an audit-trail entry is recorded with
    provenance="owner_override", raw_token="mutawassiṭ",
    verdict="accepted", whitelist_applied=["mubtadiʾ", "mutawassiṭ",
    "muntahī"], and a non-null ISO 8601 timestamp, and the override
    survives normalization handoff unchanged.
  test_type: deterministic
- id: AC-2
  given: >-
    tests/fixtures/shamela_real/06_usul/book.htm submitted with
    owner_level_override="expert" (not a CON-SRC-0011 WorkLevel enum
    value)
  when: intake analysis processes the raw upload
  then: >-
    The override is rejected with SRC-E-LEVEL-OVERRIDE-INVALID,
    SourceMetadata.level remains null, SourceMetadata.level_status=
    "pending_synthesis", intake_analysis continues, and an audit-trail
    entry records raw_token="expert" and verdict="rejected_invalid".
  test_type: deterministic
- id: AC-3
  given: >-
    A source with SourceMetadata.genre="mushaf" submitted with
    owner_level_override="mubtadiʾ"
  when: intake analysis processes the raw upload
  then: >-
    The override is rejected with SRC-E-LEVEL-OVERRIDE-NONAPPLICABLE,
    SourceMetadata.level remains null, SourceMetadata.level_status=
    "non_applicable_reference", intake_analysis continues, and an
    audit-trail entry records verdict="rejected_nonapplicable".
  test_type: deterministic
- id: AC-4
  given: >-
    A source submitted with owner_level_override="" (empty string) or
    owner_level_override="   " (whitespace only)
  when: intake analysis processes the raw upload
  then: >-
    The override is rejected with SRC-E-LEVEL-OVERRIDE-EMPTY,
    SourceMetadata.level remains null, SourceMetadata.level_status=
    "pending_synthesis" (or "non_applicable_reference" per genre), and
    an audit-trail entry records verdict="rejected_empty".
  test_type: deterministic
- id: AC-5
  given: >-
    A source submitted with no owner_level_override field present at
    all on the intake payload
  when: intake analysis processes the raw upload
  then: >-
    No audit-trail entry is written for override evaluation,
    SourceMetadata.level remains null, SourceMetadata.level_status is
    set per standard source-engine rules (pending_synthesis for leveled
    genres, non_applicable_reference for non-applicable genres), and
    intake_analysis completes without error.
  test_type: deterministic
- id: AC-6
  given: >-
    A SourceMetadata record produced by an accepted owner override
    through the REQ-SRC-0047 AC-1 happy path —
    (level="mutawassiṭ", level_provenance="owner_override",
    level_status="assigned")
  when: a subsequent actor attempts either of the two PAIR-CLEARING
    attack paths that the IFF invariant catches — (a) clearing
    SourceMetadata.level to null while leaving level_provenance set,
    or (b) clearing SourceMetadata.level_provenance to null while
    leaving level set. Pair-clearing breaks the level↔provenance
    IFF invariant, so the validator rejects. (Value-swap attacks
    that keep both fields non-null — e.g. level=mutawassiṭ→muntahī
    while provenance stays OWNER_OVERRIDE — are NOT caught by this
    validator because they preserve pair consistency; those are
    governed by the cross-engine contract in behavior.postconditions
    and are the synthesis engine's responsibility to refuse silently
    per DEC-SRC-0003 synthesis-owns-level authority. The Codex
    closure-wave finding CAF-4 surfaced this scope distinction —
    AC-6 now faithfully describes what enforce_level_invariants
    blocks, not what the cross-engine contract separately
    prescribes.)
  then: >-
    Layered defense in contracts.py
    SourceMetadata.enforce_level_invariants (Pydantic model_validator
    under validate_assignment=True) raises a ValidationError at the
    single-field assignment attempt. For attack path (a), CON-SRC-0004
    invariant 1 (level_status=assigned IFF level non-null) fires first
    because it is ordered before the ADV-012 stickiness branch in the
    validator; ADV-012 stickiness is the backstop if the caller also
    mutates level_status. For attack path (b), CON-SRC-0004 invariants
    1 and 2 both pass (level non-null + status=assigned is consistent),
    so ADV-012 stickiness is the sole defender. The test asserts that
    EITHER invariant citation is acceptable, because the outcome
    (single-field clear rejected, record unmutated) is identical under
    either layer. At the cross-engine contract level, the
    level_provenance="owner_override" field remains a readable signal
    to downstream engines that any paired reassignment of the pair
    (the structurally-valid mutation path which the IFF invariants
    cannot catch) requires a structured level-override-disagreement
    entry rather than a silent rewrite. The test also observes that
    the (level, level_provenance) pair is preserved byte-exactly
    through the REQ-SRC-0007 handoff JSON surface so downstream
    engines receive the provenance signal intact.
  test_type: deterministic
- id: AC-7
  given: >-
    A composite *majmūʿ* source (composite_work_type == "majmu") with
    ``IntakeDossier.sub_work_inventory`` of length N detected at intake
    (e.g. مجموع رسائل ابن رجب with N constituent rasāʾil) submitted with
    per-constituent owner overrides via
    ``MetadataDeliberationInput.owner_constituent_level_overrides ==
    {0: WorkLevel.MUBTADI, 2: WorkLevel.MUNTAHI}`` (the owner asserts
    constituent idx 0 is mubtadiʾ and constituent idx 2 is muntahī;
    constituent idx 1 receives no override). Per Phase 5b follow-up 37
    closure 2026-04-28, the owner-override entrance is widened to per-
    constituent keying for majmūʿ sources whose constituents span the
    pedagogical spectrum. Per-constituent overrides at intake are ALWAYS
    QUEUED (deferred to synthesis) because constituent-level genre is
    not classified at the source-engine stage; source engine NEVER
    writes per-constituent level (DEC-SRC-0003). The orchestrator
    helper ``_queue_constituent_overrides`` validates that
    ``constituent_idx`` is non-negative and in range of
    ``sub_work_inventory``, and that the source is composite_work_type
    == "majmu" (per-constituent keying on non-composite sources raises
    SRC-E-LEVEL-OVERRIDE-CONSTITUENT-INVALID).
  when: metadata deliberation processes the composite source
  then: >-
    ``MetadataDeliberationResult.pending_constituent_level_overrides``
    contains exactly 2 PendingLevelOverride records, sorted by
    ``constituent_idx`` ascending: idx=0 with validated_value=MUBTADI,
    state=QUEUED, raw_token="mubtadiʾ"; idx=2 with validated_value=
    MUNTAHI, state=QUEUED, raw_token="muntahī". Container-level
    SourceMetadata.level remains null and SourceMetadata.level_status
    == "non_applicable_reference" (Axis 2 fires unchanged on the
    container — per-constituent intent does NOT override container
    non-applicability). Each queued record carries
    genre_resolution_state_at_queueing=UNRESOLVED because constituent
    genre is unknown at intake; synthesis acquires constituent metadata
    later and applies/rejects per the standard INV-SRC-0012 3-axis gate
    via ``resolve_pending_level_override``.
  test_type: deterministic
