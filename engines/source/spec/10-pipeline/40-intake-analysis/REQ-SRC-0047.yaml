id: REQ-SRC-0047
type: requirement
status: confirmed
title: Owner override pathway for level at intake
topic: metadata
layer: pipeline
step: intake_analysis
priority: medium
confidence: medium
provenance: deep_research
source: 'dr-reports/dr-chatgpt-level-detection-20260416.yaml (SEC-4)'
created: '2026-04-16'
updated: '2026-04-16'
depends_on:
- DEC-SRC-0003
- INV-SRC-0011
- INV-SRC-0012
impacts:
- level_metadata
rationale: >-
  ChatGPT Deep Research dr-chatgpt-level-detection-20260416 (SEC-4, grounded in
  paragraphs p16 and p20) established that while the source engine must not
  infer level from shallow metadata (INV-SRC-0011), the owner retains authority
  to assert a level directly at intake when he has prior knowledge of the
  text. The override pathway is the only mechanism by which SourceMetadata.level
  is populated before synthesis runs, and every override is recorded with
  explicit provenance so the downstream synthesis engine can distinguish
  owner-asserted values from its own content-derived classifications. The
  override is rejected when the declared value is not a valid WorkLevel enum
  value (INV-SRC-0011's enum discipline) and when the source's genre falls in
  the non-applicable set (INV-SRC-0012).
behavior:
  trigger: The owner supplies an optional level override on a RawUploadRecord or equivalent intake surface when admitting a new source.
  preconditions:
  - owner_level_override is present on the intake payload and set to one of the WorkLevel enum values (beginner, intermediate, advanced, specialist).
  - The source's genre has been classified by metadata deliberation (REQ-SRC-0030) OR is still pending (override validation is deferred to the genre-resolved point when genre is not yet known at the intake surface).
  postconditions:
  - SourceMetadata.level is populated with the exact WorkLevel enum value provided by owner_level_override.
  - An audit-trail entry is written with provenance="owner_override", the override value, and an ISO 8601 timestamp of when the override was applied.
  - The override value survives through source admission and normalization handoff packaging unchanged (per REQ-SRC-0007 AC-3).
  error_conditions:
  - condition: owner_level_override is present but the value is not one of the WorkLevel enum values (beginner, intermediate, advanced, specialist).
    action: Reject the override with SRC-E-LEVEL-OVERRIDE-INVALID; SourceMetadata.level remains null.
    severity: fatal
  - condition: owner_level_override is provided on a source whose genre is one of the non-applicable set from INV-SRC-0012 (mushaf, hadith_collection, rijal_dictionary, majmu).
    action: Reject the override with SRC-E-LEVEL-OVERRIDE-NONAPPLICABLE; SourceMetadata.level remains null.
    severity: fatal
acceptance_criteria:
- id: AC-1
  given: tests/fixtures/shamela_real/06_usul/book.htm (genre="matn" or "sharh") submitted with owner_level_override="intermediate"
  when: intake analysis processes the raw upload
  then: SourceMetadata.level="intermediate", an audit-trail entry is recorded with provenance="owner_override" and a non-null timestamp, and the override survives normalization handoff unchanged.
  test_type: deterministic
- id: AC-2
  given: tests/fixtures/shamela_real/06_usul/book.htm submitted with owner_level_override="expert" (not a WorkLevel enum value)
  when: intake analysis processes the raw upload
  then: The override is rejected with SRC-E-LEVEL-OVERRIDE-INVALID and SourceMetadata.level remains null.
  test_type: deterministic
- id: AC-3
  given: A source with SourceMetadata.genre="mushaf" submitted with owner_level_override="beginner"
  when: intake analysis processes the raw upload
  then: The override is rejected with SRC-E-LEVEL-OVERRIDE-NONAPPLICABLE and SourceMetadata.level remains null.
  test_type: deterministic
