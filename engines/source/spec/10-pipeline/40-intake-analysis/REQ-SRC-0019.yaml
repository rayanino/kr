id: REQ-SRC-0019
type: requirement
status: confirmed
title: Source-work identification and collection matching
topic: identity
layer: pipeline
step: intake_analysis
priority: critical
confidence: high
provenance: owner_interview
source: Derived from owner correction on 2026-04-14. Narrowed to source-work identification and collection matching after contract-architect review found 4 sub-analyses in one atom is untestable. Completeness analysis moved to REQ-SRC-0036, integrity analysis moved to REQ-SRC-0037.
created: '2026-04-14'
updated: '2026-04-14'
depends_on:
- REQ-SRC-0018
- REQ-SRC-0017
- REQ-SRC-0020
- REQ-SRC-0021
impacts:
- intake_dossier
- work_identity
- collection_matching
behavior:
  trigger: Intake analysis receives a frozen, container-classified source candidate.
  preconditions:
  - A raw_upload_record and frozen_source record exist for the same candidate.
  - container_classification has completed.
  - One intake-analysis team runs with fixed subroles; this atom governs the source-work identification and collection matching subroles.
  postconditions:
  - An intake_dossier is written with non-null dossier_id, title_evidence, work_identity_proposal, and collection_match_candidates.
  - work_identity_proposal.candidates preserves one or more evidence-backed candidate work identities without declaring them authoritative yet.
  - collection_match_candidates records whether the work matches an existing admitted source, an edition group, or has no match.
  - title_evidence preserves all title signals (metadata card title, title page text, colophon title, filename-derived title) with provenance per INV-SRC-0009.
  - "Completeness analysis is handled by REQ-SRC-0036. Integrity analysis is handled by REQ-SRC-0037. Metadata deliberation consumes the combined intake_dossier from all three sub-analyses."
  error_conditions:
  - condition: One or more required intake-analysis subroles fail to emit an evidence-backed result for the candidate.
    action: Abort intake analysis with SRC-E-INTAKE-TEAM-INCOMPLETE.
    severity: blocking
  - condition: Source-work identification fails to produce at least one candidate work identity.
    action: Abort intake analysis with SRC-E-NO-WORK-IDENTITY.
    severity: blocking
acceptance_criteria:
- id: AC-1
  given: tests/fixtures/shamela_real/03_fiqh/book.htm
  when: source-work identification executes
  then: intake_dossier.dossier_id is non-empty, len(intake_dossier.title_evidence) >= 1, len(intake_dossier.work_identity_proposal.candidates) >= 1.
  test_type: integration
- id: AC-2
  given: tests/fixtures/shamela_real/11_multi_small
  when: source-work identification executes
  then: len(intake_dossier.work_identity_proposal.candidates) >= 1 and collection_match_candidates is present.
  test_type: integration
