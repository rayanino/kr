id: REQ-SRC-0007
type: requirement
status: confirmed
title: Level field preservation across source-engine handoff
topic: metadata
layer: pipeline
step: source_admission_and_normalization_handoff
priority: medium
confidence: high
provenance: deep_research
source: >-
  Derived from OF-SRC-0007; moved to step 60 on 2026-04-14 because the rule
  governs handoff packaging rather than metadata deliberation itself.
  Amended on 2026-04-16 per dr-chatgpt-level-detection-20260416.yaml
  (SEC-5). Further amended on 2026-04-17 after the 3-of-3 unanimous
  OPT-B adjudication (Codex CLI, Gemini CLI runs 1 and 2, Gemini DR):
  (a) explicit precondition that owner_level_override passed the
  CON-SRC-0011 enum-value whitelist before reaching handoff packaging;
  (b) new level_status (CON-SRC-0004 middle-path) must serialize
  alongside level — preservation contract extends to both fields.
created: '2026-04-14'
updated: '2026-04-17'
depends_on:
- OF-SRC-0007
- CON-SRC-0004
- CON-SRC-0011
- DEC-SRC-0003
- REQ-SRC-0047
impacts:
- level_metadata
- source_normalization_boundary
behavior:
  trigger: The source engine packages SourceMetadata for the normalization handoff bundle.
  preconditions:
  - The SourceMetadata contract defines a nullable level field AND a mandatory level_status enum field (per CON-SRC-0004 middle-path).
  - Any populated level value has already been decided before handoff packaging begins — either via a valid owner_level_override (validated against the CON-SRC-0011 WorkLevel enum whitelist at intake per REQ-SRC-0047) or an upstream authoritative write.
  - When level is populated, the upstream emitter has set level_status="assigned"; when level is null, level_status is one of {pending_taxonomy, non_applicable_reference} per source-engine emission rules (downstream engines may also emit unprocessable_error).
  postconditions:
  - The handoff payload always includes the level key.
  - The handoff payload always includes the level_status key with a non-null enum value.
  - A populated level value is passed through unchanged.
  - An unknown level is serialized as null rather than omitted, paired with a non-null level_status.
  - A level value populated via owner_level_override is passed through unchanged with the same string value received at intake, paired with level_status="assigned".
  - The level_status value is passed through unchanged — handoff packaging never rewrites, defaults, or reinterprets it.
  error_conditions:
  - condition: The handoff payload omits the level key.
    action: Reject serialization with SRC-E-LEVEL-FIELD-MISSING.
    severity: blocking
  - condition: The handoff payload omits the level_status key OR carries a null/empty level_status value.
    action: Reject serialization with SRC-E-LEVEL-STATUS-MISSING.
    severity: blocking
  - condition: level is populated but level_status != "assigned" (cross-field invariant violation).
    action: Reject serialization with SRC-E-LEVEL-STATUS-INVARIANT-VIOLATION.
    severity: blocking
  - condition: level is null but level_status == "assigned" (cross-field invariant violation).
    action: Reject serialization with SRC-E-LEVEL-STATUS-INVARIANT-VIOLATION.
    severity: blocking
acceptance_criteria:
- id: AC-1
  given: >-
    tests/fixtures/shamela_real/06_usul/book.htm with
    SourceMetadata.level="intermediate" and level_status="assigned"
    (populated via valid owner_level_override)
  when: source-to-normalization handoff packaging executes
  then: >-
    The serialized payload contains level="intermediate" and
    level_status="assigned", both unchanged from the upstream emission.
  test_type: deterministic
- id: AC-2
  given: >-
    tests/fixtures/shamela_real/12_multi_muq/001.htm with
    SourceMetadata.level=null and level_status="pending_taxonomy"
  when: source-to-normalization handoff packaging executes
  then: >-
    The serialized payload contains the key level with value null AND
    the key level_status with value "pending_taxonomy", both present
    and neither omitted.
  test_type: deterministic
- id: AC-3
  given: >-
    A source whose SourceMetadata.level was populated via
    owner_level_override="advanced" at intake (validated against
    CON-SRC-0011 WorkLevel whitelist per REQ-SRC-0047 AC-1), with
    level_status="assigned"
  when: source-to-normalization handoff packaging executes
  then: >-
    The serialized payload contains level="advanced" with the override
    value unchanged and level_status="assigned" unchanged.
  test_type: deterministic
- id: AC-4
  given: >-
    A source with genre="mushaf" (non-applicable per INV-SRC-0012),
    SourceMetadata.level=null, level_status="non_applicable_reference"
  when: source-to-normalization handoff packaging executes
  then: >-
    The serialized payload contains level=null and
    level_status="non_applicable_reference".
  test_type: deterministic
- id: AC-5
  given: >-
    A handoff packaging path that would have emitted level="beginner"
    with level_status="pending_taxonomy" (cross-field invariant
    violation)
  when: handoff packaging executes
  then: >-
    Packaging is rejected with SRC-E-LEVEL-STATUS-INVARIANT-VIOLATION
    and no partial bundle is emitted.
  test_type: deterministic
