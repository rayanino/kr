id: REQ-SRC-0007
type: requirement
status: confirmed
title: Level field preservation across source-engine handoff
topic: metadata
layer: pipeline
step: source_admission_and_normalization_handoff
priority: medium
confidence: high
provenance: deep_research
source: >-
  Derived from OF-SRC-0007; moved to step 60 on 2026-04-14 because the rule
  governs handoff packaging rather than metadata deliberation itself. Amended
  on 2026-04-16 per dr-reports/dr-chatgpt-level-detection-20260416.yaml
  (SEC-5) and contract-architect-review.yaml's prior AMEND verdict. The prior
  dependency on the unresolved level-ownership question is now closed
  (DEC-SRC-0003 resolves the architectural choice, OQ-SRC-0001 is superseded),
  so this atom is reduced to a pure handoff-preservation contract for the
  level field with no remaining architectural-readiness blocker.
created: '2026-04-14'
updated: '2026-04-16'
depends_on:
- OF-SRC-0007
- CON-SRC-0004
- DEC-SRC-0003
impacts:
- level_metadata
- source_normalization_boundary
behavior:
  trigger: The source engine packages SourceMetadata for the normalization handoff bundle.
  preconditions:
  - The SourceMetadata contract defines a nullable level field.
  - Any populated level value has already been decided before handoff packaging begins (either via owner override or an upstream authoritative write).
  postconditions:
  - The handoff payload always includes the level key.
  - A populated level value is passed through unchanged.
  - An unknown level is serialized as null rather than omitted.
  - A level value populated via owner_level_override is passed through unchanged with the same string value received at intake.
  error_conditions:
  - condition: The handoff payload omits the level key.
    action: Reject serialization with SRC-E-LEVEL-FIELD-MISSING.
    severity: blocking
acceptance_criteria:
- id: AC-1
  given: tests/fixtures/shamela_real/06_usul/book.htm with SourceMetadata.level="intermediate"
  when: source-to-normalization handoff packaging executes
  then: The serialized payload contains level="intermediate".
  test_type: deterministic
- id: AC-2
  given: tests/fixtures/shamela_real/12_multi_muq/001.htm with SourceMetadata.level=null
  when: source-to-normalization handoff packaging executes
  then: The serialized payload contains the key level with value null.
  test_type: deterministic
- id: AC-3
  given: A source whose SourceMetadata.level was populated via owner_level_override="advanced" at intake
  when: source-to-normalization handoff packaging executes
  then: The serialized payload contains level="advanced" with the override value unchanged.
  test_type: deterministic
