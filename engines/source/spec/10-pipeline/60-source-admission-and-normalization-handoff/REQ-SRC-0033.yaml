id: REQ-SRC-0033
type: requirement
status: proposed
title: Volume count and intake timestamp derivation
topic: handoff
layer: pipeline
step: source_admission_and_normalization_handoff
priority: high
confidence: high
provenance: coworker_review
source: Added after contract-architect review found volume_count and intake_timestamp are mandatory in CON-SRC-0004 but no requirement atom produces them.
created: '2026-04-14'
updated: '2026-04-14'
depends_on:
- CON-SRC-0004
- REQ-SRC-0019
- REQ-SRC-0025
impacts:
- source_metadata_completeness
- handoff_contract
behavior:
  trigger: Source admission finalizes the SourceMetadata record for an accepted source.
  preconditions:
  - intake_dossier.declared_vs_observed_counts is available.
  - Source admission has decided to accept the source.
  postconditions:
  - source_metadata.volume_count is set to the observed volume count from intake_dossier.declared_vs_observed_counts.observed_volume_count for multi-volume sources, or 1 for single-file sources.
  - source_metadata.intake_timestamp is set to the UTC ISO 8601 timestamp at the moment SourceMetadata finalization completes.
  - source_metadata.registry_entry_id is assigned as a unique identifier linking this SourceMetadata to its entry in the official source_collection registry.
  error_conditions:
  - condition: observed_volume_count is null or missing from the intake dossier for a multi-volume source.
    action: Abort admission with SRC-E-VOLUME-COUNT-MISSING.
    severity: blocking
acceptance_criteria:
- id: AC-1
  given: tests/fixtures/shamela_real/03_fiqh/book.htm after source-engine acceptance
  when: SourceMetadata finalization runs
  then: source_metadata.volume_count=1 and source_metadata.intake_timestamp is a valid ISO 8601 UTC timestamp.
  test_type: integration
- id: AC-2
  given: tests/fixtures/shamela_real/11_multi_small after source-engine acceptance
  when: SourceMetadata finalization runs
  then: source_metadata.volume_count=3 and source_metadata.registry_entry_id is non-empty.
  test_type: integration
