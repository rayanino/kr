rationale: >-
  ChatGPT Deep Research dr-chatgpt-level-detection-20260416 (SEC-3,
  grounded in paragraphs p10, f2, f9, f11, r1, r3, r4, r7) identified
  the exact signals the downstream (taxonomy / synthesis) engines need
  to classify reading level once content analysis runs. The source
  engine never infers level itself (DEC-SRC-0003, INV-SRC-0011), but
  it owns the bibliographic evidence surface — edition_group_id,
  edition_info, publisher, muhaqiq_output, page_layout_hint,
  matn_embedding_style, pdf_text_layer_status, structural_format,
  is_multi_layer, volume_count, holding_id, title_arabic, genre,
  science_scope, and genre_dispute — plus the upstream dossier signal
  contains_isnad_chains. Losing any of these signals at handoff strips
  the downstream classifier of the evidence it needs, which forces
  either a weaker guess or a permanent level=null for sources where a
  content-based assessment was still possible. D-023 metadata
  preservation applies at both the top level (populated signals pass
  through unchanged, absent signals serialize as null rather than being
  omitted) AND nested levels (structured sub-fields recursively honor
  the same rule).
behavior:
  trigger: The source engine packages SourceMetadata for the normalization handoff bundle.
  preconditions:
  - Metadata deliberation and intake analysis have produced the signal set required by CON-SRC-0004 and REQ-SRC-0037 on the SourceMetadata record and intake_dossier.
  - The handoff packaging stage has read access to SourceMetadata and the intake_dossier.contains_isnad_chains field.
  postconditions:
  - D-023 metadata preservation — the governing rule — applies to every signal listed below AND recursively to every nested structured field within those signals. Absent top-level signals serialize as null-valued keys; absent sub-fields inside nested structures (e.g., muhaqiq_output.death_date, work_relationships[i].target_work_author) likewise serialize as null-valued keys, never omitted.
  - The required-preserved signal set is {title_arabic, genre, science_scope, is_multi_layer, structural_format, edition_group_id, edition_info, publisher, muhaqiq_output, page_layout_hint, matn_embedding_style, pdf_text_layer_status, volume_count, holding_id, genre_dispute, author_output} on SourceMetadata and {contains_isnad_chains} on the intake_dossier surface — 17 signals total. Any change to this set must amend this atom's postconditions and acceptance_criteria in lock-step. author_output was added on 2026-04-21 per 3-way AMEND consensus (Codex CLI + Gemini CLI 2 runs) after the retroactive review of commit bf4354399 — author_output.positions is the canonical depth-2 list-item Optional structure in the classical tahqiq domain, so AC-7's list-item D-023 recursion test targets it rather than muhaqiq_output.positions (aspirational, see source field).
  - SourceMetadata.title_arabic is serialized in the handoff payload with the exact value populated upstream.
  - SourceMetadata.genre is serialized in the handoff payload with the exact value populated upstream.
  - SourceMetadata.science_scope is serialized in the handoff payload with the exact list populated upstream.
  - SourceMetadata.is_multi_layer is serialized in the handoff payload with the exact boolean populated upstream.
  - SourceMetadata.structural_format is serialized in the handoff payload with the exact value populated upstream.
  - SourceMetadata.edition_group_id is serialized in the handoff payload; when not populated the key is present with value null.
  - SourceMetadata.edition_info is serialized in the handoff payload with recursive D-023 preservation; when not populated the key is present with value null; when populated, each of its nested sub-fields (edition_label, edition_year, imprint_city, tahqiq_version) honors the same rule.
  - SourceMetadata.publisher is serialized in the handoff payload; when not populated the key is present with value null.
  - SourceMetadata.muhaqiq_output is serialized in the handoff payload with recursive D-023 preservation; when not populated the key is present with value null; when populated, each of its nested sub-fields (name, status, positions, death_date, attribution_confidence) honors the same rule.
  - SourceMetadata.page_layout_hint is serialized in the handoff payload; when not populated the key is present with value null.
  - SourceMetadata.matn_embedding_style is serialized in the handoff payload; when not populated the key is present with value null.
  - SourceMetadata.pdf_text_layer_status is serialized in the handoff payload; when not populated (non-PDF source) the key is present with value null.
  - SourceMetadata.volume_count is serialized in the handoff payload with the exact value populated upstream.
  - SourceMetadata.holding_id is serialized in the handoff payload; when not populated the key is present with value null.
  - SourceMetadata.genre_dispute is serialized in the handoff payload with recursive D-023 preservation; when not populated (no disputed secondary genre) the key is present with value null; when populated, each alternate-genre position (genre_candidate, supporting_evidence, confidence) honors the same rule.
  - SourceMetadata.author_output is serialized in the handoff payload with recursive D-023 preservation; author_output is a mandatory SourceMetadata field per CON-SRC-0004 so the top-level key is always present with a populated object; each entry in author_output.positions (AuthorOutputPosition per contracts.py:676-712) is a structured object whose Optional sub-fields (canonical_id, canonical_match_name, full_name_lineage, ism, kunya, death_hijri, death_hijri_verification, among others) honor the same recursive rule — absent sub-fields serialize as null-valued keys at the list-item level, never omitted. This is the depth-2 list-item D-023 recursion case exercised by AC-7.
  - intake_dossier.contains_isnad_chains is propagated into the normalization handoff bundle unchanged; when not populated the key is present with value null.
  - No evidence signal listed above is omitted from the payload — absent values serialize as null per D-023 metadata preservation, at every structural depth.
  error_conditions:
  - condition: Any signal in the required-preserved 17-signal set is missing (key absent, not null) from the handoff payload.
    action: Abort handoff packaging with SRC-E-HANDOFF-EVIDENCE-DROPPED; the error message identifies the specific signal and the structural depth at which the omission occurred. The correction path per CON-SRC-0012 blocking-tier semantics is to re-run intake analysis (REQ-SRC-0037) on the already-frozen source so the absent signal is re-emitted; handoff packaging then retries.
    severity: blocking
  - condition: A nested structured signal (muhaqiq_output, edition_info, genre_dispute, author_output) is populated at the top level but has sub-field omissions (key absent, not null) within its nested object — including sub-fields nested inside list elements (e.g. author_output.positions[i].death_hijri).
    action: Abort handoff packaging with SRC-E-HANDOFF-EVIDENCE-DROPPED-NESTED; the error message identifies the specific sub-field and the parent signal, using array-index notation for list-item sub-fields (e.g. "author_output.positions[0].death_hijri"). Correction path identical to the top-level case — re-run intake analysis to re-emit the nested sub-field, then retry handoff packaging.
    severity: blocking
acceptance_criteria:
- id: AC-1
  given: >-
    A fully populated intake for tests/fixtures/shamela_real/06_usul/book.htm
    with title_arabic, genre, science_scope, is_multi_layer,
    structural_format, edition_group_id, edition_info, publisher,
    muhaqiq_output, page_layout_hint, matn_embedding_style,
    pdf_text_layer_status, volume_count, holding_id, genre_dispute, and
    intake_dossier.contains_isnad_chains all populated
  when: source admission and normalization handoff packaging executes
  then: >-
    The serialized payload contains every signal from the 17-signal
    required-preserved set with the exact values populated upstream,
    no signal is omitted, and every nested sub-field is either
    populated with its exact value or serialized as null.
  test_type: integration
- id: AC-2
  given: >-
    A source whose muhaqiq_output is legitimately absent (for example a
    Shamela source without a critical-edition muhaqqiq)
  when: source admission and normalization handoff packaging executes
  then: >-
    The serialized payload contains the key muhaqiq_output with value
    null (not omitted).
  test_type: deterministic
- id: AC-3
  given: >-
    A handoff packaging path that would have dropped the edition_info
    key entirely from the serialized payload
  when: handoff packaging executes
  then: >-
    The packaging is aborted with SRC-E-HANDOFF-EVIDENCE-DROPPED and no
    partial bundle is emitted.
  test_type: deterministic
- id: AC-4
  given: >-
    A source whose metadata deliberation produced genre_dispute
    populated with two alternate-genre positions (genre_candidate_1 +
    supporting_evidence_1 + confidence_1; genre_candidate_2 +
    supporting_evidence_2 + confidence_2)
  when: source admission and normalization handoff packaging executes
  then: >-
    The serialized payload contains the key genre_dispute with both
    alternate positions preserved intact — neither the top-level
    genre_dispute key nor any nested sub-field (genre_candidate,
    supporting_evidence, confidence) is omitted.
  test_type: integration
- id: AC-5
  given: >-
    A source whose intake_dossier.contains_isnad_chains was populated
    true during intake analysis (for example, a hadith collection
    processed through REQ-SRC-0019)
  when: source admission and normalization handoff packaging executes
  then: >-
    The serialized handoff bundle contains
    intake_dossier.contains_isnad_chains=true, propagated unchanged
    from the intake_dossier surface.
  test_type: integration
- id: AC-6
  given: >-
    A handoff packaging path that would have serialized muhaqiq_output
    as a nested object with its `death_date` sub-field KEY absent
    (rather than set to null) because the upstream deliberation did not
    populate it
  when: handoff packaging executes
  then: >-
    The packaging is aborted with SRC-E-HANDOFF-EVIDENCE-DROPPED-NESTED
    identifying muhaqiq_output.death_date as the omitted sub-field and
    no partial bundle is emitted.
  test_type: deterministic
- id: AC-7
  given: >-
    A handoff packaging path where author_output.positions is a non-
    empty list of AuthorOutputPosition entries (the canonical multi-
    position attribution shape established at contracts.py:676-712
    for disputed authorship across نُسَخ / manuscript witnesses) and
    the first position element has its `death_hijri` sub-field KEY
    absent (rather than set to null) because the upstream multi-model
    consensus did not populate a death-date for that candidate-author
    position — the depth-2 case where the Optional sub-field is
    nested inside a list item rather than nested directly as a
    scalar child of a top-level signal (AC-6 covers the direct-child
    scalar case; AC-7 covers the list-item field that Pydantic
    exclude_unset can silently drop when iterating list elements).
    Path choice rationale: all three retroactive-review evaluators
    (Codex CLI structural + Gemini CLI 2 independent scholarly runs)
    reached 3-way consensus that author_output.positions[].death_
    hijri is the scholarly- and structurally-correct depth-2 list-
    item path — authorship disputes across manuscripts produce
    competing multi-position attributions with per-position death
    dates in classical tahqiq practice, whereas muhaqqiqs act as a
    unified entity on the title page of a critical edition and do
    not carry multi-position attributions.
  when: handoff packaging executes
  then: >-
    The packaging is aborted with SRC-E-HANDOFF-EVIDENCE-DROPPED-NESTED
    identifying author_output.positions[0].death_hijri as the
    omitted sub-field and no partial bundle is emitted.
  test_type: deterministic
- id: AC-8
  given: >-
    A Shamela mushaf-style SourceMetadata where the four signals
    Shamela legitimately lacks — edition_info, muhaqiq_output,
    publisher, matn_embedding_style — are all set to None, along
    with the other Optional signals page_layout_hint,
    pdf_text_layer_status (non-PDF source), holding_id, and
    genre_dispute that may also be legitimately absent for a
    Shamela intake. Every mandatory signal on SourceMetadata is
    populated normally (title_arabic, genre, science_scope,
    is_multi_layer, structural_format, edition_group_id,
    volume_count, author_output, and the intake_dossier
    contains_isnad_chains surface)
  when: source admission and normalization handoff packaging
    executes and the resulting bundle is serialized via Pydantic
    model_dump(mode="json") — the default serialization mode used
    by admission.py _build_handoff_bundle without exclude_none or
    exclude_unset overrides
  then: >-
    The serialized JSON payload contains every key from the
    17-signal required-preserved set. Legitimately-absent signals
    (edition_info, muhaqiq_output, publisher, matn_embedding_style,
    page_layout_hint, pdf_text_layer_status, holding_id,
    genre_dispute) appear as keys with value null — the null-key
    contract from REQ-SRC-0046 postconditions is satisfied by
    Pydantic v2 default serialization of Optional=None fields as
    JSON null. No SRC-E-HANDOFF-EVIDENCE-DROPPED or
    SRC-E-HANDOFF-EVIDENCE-DROPPED-NESTED error is raised. This AC
    closes the ADV-010 Shamela happy-path concern by providing the
    spec-linked proof that the null-key contract is operational on
    Shamela mushaf intakes — and it guards against a future
    exclude_none=True argument silently breaking the contract in
    a model_dump call.
  test_type: deterministic
