rationale: >-
  ChatGPT Deep Research dr-chatgpt-level-detection-20260416 (SEC-3,
  grounded in paragraphs p10, f2, f9, f11, r1, r3, r4, r7) identified
  the exact signals the downstream (taxonomy / synthesis) engines need
  to classify reading level once content analysis runs. The source
  engine never infers level itself (DEC-SRC-0003, INV-SRC-0011), but
  it owns the bibliographic evidence surface — edition_info,
  publisher, muhaqiq_output, page_layout_hint, matn_embedding_style,
  pdf_text_layer_status, structural_format, is_multi_layer,
  volume_count, title_arabic, genre, science_scope, author_output,
  and genre_dispute — plus the upstream dossier signal
  contains_isnad_chains. (Edition-group and holding linkage IDs
  live on distinct models EditionGroup and EditionHolding and are
  governed by DEC-SRC-0018 / DEC-SRC-0020, not by this handoff-
  surface contract — closure-wave narrowing 2026-04-23.) Losing any of these signals at handoff strips
  the downstream classifier of the evidence it needs, which forces
  either a weaker guess or a permanent level=null for sources where a
  content-based assessment was still possible. D-023 metadata
  preservation applies at both the top level (populated signals pass
  through unchanged, absent signals serialize as null rather than being
  omitted) AND nested levels (structured sub-fields recursively honor
  the same rule).
behavior:
  trigger: The source engine packages SourceMetadata for the normalization handoff bundle.
  preconditions:
  - Metadata deliberation and intake analysis have produced the signal set required by CON-SRC-0004 and REQ-SRC-0037 on the SourceMetadata record and intake_dossier.
  - The handoff packaging stage has read access to SourceMetadata and the intake_dossier.contains_isnad_chains field.
  postconditions:
  - D-023 metadata preservation — the governing rule — applies to every signal listed below AND recursively to every declared nested structured field within those signals. Absent top-level signals serialize as null-valued keys; absent sub-fields inside declared nested structures (e.g., muhaqiq_output.last_verified, genre_dispute[i].source_agents, author_output.positions[i].death_hijri) likewise serialize as null-valued keys, never omitted. Flexible dict surfaces such as edition_info preserve upstream-supplied keys recursively; this atom does not invent a fixed EditionInfo child-field set.
  - The required-preserved signal set on SourceMetadata is {title_arabic, genre, science_scope, is_multi_layer, structural_format, edition_info, publisher, muhaqiq_output, page_layout_hint, matn_embedding_style, pdf_text_layer_status, volume_count, genre_dispute, author_output} — 14 signals — plus {contains_isnad_chains} on the intake_dossier surface, for 15 signals total on surfaces this atom governs. Any change to this set must amend this atom's postconditions and acceptance_criteria in lock-step. author_output was added on 2026-04-21 per 3-way AMEND consensus (Codex CLI + Gemini CLI 2 runs) after the retroactive review of commit bf4354399 — author_output.positions is the canonical depth-2 list-item Optional structure in the classical tahqiq domain, so AC-7's list-item D-023 recursion test targets it rather than muhaqiq_output.positions (aspirational, see source field). The edition_group_id and holding_id linkage signals — listed in earlier drafts of this atom — are NOT SourceMetadata fields in the current typed data model (contracts.py:880 EditionGroup.edition_group_id, contracts.py:893 EditionHolding.holding_id) and the NormalizationHandoffBundle (contracts.py:1082) does not carry EditionGroup or EditionHolding objects. Admission constructs the handoff bundle BEFORE reconcile_holdings runs, so those IDs are not yet populated at the surface this atom governs. Their D-023 preservation is delegated to the registry/reconciliation surface (DEC-SRC-0018 EditionHolding, DEC-SRC-0020 supersession). Closure-wave amendment 2026-04-23 (Codex CAF-8, follow-up 31 resolved on path a) narrowed the signal set from 17 to 15 to match the actual handoff surface; the previous 17-signal phrasing was paper-reconciliation drift surfaced by the AC-8 Shamela null-key test.
  - SourceMetadata.title_arabic is serialized in the handoff payload with the exact value populated upstream.
  - SourceMetadata.genre is serialized in the handoff payload with the exact value populated upstream.
  - SourceMetadata.science_scope is serialized in the handoff payload with the exact list populated upstream.
  - SourceMetadata.is_multi_layer is serialized in the handoff payload with the exact boolean populated upstream.
  - SourceMetadata.structural_format is serialized in the handoff payload with the exact value populated upstream.
  - SourceMetadata.edition_info is serialized in the handoff payload with recursive D-023 preservation; when not populated the key is present with value null; when populated, every upstream-supplied key and nested value is preserved recursively. This flexible dict surface does not require fixed child fields until a dedicated EditionInfo contract exists.
  - SourceMetadata.publisher is serialized in the handoff payload; when not populated the key is present with value null.
  - SourceMetadata.muhaqiq_output is serialized in the handoff payload with recursive D-023 preservation; when not populated the key is present with value null; when populated, each MuhaqiqAssessment sub-field (standing_level, evidence_sources, last_verified) honors the same rule. last_verified is the assessment verification date / timestamp, not a muhaqqiq biography or death-date field.
  - SourceMetadata.page_layout_hint is serialized in the handoff payload; when not populated the key is present with value null.
  - SourceMetadata.matn_embedding_style is serialized in the handoff payload; when not populated the key is present with value null.
  - SourceMetadata.pdf_text_layer_status is serialized in the handoff payload; when not populated (non-PDF source) the key is present with value null.
  - SourceMetadata.volume_count is serialized in the handoff payload with the exact value populated upstream.
  - SourceMetadata.genre_dispute is serialized in the handoff payload with recursive D-023 preservation; when not populated (no disputed secondary genre) the key is present as an empty list; when populated, each alternate-genre position (genre_candidate, supporting_evidence, confidence, source_agents) honors the same rule. Positions are ordered by descending confidence and positions[0] is the primary scalar SourceMetadata.genre winner.
  - SourceMetadata.author_output is serialized in the handoff payload with recursive D-023 preservation; author_output is a mandatory SourceMetadata field per CON-SRC-0004 so the top-level key is always present with a populated object; each entry in author_output.positions (AuthorOutputPosition per contracts.py:676-712) is a structured object whose Optional sub-fields (canonical_id, canonical_match_name, full_name_lineage, ism, kunya, death_hijri, death_hijri_verification, among others) honor the same recursive rule — absent sub-fields serialize as null-valued keys at the list-item level, never omitted. This is the depth-2 list-item D-023 recursion case exercised by AC-7.
  - intake_dossier.contains_isnad_chains is propagated into the normalization handoff bundle unchanged; when not populated the key is present with value null.
  - No evidence signal listed above is omitted from the payload — absent values serialize as null per D-023 metadata preservation, at every structural depth.
  error_conditions:
  - condition: Any signal in the required-preserved 15-signal set (14 on SourceMetadata plus contains_isnad_chains on intake_dossier) is missing (key absent, not null) from the handoff payload.
    action: Abort handoff packaging with SRC-E-HANDOFF-EVIDENCE-DROPPED; the error message identifies the specific signal and the structural depth at which the omission occurred. The correction path per CON-SRC-0012 blocking-tier semantics is to re-run intake analysis (REQ-SRC-0037) on the already-frozen source so the absent signal is re-emitted; handoff packaging then retries. Arabic localization MUST use إيقاف مؤقت (īqāf muʾaqqat — temporary halt), NOT ردّ (radd) which implies substantive rejection in hadith-science terminology; the HANDOFF_ prefix and the إيقاف مؤقت localization together preserve the scholarly boundary between pipeline logistics and hadith-science إعلال / جرح / تضعيف (closure-wave Run A DVF-4, Ibn al-Ṣalāḥ Muqaddima).
    severity: blocking
  - condition: A declared nested structured signal (muhaqiq_output, genre_dispute, author_output) is populated at the top level but has sub-field omissions (key absent, not null) within its nested object — including sub-fields nested inside list elements (e.g. genre_dispute[i].source_agents or author_output.positions[i].death_hijri). Flexible dict surfaces such as edition_info still preserve upstream-supplied keys recursively, but this atom does not assert absent fixed edition_info child names.
    action: Abort handoff packaging with SRC-E-HANDOFF-EVIDENCE-DROPPED-NESTED; the error message identifies the specific sub-field and the parent signal, using array-index notation for list-item sub-fields (e.g. "author_output.positions[0].death_hijri"). Correction path identical to the top-level case — re-run intake analysis to re-emit the nested sub-field, then retry handoff packaging.
    severity: blocking
acceptance_criteria:
- id: AC-1
  given: >-
    A fully populated intake for tests/fixtures/shamela_real/06_usul/book.htm
    with title_arabic, genre, science_scope, is_multi_layer,
    structural_format, edition_info, publisher, muhaqiq_output,
