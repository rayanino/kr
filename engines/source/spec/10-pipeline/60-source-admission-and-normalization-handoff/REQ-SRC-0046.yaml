id: REQ-SRC-0046
type: requirement
status: confirmed
title: Evidence preservation for downstream level inference
topic: handoff
layer: pipeline
step: source_admission_and_normalization_handoff
priority: critical
confidence: high
provenance: deep_research
source: 'dr-reports/dr-chatgpt-level-detection-20260416.yaml (SEC-3)'
created: '2026-04-16'
updated: '2026-04-16'
depends_on:
- CON-SRC-0004
- REQ-SRC-0007
- REQ-SRC-0037
impacts:
- level_metadata
- source_normalization_boundary
- downstream_level_inference
rationale: >-
  ChatGPT Deep Research dr-chatgpt-level-detection-20260416 (SEC-3, grounded in
  paragraphs p10, f2, f9, f11, r1, r3, r4, r7) identified the exact signals the
  synthesis engine needs to classify reading level once content analysis runs.
  The source engine never infers level itself (DEC-SRC-0003, INV-SRC-0011), but
  it owns the bibliographic evidence surface — edition_group_id, edition_info,
  publisher, muhaqiq_output, page_layout_hint, matn_embedding_style,
  pdf_text_layer_status, structural_format, is_multi_layer, volume_count, and
  holding_id — plus the upstream dossier signal contains_isnad_chains. Losing
  any of these signals at handoff strips the downstream classifier of the
  evidence it needs, which forces either a weaker guess or a permanent
  level=null for sources where a content-based assessment was still possible.
  D-023 metadata preservation applies: populated signals pass through unchanged,
  absent signals serialize as null rather than being omitted.
behavior:
  trigger: The source engine packages SourceMetadata for the normalization handoff bundle.
  preconditions:
  - Metadata deliberation and intake analysis have produced the signal set required by CON-SRC-0004 and REQ-SRC-0037 on the SourceMetadata record and intake_dossier.
  - The handoff packaging stage has read access to SourceMetadata and the intake_dossier.contains_isnad_chains field.
  postconditions:
  - SourceMetadata.title_arabic is serialized in the handoff payload with the exact value populated upstream.
  - SourceMetadata.genre is serialized in the handoff payload with the exact value populated upstream.
  - SourceMetadata.science_scope is serialized in the handoff payload with the exact list populated upstream.
  - SourceMetadata.is_multi_layer is serialized in the handoff payload with the exact boolean populated upstream.
  - SourceMetadata.structural_format is serialized in the handoff payload with the exact value populated upstream.
  - SourceMetadata.edition_group_id is serialized in the handoff payload; when not populated the key is present with value null.
  - SourceMetadata.edition_info is serialized in the handoff payload; when not populated the key is present with value null.
  - SourceMetadata.publisher is serialized in the handoff payload; when not populated the key is present with value null.
  - SourceMetadata.muhaqiq_output is serialized in the handoff payload; when not populated the key is present with value null.
  - SourceMetadata.page_layout_hint is serialized in the handoff payload; when not populated the key is present with value null.
  - SourceMetadata.matn_embedding_style is serialized in the handoff payload; when not populated the key is present with value null.
  - SourceMetadata.pdf_text_layer_status is serialized in the handoff payload; when not populated (non-PDF source) the key is present with value null.
  - SourceMetadata.volume_count is serialized in the handoff payload with the exact value populated upstream.
  - SourceMetadata.holding_id is serialized in the handoff payload; when not populated the key is present with value null.
  - intake_dossier.contains_isnad_chains is propagated into the normalization handoff bundle unchanged; when not populated the key is present with value null.
  - No evidence signal listed above is omitted from the payload — absent values serialize as null per D-023 metadata preservation.
  error_conditions:
  - condition: title_arabic is missing from the handoff payload.
    action: Abort handoff packaging with SRC-E-EVIDENCE-DROPPED.
    severity: fatal
  - condition: genre is missing from the handoff payload.
    action: Abort handoff packaging with SRC-E-EVIDENCE-DROPPED.
    severity: fatal
  - condition: science_scope is missing from the handoff payload.
    action: Abort handoff packaging with SRC-E-EVIDENCE-DROPPED.
    severity: fatal
  - condition: is_multi_layer is missing from the handoff payload.
    action: Abort handoff packaging with SRC-E-EVIDENCE-DROPPED.
    severity: fatal
  - condition: structural_format is missing from the handoff payload.
    action: Abort handoff packaging with SRC-E-EVIDENCE-DROPPED.
    severity: fatal
  - condition: edition_group_id is missing from the handoff payload (not null, but the key itself is absent).
    action: Abort handoff packaging with SRC-E-EVIDENCE-DROPPED.
    severity: fatal
  - condition: edition_info is missing from the handoff payload (not null, but the key itself is absent).
    action: Abort handoff packaging with SRC-E-EVIDENCE-DROPPED.
    severity: fatal
  - condition: publisher is missing from the handoff payload (not null, but the key itself is absent).
    action: Abort handoff packaging with SRC-E-EVIDENCE-DROPPED.
    severity: fatal
  - condition: muhaqiq_output is missing from the handoff payload (not null, but the key itself is absent).
    action: Abort handoff packaging with SRC-E-EVIDENCE-DROPPED.
    severity: fatal
  - condition: page_layout_hint is missing from the handoff payload (not null, but the key itself is absent).
    action: Abort handoff packaging with SRC-E-EVIDENCE-DROPPED.
    severity: fatal
  - condition: matn_embedding_style is missing from the handoff payload (not null, but the key itself is absent).
    action: Abort handoff packaging with SRC-E-EVIDENCE-DROPPED.
    severity: fatal
  - condition: pdf_text_layer_status is missing from the handoff payload (not null, but the key itself is absent).
    action: Abort handoff packaging with SRC-E-EVIDENCE-DROPPED.
    severity: fatal
  - condition: volume_count is missing from the handoff payload.
    action: Abort handoff packaging with SRC-E-EVIDENCE-DROPPED.
    severity: fatal
  - condition: holding_id is missing from the handoff payload (not null, but the key itself is absent).
    action: Abort handoff packaging with SRC-E-EVIDENCE-DROPPED.
    severity: fatal
  - condition: contains_isnad_chains is missing from the handoff bundle (not null, but the key itself is absent).
    action: Abort handoff packaging with SRC-E-EVIDENCE-DROPPED.
    severity: fatal
acceptance_criteria:
- id: AC-1
  given: A fully populated intake for tests/fixtures/shamela_real/06_usul/book.htm with title_arabic, genre, science_scope, is_multi_layer, structural_format, edition_group_id, edition_info, publisher, muhaqiq_output, page_layout_hint, matn_embedding_style, pdf_text_layer_status, volume_count, holding_id, and intake_dossier.contains_isnad_chains all populated
  when: source admission and normalization handoff packaging executes
  then: The serialized payload contains every signal from the populated set with the exact values populated upstream and no signal is omitted.
  test_type: integration
- id: AC-2
  given: A source whose muhaqiq_output is legitimately absent (for example a Shamela source without a critical-edition muhaqqiq)
  when: source admission and normalization handoff packaging executes
  then: The serialized payload contains the key muhaqiq_output with value null (not omitted).
  test_type: deterministic
- id: AC-3
  given: A handoff packaging path that would have dropped the edition_info key entirely from the serialized payload
  when: handoff packaging executes
  then: The packaging is aborted with SRC-E-EVIDENCE-DROPPED and no partial bundle is emitted.
  test_type: deterministic
