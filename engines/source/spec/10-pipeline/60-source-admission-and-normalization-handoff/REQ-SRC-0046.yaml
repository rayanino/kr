id: REQ-SRC-0046
type: requirement
status: confirmed
title: Evidence preservation for downstream level inference
topic: handoff
layer: pipeline
step: source_admission_and_normalization_handoff
priority: critical
confidence: high
provenance: deep_research
source: >-
  Initial formulation on 2026-04-16 from dr-chatgpt-level-detection-20260416.yaml
  SEC-3. Amended on 2026-04-17 after the 3-of-3 unanimous OPT-B
  adjudication (Codex CLI, Gemini CLI runs 1 and 2, Gemini DR) and the
  R1/R2 reviewer wave: (a) nested Optional serialization rule added —
  when a preserved signal carries a nested structured field (e.g.
  muhaqiq_output, work_relationships, display_card), the nested object
  MUST itself honor D-023 and serialize absent sub-fields as explicit
  nulls rather than omitting keys; (b) genre_dispute signal added as
  required-preserved per R1 finding that disputed-genre payloads
  currently drop the secondary positions; (c) dedicated acceptance
  criteria now exercise the two signals most historically dropped at
  handoff (contains_isnad_chains and genre_dispute); (d) depends_on
  corrected to include DEC-SRC-0003 and INV-SRC-0011 because the
  evidence-preservation contract is the mechanism that makes the
  downstream content-only level classification (OPT-B) possible.
  Amended on 2026-04-21 per Phase 5b item 14 closing the Phase 5a
  Adversary ADV-011 finding ("positions[0].death_date unexercised"):
  AC-7 added to exercise depth-2 nested Optional serialization where
  the Optional sub-field is nested inside a list item. AC-6 already
  covers depth-1 direct-child omission; AC-7 closes the structurally
  distinct list-item sub-field omission case that Pydantic default
  serialization can silently drop when exclude_unset traverses list
  elements. Same-day retroactive reviewer wave on commit bf4354399
  (Codex CLI structural + Gemini CLI 2 independent scholarly runs)
  reached 3-way AMEND consensus that the originally-committed path
  muhaqiq_output.positions[0].death_date was both structurally
  aspirational (MuhaqiqAssessment in contracts.py has no positions
  field) and scholarly-incorrect (muhaqqiqs unify on the title page
  of a critical edition and do not carry multi-position attributions
  in classical tahqiq practice; authorship disputes across نُسَخ
  produce the multi-position structure, not editorial attribution).
  AC-7 realigned to author_output.positions[0].death_hijri —
  structurally grounded (AuthorOutputPosition at contracts.py:676-712
  declares death_hijri as Optional[int]) and scholarly-grounded
  (multi-position attribution is the canonical disputed-authorship
  shape in Dar Ibn Hazm / Muʾassasat al-Risāla critical-edition
  practice). The required-preserved signal set is correspondingly
  expanded from 16 signals to 17 by adding author_output; its
  inclusion is justified by the fact that author_output is already
  a mandatory SourceMetadata field per CON-SRC-0004, so preservation
  at handoff was always implicit — this amendment makes it explicit
  and subjects it to the recursive D-023 rule.
  Also amended on 2026-04-21 per Phase 5b item 16 closing a
  paper-reconciliation gap between the atom and contracts.py
  ErrorCode enum. Yesterday's retroactive Codex S6-DIM6A BLOCKER
  flagged that SRC-E-EVIDENCE-DROPPED and SRC-E-EVIDENCE-DROPPED-
  NESTED were cited in error_conditions and AC-3/AC-6/AC-7 but
  absent from contracts.py::ErrorCode. Item 16 pre-commit dispatch
  (Codex CLI structural + Gemini CLI 2 independent scholarly runs,
  all optimized through /prompt-architect) reached 3-way unanimous
  PREFER_B verdict: rename to SRC-E-HANDOFF-EVIDENCE-DROPPED and
  SRC-E-HANDOFF-EVIDENCE-DROPPED-NESTED per the standing 2026-04-16
  ChatGPT Deep Research advisory (dr-chatgpt-level-detection-
  20260416.yaml:950) disambiguating step-60 handoff packaging
  omission from the step-40 intake code SRC-E-PDF-TEXT-EVIDENCE-
  DROPPED (PyMuPDF text-layer eviction). Scholarly rationale from
  both Gemini runs: step 60 omission maps to T-2 Attribution Error
  and T-6 Metadata Poisoning in reference/KNOWLEDGE_INTEGRITY.md,
  distinct from step 40's T-1 Silent Text Corruption; the HANDOFF_
  prefix prevents Arabic-localization conflation of the error with
  hadith-science proof rejection (دليل شرعي / شاهد / قرينة) when
  surfaced to the owner as إسقاط دليل التسليم rather than the
  ambiguous إسقاط الدليل. Both enum entries added to
  engines/source/contracts.py ErrorCode step-60 block. All five
  normative reference sites (behavior.error_conditions @113/@116,
  AC-3 then-clause, AC-6 then-clause, AC-7 then-clause) updated
  in lock-step. Reviewer outputs
  at .kr/runtime/structural_audit_codex_cli_item16_precommit_
  20260421.md and .kr/runtime/domain_validation_gemini_cli_item16_
  run_A_20260421.md and .kr/runtime/domain_validation_gemini_cli_
  item16_run_B_20260421.md (gitignored). A follow-up Phase 5b item
  tracks severity reclassification (both Gemini runs flagged as
  AMEND that CON-SRC-0012 places "missing required-preserved
  evidence that upstream can re-emit" in the blocking tier, not
  fatal) and raise-site wiring in engines/source/src/admission.py
  _build_handoff_bundle (Codex DIM4 AMEND).
  Amended on 2026-04-23 (Phase 5b item 9 bundled with follow-up 19)
  to land the severity reclassification fatal → blocking on both
  SRC-E-HANDOFF-EVIDENCE-DROPPED and SRC-E-HANDOFF-EVIDENCE-DROPPED-
  NESTED error conditions. Per CON-SRC-0012 operational taxonomy,
  "fatal" is reserved for unrecoverable data corruption whereas
  "blocking" covers recoverable rejection with a correction path.
  Handoff-layer evidence omissions fit the blocking tier — upstream
  can re-emit the absent signals by re-running intake analysis
  (REQ-SRC-0037) on the already-frozen source, so the condition is
  recoverable. Gemini Run B DIM2 rationale verbatim: "Option B's
  HANDOFF_ prefix makes it clear this is a recoverable boundary
  transmission failure rather than source corruption, making it
  easier to correctly reason about and downgrade the severity to
  blocking." The HANDOFF_ prefix established in item 16 already
  isolated the failure mode from step-40 primary-text corruption;
  this amendment completes that isolation by aligning severity with
  CON-SRC-0012. Also amended 2026-04-23 (Phase 5b item 9) to close
  the ADV-010 Shamela happy-path concern: the atom's existing
  postconditions (when not populated the key is present with value
  null, recursive D-023 preservation) already protect the Shamela
  mushaf case where edition_info, muhaqiq_output, publisher, and
  matn_embedding_style are legitimately absent — Pydantic v2's
  default model_dump(mode="json") without exclude_none=True
  serializes Optional=None fields as null-valued JSON keys, not
  omissions. AC-8 added to provide the missing spec-linked proof
  that the Shamela happy-path actually satisfies the null-key
  contract today: a deterministic test constructs a SourceMetadata
  with all Shamela-legitimately-absent signals set to None, calls
  the admission flow, and asserts the JSON surface contains every
  one of the 17 required-preserved signal keys with null values
  for the absent ones. Without AC-8, a future exclude_none=True
  added to a model_dump call would silently break the contract and
  no spec-linked test would catch it. The raise-site wiring in
  admission.py _build_handoff_bundle for the positive error-raise
  path remains tracked as follow-up item 20 — this amendment
  lands the severity change and the Shamela happy-path assertion
  only.
  Closure-wave amendment 2026-04-23 (Codex CAF-7 + CAF-8, Run A
  DVF-4, closure of follow-up 31 on path a): (a) narrowed the
  required-preserved signal set from 17 to 15 by removing the
  edition_group_id and holding_id entries — those linkage IDs
  live on the EditionGroup (contracts.py:880) and EditionHolding
  (contracts.py:893) models and the NormalizationHandoffBundle
  (contracts.py:1082) does not carry either model; admission
  constructs the bundle BEFORE reconcile_holdings runs, so those
  IDs are unpopulated at the surface this atom governs. Their
  D-023 preservation is governed by DEC-SRC-0018 EditionHolding
  and DEC-SRC-0020 supersession, not here. The previous 17-signal
  wording was paper-reconciliation drift — surfaced by the AC-8
  Shamela null-key test when the bundle JSON came back without
  edition_group_id / holding_id keys. Follow-up 31 is CLOSED by
  this amendment on the structurally-preferred path (a).
  (b) Documented that the CON-SRC-0012 "blocking" severity
  applies at the atom-semantics layer only for now — the runtime
  ErrorSeverity enum at contracts.py:290-293 still carries only
  {FATAL, WARNING, INFO}. Handoff-evidence conditions remain
  exception-only at the code surface until follow-up 20 adds the
  raise-site wiring in admission.py _build_handoff_bundle and
  either extends the ErrorSeverity enum to include BLOCKING or
  documents why the exception path suffices. Codex CAF-7 noted
  this runtime-vs-atom gap; Phase 5b closes without addressing
  it operationally because no raise-site exists yet. (c) Added
  the Arabic-localization constraint for "blocking" —
  إيقاف مؤقت (īqāf muʾaqqat) is the required translation of
  the pipeline-pause semantics; رد (radd) is forbidden because
  it carries hadith-science substantive-rejection meaning (cf.
  Ibn al-Ṣalāḥ Muqaddima on inqiṭāʿ vs temporal delays). The
  HANDOFF_ prefix + إيقاف مؤقت localization together preserve
  the scholarly boundary between pipeline logistics and hadith-
  science إعلال / جرح / تضعيف (Run A DVF-4 closure).
  Follow-up 33 amendment 2026-04-24 (3-evaluator dispatch: Codex
  CLI STRUCTURAL_AMEND + Gemini CLI Run A SCHOLARLY_AMEND +
  arabic-reviewer CC agent SCHOLARLY_AMEND, all through
  /prompt-architect). Two orthogonal amendments land here, neither
  changing behavior nor acceptance_criteria — both are scholarly
  additions to this rationale layer.
  (i) Forbidden-token explicit enumeration. The constraint block
  above (clause (c), lines 149-157) forbids رد (radd) explicitly
  and names إعلال / جرح / تضعيف as the hadith-science category
  whose boundary must be preserved. Both scholarly evaluators
  converged on expanding the explicit forbidden-token list to ten
  entries with per-token citation anchors: (1) ردّ (radd) —
  substantive hadith rejection, Ibn al-Ṣalāḥ, Muqaddima fī ʿUlūm
  al-Ḥadīth, Nawʿ 22-23 (al-matrūk / man tuqbal riwāyatuhu wa-man
  turadd) in the Nūr al-Dīn ʿItr critical edition; (2) إعلال
  (iʿlāl) — hidden-defect detection, al-Suyūṭī, Tadrīb al-Rāwī,
  Nawʿ al-muʿallal (Nawʿ 12 in Nūr al-Dīn ʿItr; numbering varies
  by edition); (3) جرح (jarḥ) — narrator disqualification,
  al-ʿIrāqī, al-Taqyīd wa-al-Īḍāḥ, Nawʿ al-jarḥ wa-al-taʿdīl;
  (4) تضعيف (taḍʿīf) — weak-grade assignment, Ibn al-Ṣalāḥ,
  Muqaddima, Nawʿ 3 (maʿrifat al-ḥadīth al-ḍaʿīf); (5) إسقاط
  (isqāṭ) — narrator omission in isnād manipulation (tadlīs
  al-isnād), al-ʿIrāqī, al-Taqyīd wa-al-Īḍāḥ (Nawʿ on tadlīs);
  also voiding-of-right semantics in fiqh usage (isqāṭ al-ḥaqq),
  root س-ق-ط per Ibn Manẓūr Lisān al-ʿArab; (6) إبطال (ibṭāl) —
  annulment of acts of worship or contracts in fiqh (ibṭāl
  al-ṣalāh / ibṭāl al-ʿaqd), al-Nawawī, Rawḍat al-Ṭālibīn, Kitāb
  al-Ṣalāh (Shafiʿī), with four-madhhab equivalents in Mukhtaṣar
  Khalīl Kitāb al-Ṣalāh (Mālikī), al-Kāsānī Badāʾiʿ al-Ṣanāʾiʿ
  Kitāb al-Ṣalāh (Ḥanafī), Ibn Qudāma al-Mughnī Kitāb al-Ṣalāh
  (Ḥanbalī); permanent-nullity semantics inappropriate for a
  recoverable pipeline halt; root ب-ط-ل; (7) نقض (naqḍ) —
  textual and chain criticism as adversarial genre, al-Dāraquṭnī,
  al-Ilzāmāt wa-al-Tatabbuʿ (the work itself exemplifies the
  naqḍ genre); also invalidation of wuḍūʾ in fiqh (nawāqiḍ
  al-wuḍūʾ); root ن-ق-ض per Ibn Manẓūr Lisān al-ʿArab;
  (8) طعن (ṭaʿn) — disqualifying imputation against narrators
  (degrees of ṭaʿn per Ibn al-Ṣalāḥ, Muqaddima, Nawʿ al-jarḥ),
  the strongest adverse charge in narrator criticism;
  (9) ترك (tark) — abandonment of a narrator's transmission,
  Ibn al-Ṣalāḥ, Muqaddima, Nawʿ al-matrūk (a matrūk narrator's
  hadith is abandoned from use); modern Arabic usage for
  "dropping" would conflate with the hadith-science abandonment
  register; (10) شذوذ (shudhūdh) — textual anomaly, Ibn
  al-Ṣalāḥ, Muqaddima, Nawʿ al-shādhdh (a shādhdh hadith is one
  where a reliable narrator contradicts more reliable narrators);
  modern Arabic usage for "anomaly" would trigger the same
  technical register. Preferred alternatives in Arabic detail
  strings: غياب (ghiyāb — absence, maṣdar form), فقدان
  (faqdān — loss), إعادة التشغيل (iʿādat al-tashghīl — re-running
  the process). These descriptive / logistical terms carry no
  technical hadith-science or fiqh adverse-finding semantics and
  are madhhab-neutral across the four Sunni schools. The ism
  al-fāʿil form غائب may carry minor register-activation risk in
  Ḥanafī and Mālikī qaḍāʾ contexts (aqḍiyat al-ghāʾib; Mukhtaṣar
  Khalīl Kitāb al-Mafqūd) and is best used only where surrounding
  context unambiguously anchors the IT register; prefer the
  maṣdar forms غياب / فقدان as primaries.
  (ii) Per-signal threat-code mapping. The step-60 threat-model
  claim at lines 68-69 of this source field ("step 60 omission
  maps to T-2 Attribution Error and T-6 Metadata Poisoning") is
  scholarly-correct at the primary-code level for attribution-
  sensitive signals but understated when applied uniformly across
  all 15 required-preserved signals. Per arabic-reviewer CC agent
  Q3 full 15-row per-signal table and Gemini CLI Run A threat-
  model expansion, only author_output carries T-2 as PRIMARY; the
  other 14 signals map to T-6 primary with secondary codes per
  signal: title_arabic T-6 primary with T-2 secondary; genre
  T-6 / T-3; science_scope T-6 / T-3; is_multi_layer T-6 / T-2;
  structural_format T-6 / T-4; edition_info T-6 / T-2; publisher
  T-6 with no material secondary; muhaqiq_output T-6 / T-2;
  page_layout_hint T-6 / T-4; matn_embedding_style T-6 / T-2;
  pdf_text_layer_status T-6 / T-1; volume_count T-6 / T-4;
  genre_dispute T-6 / T-2; author_output T-2 PRIMARY with T-6
  secondary; contains_isnad_chains T-6 primary with T-4 secondary
  (a contingent T-1 risk applies if downstream normalization
  strips isnad-load-bearing diacritics in the absence of this
  signal — advisory only, not part of the primary / secondary
  classification per strict KNOWLEDGE_INTEGRITY.md reading that
  scopes T-1 to character-level mutation). Scholarly rationale
  per secondary axis: T-2 (Attribution Error) emerges as
  secondary for signals that carry attribution-like semantics —
  multi-layer boundaries, muhaqqiq editorial voice, matn
  embedding style (which separates sharḥ author's voice from matn
  author), edition-identifying metadata, and genre-dispute (which
  can carry authorship disputes). T-3 (Taxonomic Misplacement)
  emerges for the signals that govern taxonomy placement — genre
  and science_scope. T-4 (Context Loss (Self-Containment
  Failure)) emerges for structural-integrity signals whose loss
  produces excerpts lacking self-containment — page layout,
  structural format, volume completeness, and contains_isnad_chains
  (isnāds are atomic scholarly units per INV-SRC-0006). T-1
  (Silent Text Corruption) emerges when pdf_text_layer_status is
  lost because the provenance of extracted text becomes
  indeterminable. The author_output signal is the inversion
  point: its primary threat is T-2 because attribution is the
  highest-consequence editorial decision in classical scholarly
  reception, with T-6 as secondary metadata poisoning if the
  attribution record itself is corrupted. This mapping does not
  change the behavior or error_conditions of this atom — both
  error codes still fire on any signal omission regardless of
  primary / secondary T-code classification. The per-signal
  refinement serves downstream engines (taxonomy, synthesis) that
  may wish to weight recovery priorities by the specific
  threat-type a dropped signal manifests. Follow-up 32 amendment on
  2026-04-24 (Codex structural + Gemini CLI scholarly + arabic-
  reviewer-equivalent, all prompt-architected) resolves atom-vs-
  contracts nested-shape drift: `muhaqiq_output` is the live
  MuhaqiqAssessment shape (standing_level, evidence_sources,
  last_verified), where `last_verified` is the verification date /
  timestamp for the assessment rather than a biographical death date;
  `genre_dispute` is an evidence-bearing GenreDisputePosition list
  (genre_candidate, supporting_evidence, confidence, source_agents);
  and `edition_info` remains a flexible Optional[dict[str, Any]]
  surface whose upstream-supplied keys are preserved recursively, not
  a fixed four-field edition contract.
