id: REQ-SRC-0025
type: requirement
status: proposed
title: Two-stage source admission and normalization handoff packaging
topic: handoff
layer: pipeline
step: source_admission_and_normalization_handoff
priority: critical
confidence: high
provenance: owner_interview
source: Derived from owner guidance on 2026-04-14 that raw uploads must not pollute the official source collection and that structurally valid but partial sources may still proceed with explicit flags.
created: '2026-04-14'
updated: '2026-04-14'
depends_on:
- REQ-SRC-0019
- CON-SRC-0004
- CON-SRC-0005
- DEC-SRC-0014
- DEC-SRC-0015
impacts:
- raw_upload_registry
- source_collection
- normalization_handoff
behavior:
  trigger: Source-engine finalization runs after metadata deliberation completes for a source candidate.
  preconditions:
  - A raw_upload_record exists for the submission.
  - A frozen_source record exists for the candidate.
  - An intake_dossier exists.
  - Metadata deliberation has produced the SourceMetadata values required by CON-SRC-0004.
  postconditions:
  - raw_upload_record.status is set to source_engine_accepted or rejected_at_source based on the source-engine result.
  - The official source_collection is written only when the source engine completes successfully.
  - Structurally valid sources with completeness_status in {partial, mixed, indeterminate} may still enter the source_collection with explicit admission_reason and preserved flags.
  - Structurally invalid uploads do not create source_collection records.
  - normalization_handoff_bundle is written for every source_engine_accepted source and contains SourceMetadata, NormalizationInput, FrozenMemberManifest, and preserved intake_dossier completeness and integrity verdicts.
  error_conditions:
  - condition: A source_collection record is written before source-engine finalization completes.
    action: Abort admission with SRC-E-PREMATURE-ADMISSION.
    severity: fatal
  - condition: An upload marked structurally invalid is written into the official source_collection.
    action: Abort admission with SRC-E-INVALID-ADMISSION.
    severity: fatal
acceptance_criteria:
- id: AC-1
  given: tests/fixtures/shamela_real/03_fiqh/book.htm after successful metadata deliberation
  when: source admission and normalization handoff packaging execute
  then: raw_upload_record.status="source_engine_accepted", exactly one source_collection record is written, and normalization_handoff_bundle.SourceMetadata.registry_entry_id is non-empty.
  test_type: integration
- id: AC-2
  given: A structurally valid upload whose intake_dossier.completeness_status="partial"
  when: source admission and normalization handoff packaging execute
  then: one source_collection record is written with admission_reason="accepted_with_flags" and the handoff preserves completeness_status="partial".
  test_type: deterministic
- id: AC-3
  given: A raw upload rejected earlier with error_code=SRC-E-EMPTY-FILE
  when: source admission and normalization handoff packaging would otherwise execute
  then: no source_collection record is written for that submission.
  test_type: deterministic
