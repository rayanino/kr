id: REQ-SRC-0006
type: requirement
status: proposed
title: Growable science registry without owner gate
topic: metadata
layer: pipeline
step: metadata_deliberation
priority: high
confidence: high
provenance: owner_interview
source: Derived from OF-SRC-0006; amended on 2026-04-14 to align with the owner rule that metadata should not depend on human gates.
created: '2026-04-14'
updated: '2026-04-14'
depends_on:
- OF-SRC-0006
- INV-SRC-0003
- DEC-SRC-0002
- REQ-SRC-0013
impacts:
- science_registry
- classification_gate
behavior:
  trigger: Science classification yields a science label not present in science_registry.
  preconditions:
  - science_registry is pre-populated with nahw, sarf, balagha, fiqh, usul_al_fiqh, hadith, tafsir, aqidah, tasawwuf, sirah, tarikh, and adab.
  - inferred_metadata.science_scope has been produced for the source.
  - Specialized research agents are available for science verification.
  postconditions:
  - Existing science labels classify normally without registry expansion.
  - New science labels write registry_expansion_request with candidate_science and status=autonomous_review_pending.
  - Autonomous verification may resolve the candidate science as accepted_new_label, merged_into_existing_label, or insufficient_evidence.
  - Source admission remains accepted while the science expansion workflow is pending or disputed.
  error_conditions:
  - condition: A new science label blocks source admission while the source remains structurally valid.
    action: Abort finalization with SRC-E-SCIENCE-BLOCK.
    severity: fatal
acceptance_criteria:
- id: AC-1
  given: tests/fixtures/shamela_real/03_fiqh/book.htm
  when: science classification executes
  then: inferred_metadata.science_scope=["fiqh"] and no registry_expansion_request is written.
  test_type: integration
- id: AC-2
  given: A source whose inferred_metadata.science_scope=["mustalah_al_hadith"] while science_registry lacks that label
  when: science classification executes
  then: registry_expansion_request.candidate_science="mustalah_al_hadith" and registry_expansion_request.status="autonomous_review_pending".
  test_type: integration
- id: AC-3
  given: A pending registry_expansion_request for mustalah_al_hadith that autonomous review cannot yet settle
  when: registry expansion handling executes
  then: registry_expansion_request.status="insufficient_evidence" and source admission remains accepted_with_flags.
  test_type: deterministic
