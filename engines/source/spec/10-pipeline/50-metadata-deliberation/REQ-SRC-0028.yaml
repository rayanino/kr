id: REQ-SRC-0028
type: requirement
status: confirmed
title: Case complexity assessment and deliberation routing
topic: agent_ergonomics
layer: pipeline
step: metadata_deliberation
priority: critical
confidence: high
provenance: deep_research
source: ChatGPT DR report on agent-team architecture (2026-04-14). Defines three routing paths based on case complexity signals. The source engine classifies PDF text quality but does NOT perform OCR — degraded-evidence path means limited internal evidence requiring heavier external research, not OCR processing.
created: '2026-04-14'
updated: '2026-04-14'
depends_on:
- DEC-SRC-0013
- REQ-SRC-0008
- REQ-SRC-0019
- REQ-SRC-0021
impacts:
- agent_routing
- research_dispatch
- trust_workflow
behavior:
  trigger: The orchestrator begins metadata deliberation for a source candidate.
  preconditions:
  - An intake_dossier has been produced by step 40 with completeness_status, integrity_status, and source_format.
  - For PDF sources, intake_dossier.pdf_text_layer_status is available.
  - case_complexity is assessed from cheap deterministic signals before any LLM agent is invoked.
  postconditions:
  - case_complexity is set to one of fast_track, standard, or degraded_evidence.
  - "fast_track requires all of: scholar_authority[author_canonical_id].authority_level >= primary, genre in {matn, sharh, hadith_collection, tafsir}, author_death_hijri is not null."
  - "degraded_evidence is set when intake_dossier.source_format=pdf and intake_dossier.pdf_text_layer_status in {absent, corrupt}, or when intake_dossier.integrity_status=suspicious."
  - standard is the default when neither fast_track nor degraded_evidence applies.
  - fast_track path uses 2 independent verification reasoners, optional minimal research, and monitor. Research depth is reduced but verification independence is not.
  - standard path uses 2+ specialized research agents with distinct source_type values, 2 independent verification reasoners, disagreement resolver, and monitor.
  - degraded_evidence path expands research dispatch to 3+ source types to compensate for weak internal evidence. Verification reasoner count remains exactly 2.
  - case_complexity_record preserves the routing decision and the signals that determined it.
  error_conditions:
  - condition: case_complexity cannot be assessed because intake_dossier is incomplete.
    action: Abort deliberation with SRC-E-DOSSIER-INCOMPLETE.
    severity: fatal
  - condition: degraded_evidence path cannot find the minimum required number of distinct research source types.
    action: Record status=incomplete_research_sources and continue with available sources, flagging the gap in monitor_feedback.
    severity: warning
acceptance_criteria:
- id: AC-1
  given: tests/fixtures/shamela_real/05_tafsir/book.htm with definitive author attribution and author_death_hijri=774
  when: case complexity assessment runs
  then: case_complexity="fast_track".
  test_type: integration
- id: AC-2
  given: tests/fixtures/shamela_real/03_fiqh/book.htm with genre="risalah" and a modern author
  when: case complexity assessment runs
  then: case_complexity="standard".
  test_type: integration
- id: AC-3
  given: tests/fixtures/waraqat_usul/waraqat.pdf with pdf_text_layer_status="corrupt"
  when: case complexity assessment runs
  then: case_complexity="degraded_evidence".
  test_type: integration
- id: AC-4
  given: tests/fixtures/ibn_aqil_alfiyyah/vol6.pdf with pdf_text_layer_status="absent"
  when: case complexity assessment runs
  then: case_complexity="degraded_evidence".
  test_type: integration
