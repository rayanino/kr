id: REQ-SRC-0028
type: requirement
status: confirmed
title: Case complexity assessment and deliberation routing
topic: agent_ergonomics
layer: pipeline
step: metadata_deliberation
priority: critical
confidence: high
provenance: deep_research
source: >-
  ChatGPT DR report on agent-team architecture (2026-04-14).
  Defines three routing paths based on case complexity
  signals. The source engine classifies PDF text quality but
  does NOT perform OCR — degraded-evidence path means limited
  internal evidence requiring heavier external research, not
  OCR processing. Phase 5 amendment 2026-04-30 (scholar-
  matching DR synthesis §5.4): add partial_fragment_author_
  identity as a routing signal that FORCES standard path (not
  fast_track) even when a provisional scholar exists in
  scholar_authority. Provisional scholars under unresolved
  ambiguity MUST run the full match cell (REQ-SRC-0049
  through REQ-SRC-0053) regardless of other fast_track
  predicates. This aligns with INV-SRC-0013 ≥2-non-name floor
  and the no-definitive-from-under-spec rule.
created: '2026-04-14'
updated: '2026-04-30'
