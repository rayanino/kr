id: REQ-SRC-0005
type: requirement
status: confirmed
title: Optional science hint
topic: metadata
layer: pipeline
step: metadata_deliberation
priority: medium
confidence: high
provenance: owner_interview
source: Derived from OF-SRC-0005; amended per contract-architect-review.yaml
created: '2026-04-14'
updated: '2026-04-14'
depends_on:
- OF-SRC-0005
- INV-SRC-0001
impacts:
- science_scope
- confidence_resolution
behavior:
  trigger: The owner supplies science_scope as an optional intake hint.
  preconditions:
  - owner_hint_payload.science_scope is stored separately from inferred_metadata.science_scope.
  - Base science inference has already written inferred_metadata.science_scope and science_scope_confidence.
  postconditions:
  - Exact science_scope matches may increase science_scope_confidence without changing inferred_metadata.science_scope.
  - Contradictions write hint_investigation with field=science_scope and preserve both hint and inference values.
  - Science hints never replace the inferred science_scope list.
  error_conditions:
  - condition: owner_hint_payload.science_scope contradicts inferred_metadata.science_scope.
    action: Open hint_investigation with status=open and keep inferred_metadata.science_scope unchanged.
    severity: blocking
acceptance_criteria:
- id: AC-1
  given: tests/fixtures/shamela_real/04_hadith/book.htm with owner_hint_payload.science_scope=["hadith"]
  when: science-hint comparison executes
  then: inferred_metadata.science_scope remains ["hadith"] and science_scope_confidence increases.
  test_type: deterministic
- id: AC-2
  given: tests/fixtures/shamela_real/10_no_author/book.htm with owner_hint_payload.science_scope=["tafsir"]
  when: science-hint comparison executes
  then: hint_investigation.field="science_scope", hint_investigation.hint_value=["tafsir"], and inferred_metadata.science_scope remains ["hadith", "fiqh"].
  test_type: integration
