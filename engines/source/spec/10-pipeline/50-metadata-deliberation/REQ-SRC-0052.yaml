id: REQ-SRC-0052
type: requirement
status: confirmed
title: Scholar match verification cell with hybrid round-0 / round-1 protocol
topic: consensus
layer: pipeline
step: metadata_deliberation
priority: critical
confidence: high
provenance: deep_research
source: >-
  Phase 5 scholar-matching DR synthesis (2026-04-30) §2.3
  (Pivot (c) verifier-independence mechanism HYBRID
  adjudication) + §5.2 (renumbered from ChatGPT DR's stale
  REQ-SRC-0047 to REQ-SRC-0052 per repo verification — slot
  0047 already taken by "Owner override pathway for level at
  intake"). Cross-provider 2-of-2 contributing pivots:
  Claude DR §6 (adversarial scaffold) + ChatGPT DR §6
  (functional independence with no-peeking + different
  prompts). Synthesis adopts HYBRID — ChatGPT DR's no-peeking
  as round-0 baseline; Claude DR's adversarial scaffold ONLY
  in round-1 disagreement-resolution. 4-evaluator wave: 4-of-4
  UNANIMOUS HIGH on Pivot (c). Round cap = 2; both DRs
  converge. NO new candidates introduced in round-1 (Claude
  DR § + ChatGPT DR §5 Stage 10 both, ChatGPT DR's
  more conservative framing adopted: "no new candidate may be
  introduced unless it already existed in the frozen packet").
  This atom specializes DEC-SRC-0013's deliberation-cell
  pattern as scholar_match_cell.
created: '2026-04-30'
updated: '2026-04-30'
depends_on:
- DEC-SRC-0013
- REQ-SRC-0008
- CON-SRC-0009
