id: REQ-SRC-0008
type: requirement
status: proposed
title: Agent-team trust evaluation
topic: trust
layer: pipeline
step: metadata_deliberation
priority: critical
confidence: high
provenance: owner_interview
source: Derived from OF-SRC-0009; amended per both coworker reviews, adversary-review.yaml ADV-003, and ChatGPT DR on agent-team architecture (2026-04-14) which recommends extending trust_decision to support disputed status with positions array.
created: '2026-04-14'
updated: '2026-04-14'
depends_on:
- OF-SRC-0009
- DEC-SRC-0004
- DEC-SRC-0013
- OQ-SRC-0005
impacts:
- trust_resolution
- monitor_feedback
behavior:
  trigger: The engine must emit a trust_decision for a source or metadata claim.
  preconditions:
  - At least two independent verification agents are available for the case.
  - "authority_level is an ordered classification: primary > reference > modern_compilation. fast_track requires authority_level in {primary, reference}."
  - "fast_track eligibility requires scholar_authority[author_canonical_id].authority_level in {primary, reference}, genre in {matn, sharh, hadith_collection, tafsir, tabaqat, fatawa}, and author_death_hijri is not null."
  - Any case that fails one or more fast_track predicates must use trust_path=full_deliberation.
  - Full agent-team composition beyond the minimum verifier set remains blocked on OQ-SRC-0003.
  postconditions:
  - trust_decision contains decision, trust_path, supporting_agents, and evidence_summary fields.
  - trust_decision.decision is one of verified, needs_review, or disputed.
  - trust_decision.decision=disputed is set when independent trust verifiers produce evidence-backed competing trust assessments that do not converge after the disagreement protocol. In this case trust_decision.positions preserves both assessments with evidence and confidence, ordered by confidence descending.
  - Every run writes monitor_feedback records even when the case follows the fast_track path.
  - Books meeting all fast_track predicates may use trust_path=fast_track instead of full_deliberation.
  error_conditions:
  - condition: Fewer than two independent verification agents are available.
    action: Abort trust finalization with SRC-E-TRUST-AGENT-COUNT.
    severity: blocking
acceptance_criteria:
- id: AC-1
  given: tests/fixtures/shamela_real/05_tafsir/book.htm with definitive author attribution, scholar_authority[author_canonical_id].authority_level="primary", and author_death_hijri=774
  when: trust evaluation executes
  then: trust_decision.trust_path="fast_track" and trust_decision.decision="verified".
  test_type: integration
- id: AC-2
  given: tests/fixtures/shamela_real/03_fiqh/book.htm
  when: trust evaluation executes
  then: trust_decision includes decision, trust_path, supporting_agents, and evidence_summary, and at least one monitor_feedback record is written.
  test_type: integration
- id: AC-3
  given: A trust evaluation run with only one verification agent available
  when: trust evaluation executes
  then: Finalization aborts with error_code=SRC-E-TRUST-AGENT-COUNT.
  test_type: deterministic
- id: AC-4
  given: tests/fixtures/shamela_real/03_fiqh/book.htm with genre="risalah" or author_death_hijri=null
  when: trust evaluation executes
  then: trust_decision.trust_path="full_deliberation".
  test_type: deterministic
