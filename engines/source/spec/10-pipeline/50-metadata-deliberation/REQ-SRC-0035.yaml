id: REQ-SRC-0035
type: requirement
status: proposed
title: Display metadata for teaching units (source card)
topic: metadata
layer: pipeline
step: metadata_deliberation
priority: high
confidence: high
provenance: deep_research
source: "Owner interview 2026-04-14 + Gemini DR on display metadata design (2026-04-14). The DR grounds the source card (بطاقة المصدر) in the Islamic scholarly tradition: the Eight Heads (الرؤوس الثمانية) of classical muqaddimat and the Ten Principles (المبادئ العشرة) of foundational sciences."
created: '2026-04-14'
updated: '2026-04-15'
depends_on:
- REQ-SRC-0004
- REQ-SRC-0026
- REQ-SRC-0030
- INV-SRC-0009
impacts:
- teaching_unit_context
- reader_experience
- progressive_disclosure
rationale: >-
  The source card (بطاقة المصدر) is the digital realization of the classical
  scholarly introduction — what a teacher would tell students before reading a text.
  It operates in two states: Quick-Glance (always visible alongside the teaching
  unit) and Deep-Dive (expanded modal for research). Content is split between
  deterministic extraction (names, dates, editions from databases) and LLM agent
  synthesis (biographical blurbs, significance summaries, dispute presentations).
  All content is in Arabic. Per INV-SRC-0009, nothing is hidden or simplified.
behavior:
  trigger: Metadata deliberation completes for a source candidate with confirmed or disputed author attribution and genre classification.
  preconditions:
  - author_output has been finalized with at least one evidence-backed position.
  - genre and science_scope classification have completed.
  - source_metadata fields (title_arabic, is_multi_layer, structural_format) are populated.
  - "madhab and scholarly_title are populated from the scholar_authority registry when a matching author entry exists. When no registry entry exists, madhab and scholarly_title are populated from agent research evidence (multi-model consensus required per D-041). When neither source provides the data, the field is null with a reason recorded in display_card.partial_reasons."
  postconditions:
  - "source_metadata.display_card is written with 13 structured fields organized in two progressive disclosure tiers."
  - "Quick-Glance tier (always visible): display_name (الاسم الشائع — the name the scholar is best known by), scholarly_title (اللقب العلمي — highest consensus-agreed honorific as a visual badge), death_date_display (سنة الوفاة — Hijri primary with Gregorian secondary), madhab (المذهب — methodological school tag), book_title (عنوان الكتاب), science_and_genre (التصنيف العلمي — with educational tooltips on technical terms), author_blurb_short (نبذة مختصرة — 1-2 sentence truncated blurb), and layer_tree_short (شجرة الكتاب — visual nesting for multi-layer works showing where the reader is)."
  - "Deep-Dive tier (expanded on interaction): full_name_lineage (البطاقة الشخصية الكاملة — ism, nasab, kunya, laqab, nisba unabridged), author_blurb_full (نبذة عن المؤلف — dynamically tailored to scholar type per Gemini DR), book_significance (أهمية الكتاب / الثمرة — why the author wrote it, what gap it fills, its rank), edition_metadata (بيانات الطبعة — muhaqqiq, publisher, year, city), dispute_panel (مؤشر التوثيق — visible only when authorship or attribution is disputed, showing all positions with evidence), and verification_sources (مصادر التوثيق — which databases and catalogs verified the metadata)."
  - "Deterministic extraction fields (from databases, never LLM-generated): display_name, full_name_lineage, death_date_display, book_title, science_and_genre, edition_metadata, layer_tree, verification_sources. Note: madhab and scholarly_title are registry-first fields — populated from scholar_authority registry when available, from agent research evidence when no registry entry exists, or null with reason in partial_reasons when neither source provides data."
  - "LLM agent synthesis fields (generated by agent teams from research evidence): author_blurb, book_significance, dispute_panel summary. These must cite their evidence sources and are subject to multi-model review."
  - "author_blurb is dynamically tailored to scholar type: hadith scholars emphasize rihlah and hifz; fiqh scholars emphasize rank within madhab; polymaths emphasize breadth and synthesis; modern scholars emphasize institutional role and contemporary impact; unknown authors state what is known with transparent uncertainty."
  - All display_card content is in Arabic and preserves full evidence chains per INV-SRC-0009.
  error_conditions:
  - condition: Insufficient evidence to generate meaningful blurbs for author or book.
    action: "Set display_card.status=partial. Populate deterministic fields fully. Leave agent-synthesized fields as null with reasons in display_card.partial_reasons."
    severity: warning
acceptance_criteria:
- id: AC-1
  given: "A source identified as صحيح البخاري with author الإمام البخاري (death_hijri=256)"
  when: display metadata generation executes
  then: "display_card.display_name contains البخاري, display_card.scholarly_title contains أمير المؤمنين في الحديث or الإمام, display_card.death_date_display contains both 256 and 870, display_card.author_blurb mentions rihlah and hifz."
  test_type: integration
- id: AC-2
  given: "A multi-layer source فتح الباري شرح صحيح البخاري by ابن حجر العسقلاني"
  when: display metadata generation executes
  then: "display_card.layer_tree_short shows nested structure with صحيح البخاري as matn and فتح الباري as sharh, with a reading position indicator."
  test_type: integration
- id: AC-3
  given: "A modern risalah الدروس المهمة لعامة الأمة by الشيخ ابن باز"
  when: display metadata generation executes
  then: "display_card.author_blurb mentions institutional role (المفتي العام or equivalent) and display_card.book_significance describes it as an introductory text for beginners."
  test_type: integration
- id: AC-4
  given: "A source with author_output.status=insufficient_evidence"
  when: display metadata generation executes
  then: "display_card.status=partial, deterministic fields are populated, author_blurb is null with reason in partial_reasons."
  test_type: deterministic
