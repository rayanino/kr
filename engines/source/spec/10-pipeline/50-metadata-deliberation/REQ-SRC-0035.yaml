id: REQ-SRC-0035
type: requirement
status: confirmed
title: Display metadata for teaching units (source card)
topic: metadata
layer: pipeline
step: metadata_deliberation
priority: high
confidence: high
provenance: deep_research
source: >-
  Owner interview 2026-04-14 + Gemini DR on display metadata
  design (2026-04-14). The DR grounds the source card
  (بطاقة المصدر) in the Islamic scholarly tradition: the
  Eight Heads (الرؤوس الثمانية) of classical muqaddimat and
  the Ten Principles (المبادئ العشرة) of foundational
  sciences. Phase 5 amendment 2026-04-30 (scholar-matching
  DR synthesis §5.4): TIGHTEN dispute_panel semantics —
  scholar-dependent display fields (display_name, full_name_
  lineage, scholarly_title, madhab, attributed_works,
  era_description, scholarly_standing) MUST be bound to
  CON-SRC-0008.scholar_match_result evidence (not free-
  floating LLM synthesis). When CON-SRC-0008
  .disambiguation_state = disputed, display ALL positions
  side-by-side with score_breakdown (9 sub-scores from
  CON-SRC-0008.positions) + cited_evidence; the display
  layer MUST NOT silently pick a single id from positions[]
  to populate scalar fields like scholarly_title. When
  disambiguation_state = insufficient_evidence, the scholar-
  dependent fields are null with explicit reason in
  display_card.partial_reasons.
created: '2026-04-14'
updated: '2026-04-30'
depends_on:
- REQ-SRC-0004
- REQ-SRC-0026
