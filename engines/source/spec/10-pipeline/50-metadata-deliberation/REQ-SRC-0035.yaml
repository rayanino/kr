id: REQ-SRC-0035
type: requirement
status: proposed
title: Display metadata for teaching units
topic: metadata
layer: pipeline
step: metadata_deliberation
priority: high
confidence: high
provenance: owner_interview
source: "Owner interview 2026-04-14 describing two kinds of metadata: routing metadata for engines and display metadata for teaching units ('info about the author, background about the source')"
created: '2026-04-14'
updated: '2026-04-14'
depends_on:
- REQ-SRC-0004
- REQ-SRC-0026
- REQ-SRC-0030
- INV-SRC-0009
impacts:
- teaching_unit_context
- reader_experience
rationale: >-
  The source engine produces metadata consumed by two distinct audiences: downstream
  engines (routing metadata) and the reader via teaching units (display metadata).
  Display metadata includes human-readable blurbs about the author and the source
  that appear alongside teaching units, giving the reader scholarly context. This
  content must be in Arabic, grounded in research evidence, and generated by agent
  teams rather than template-filled.
behavior:
  trigger: Metadata deliberation completes for a source candidate with confirmed or disputed author attribution and genre classification.
  preconditions:
  - author_output has been finalized with at least one evidence-backed position (status is definitive or disputed).
  - genre classification has completed with a confirmed genre value.
  - source_metadata fields (title, science_scope) are populated.
  postconditions:
  - "source_metadata.display_card is written containing author_blurb, source_blurb, and scholarly_significance fields."
  - "author_blurb is an Arabic-language string including full name, death date (Hijri), scholarly standing, area of expertise, and major works, generated by agent team from research evidence."
  - "source_blurb is an Arabic-language string describing what the book is, its genre, its significance in its science, and its relationship to other works in the tradition."
  - "scholarly_significance is one of foundational_text, standard_reference, specialized_study, or modern_compilation."
  - "All display_card content preserves full evidence chains per INV-SRC-0009 (zero knowledge loss), with each claim traceable to the evidence that produced it."
  - "display_card content is written in Arabic."
  error_conditions:
  - condition: Insufficient evidence to generate a meaningful author_blurb or source_blurb (e.g., unknown author, unrecognized genre).
    action: "Set display_card.status=partial. Populate whichever fields have sufficient evidence. Leave insufficiently-evidenced fields as null with a reason string in display_card.partial_reasons array."
    severity: warning
acceptance_criteria:
- id: AC-1
  given: "A source identified as صحيح البخاري with author الإمام البخاري (death_hijri=256)"
  when: display metadata generation executes
  then: "author_blurb contains الإمام البخاري and 256 and أمير المؤمنين في الحديث (or equivalent scholarly standing). scholarly_significance=foundational_text. All blurb text is in Arabic."
  test_type: integration
- id: AC-2
  given: "A modern risalah by a contemporary author on a specific fiqh topic"
  when: display metadata generation executes
  then: "source_blurb describes the work as a focused treatise (رسالة). scholarly_significance=specialized_study, not foundational_text."
  test_type: integration
- id: AC-3
  given: "A source with author_output.status=insufficient_evidence"
  when: display metadata generation executes
  then: "display_card.status=partial and author_blurb is null and display_card.partial_reasons contains a reason referencing insufficient author evidence."
  test_type: deterministic
