id: REQ-SRC-0004
type: requirement
status: proposed
title: Multi-model consensus for author attribution
topic: metadata
layer: pipeline
step: metadata_deliberation
priority: critical
confidence: high
provenance: owner_interview
source: Derived from OF-SRC-0004; amended per both coworker reviews and adversary-review.yaml ADV-009
created: '2026-04-14'
updated: '2026-04-14'
depends_on:
- OF-SRC-0004
- INV-SRC-0002
impacts:
- author_attribution
- consensus_pipeline
behavior:
  trigger: The source engine must assign or preserve author attribution for a source.
  preconditions:
  - Candidate author evidence has been collected from metadata cards, titles, and colophons.
  - At least two attribution agents are independent, meaning agent_id differs, execution_id differs, and neither agent reads the other's final output before emitting its own result.
  postconditions:
  - author_output.status is one of definitive, disputed, or insufficient_evidence.
  - Each author_output.positions item contains position, display_name, death_hijri, death_hijri_verification, nisba_tokens, evidence, confidence, and source_agent.
  - A definitive case stores one chosen position, while a disputed case preserves multiple positions instead of forcing a single author.
  - Any death_hijri value supported by only one independent agent is stored with death_hijri_verification=single_model_unverified until a second independent agent confirms the same year.
  error_conditions:
  - condition: Fewer than two independent attribution agents are available.
    action: Abort author finalization with SRC-E-AUTHOR-AGENT-COUNT.
    severity: fatal
  - condition: Two or more independent agents return no evidence-backed author position.
    action: Set author_output.status=insufficient_evidence with author_output.positions as an empty array. Add zero_author_evidence to study_quality_risk_flags for evaluation by the owner-submission risk gate (REQ-SRC-0027). Do not create an owner_review_case directly from metadata deliberation.
    severity: blocking
acceptance_criteria:
- id: AC-1
  given: tests/fixtures/shamela_real/03_fiqh/book.htm and two independent attribution agents
  when: author attribution executes
  then: author_output.status="definitive" and author_output.positions[0].position="عبد الله بن إبراهيم الزاحم".
  test_type: integration
- id: AC-2
  given: A disputed authorship case with two evidence-backed candidates for the same source
  when: author attribution executes
  then: author_output.status="disputed" and len(author_output.positions) is at least 2.
  test_type: integration
- id: AC-3
  given: Candidate authors "أحمد بن عبد الحليم بن تيمية الحراني" (death_hijri=728) and "عبد السلام بن عبد الله بن تيمية" (death_hijri=652) with evidence mentioning الحراني and post-700H content
  when: author attribution executes
  then: The selected position matches death_hijri=728 and nisba_tokens contains "الحراني".
  test_type: deterministic
- id: AC-4
  given: A source whose metadata card, title, and colophon provide no author evidence
  when: author attribution executes with two independent agents
  then: author_output.status="insufficient_evidence" and study_quality_risk_flags includes "zero_author_evidence".
  test_type: integration
- id: AC-5
  given: An author position whose death_hijri=676 is inferred by exactly one independent attribution agent
  when: author attribution executes
  then: author_output.positions[0].death_hijri=676, author_output.positions[0].death_hijri_verification="single_model_unverified", and the death date remains pending confirmation from a second independent agent.
  test_type: deterministic
