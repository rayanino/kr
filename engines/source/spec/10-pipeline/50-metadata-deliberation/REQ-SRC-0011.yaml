- benchmark_weighting
behavior:
  trigger: A source is identified as hadith literature or adjacent hadith scholarship.
  preconditions:
  - "hadith_subgenre uses the controlled vocabulary: musannaf, musnad, sunan, jami, juz, tabaqat_rijal, hadith_commentary, mujam, mustadrak, mustakhraj, arbain, ahkam, targhib, shamail, adhkar, adab, takhrij, atraf, and ilal. The adhkar and adab values were added in Phase 5b follow-up 36 (2026-04-29) after a 4-evaluator cross-provider dispatch (Codex CLI gpt-5.4 + Gemini Run A/B gemini-2.5-pro + arabic-reviewer Anthropic Agent, all through /prompt-architect with CAI Critique-Revise + Step-Back + TIDD-EC hybrid framework — same framework vindicated by FU-37). 3-of-3 cross-provider scholarly convergence on ADD-EXCLUDED for both values: the works tag correctly at subgenre level but Axis 3 carve-back BLOCKS — owner override is REJECTED under Axis 1 per the SHAMAIL precedent (chain-preservation in canonical anchors). adhkar covers invocational-formula thematic anthologies (al-Nawawī's al-Adhkār d. 676 AH; al-Jazarī's al-Ḥiṣn al-Ḥaṣīn d. 833 AH; Ibn al-Sunnī's ʿAmal al-Yawm wa-l-Laylah d. 364 AH; Ibn Taymiyyah's al-Kalim al-Ṭayyib d. 728 AH); inference is restricted to four compound rules — عمل+(اليوم|الليلة), الحصن+الحصين, كلم+طيب, أذكار+(الصباح|المساء|اليوم|الليلة|السفر|النوم) — bare أذكار/ذكر/دعاء are forbidden due to false-positive collisions with non-hadith taṣawwuf works, sermon collections, and fiqh chapter headings (the existing test fixture at test_step_50_deliberation.py:977 asserts كتاب الأذكار -> None, which the compound-rule discipline preserves). adab covers thematic-curated transmission collections on adab/akhlaq topics (al-Bukhārī's al-Adab al-Mufrad d. 256 AH — canonical anchor; Ibn Ḥibbān's Rawḍat al-ʿUqalāʾ d. 354 AH; al-Khaṭīb al-Baghdādī's al-Jāmiʿ li-Akhlāq al-Rāwī wa-Ādāb al-Sāmiʿ d. 463 AH); inference is restricted to three compound rules — الأدب+المفرد, روضة+العقلاء, الجامع+لأخلاق — bare الأدب/أدب are forbidden due to false-positive collisions with adab-literature works (Genre.ADAB at contracts.py:158). NAMING-COLLISION DISAMBIGUATION (CRIT-FU36-1, surfaced independently by both Codex and arabic-reviewer): HadithSubgenre.ADAB has the same string value adab as Genre.ADAB; these are two different dimensions (Genre.ADAB = a work whose primary classification is adab literature; HadithSubgenre.ADAB = a hadith collection whose thematic focus is adab/akhlaq topics, with genre=hadith_collection). Display layers MUST disambiguate by enum-class context; JSON serialization without type context is ambiguous and forbidden. Constructive proposal to also add an is_abridgement orthogonal property on SourceMetadata (Q-A FU-36) was BLOCKED — 2-of-4 cross-provider evaluators (Codex + arabic-reviewer) found that all enumerated PROCEED paths failed to wire into the level gate or dispute path (architecturally incomplete) and that the existing Genre.MUKHTASAR + WorkRelationship.is_abridgement_of surface partially covers the concept; documented limitations L-FU36-1 (_extract_target narrowness for non-مختصر Genre.MUKHTASAR keywords like خلاصة/تهذيب/تقريب/ملخص/وجيز) and L-FU36-2 (gate-semantics gap requiring future architectural path-5 with dual-surface metadata + INV-SRC-0012 wiring + GenreDisputePosition abridgement_candidate field) added to INV-SRC-0012. The ahkam value was added in Phase 5b follow-up 34 (2026-04-27) for selected-hadith pedagogical anthologies of legal evidences (Kutub al-Aḥkām per al-Kattānī al-Risālah al-Mustaṭrafah p. 41, e.g., Bulūgh al-Marām of Ibn Ḥajar d. 852 AH, ʿUmdat al-Aḥkām of al-Maqdisī d. 600 AH); inference is restricted to compound title patterns (bare أحكام is forbidden because of false-positive collisions with Aḥkām al-Qurʾān of al-Jaṣṣāṣ d. 370 AH, al-Aḥkām al-Sulṭāniyyah of al-Māwardī d. 450 AH, and al-Iḥkām fī Uṣūl al-Aḥkām of al-Āmidī d. 631 AH). The targhib and shamail values were added in Phase 5b follow-up 35 (2026-04-28) after 4-of-4 cross-provider evaluator convergence (Codex CLI structural + Gemini Run A scholarly + Gemini Run B scholarly + arabic-reviewer Anthropic scholarly cross-provider, all through /prompt-architect with anti-priming Step-1/Step-2 protocol). targhib covers Kutub al-Targhīb wa-l-Tarhīb per al-Kattānī al-Risālah al-Mustaṭrafah p. 45 (canonical anchor al-Targhīb wa-l-Tarhīb of al-Mundhirī d. 656 AH; Riyāḍ al-Ṣāliḥīn of al-Nawawī d. 676 AH classified under TARGHIB via the dedicated compound rule). shamail covers Kutub al-Shamāʾil per Ḥājī Khalīfa Kashf al-Ẓunūn 2/1043 (canonical anchor al-Shamāʾil al-Muḥammadiyyah of al-Tirmidhī d. 279 AH); shamail is enum-recognized but EXCLUDED from LEVELED_HADITH_SUBGENRES because al-Tirmidhī's al-Shamāʾil preserves full transmission chains. Inference for both targhib and shamail is restricted to compound title patterns (bare ترغيب and bare شمائل are forbidden because of false-positive collisions with non-hadith taṣawwuf works, sermon collections, and biographical literature). MUKHTASAR was BLOCKED entirely (NOT added to enum) per 3-of-3 cross-provider scholarly verdict: cross-cutting structural descriptor not a standalone hadith subgenre; KR additionally encodes mukhtaṣar at the Genre level via Genre.MUKHTASAR which would render any HadithSubgenre.MUKHTASAR rule structurally redundant and unreachable under the existing pre-condition guard at deliberation.py:537."
  - "hadith_subgenre applies when science_scope includes hadith regardless of genre. A sharh on a hadith collection gets genre=sharh AND hadith_subgenre=hadith_commentary. Genre and hadith_subgenre are orthogonal axes."
  - The source has enough metadata or content evidence to distinguish among the controlled values.
  postconditions:
  - hadith_subgenre is written for every hadith or hadith-adjacent source.
  - Ambiguous cases preserve candidate_subgenres instead of collapsing to generic hadith_collection.
  error_conditions:
  - condition: The source is hadith-related but no controlled subgenre can be selected.
    action: Write candidate_subgenres and set hadith_subgenre=null.
    severity: warning
acceptance_criteria:
- id: AC-1
  given: tests/fixtures/shamela_real/04_hadith/book.htm
  when: hadith classification executes
  then: hadith_subgenre="juz".
  test_type: integration
- id: AC-2
  given: A tabaqat/rijal work about hadith narrators
  when: hadith classification executes
  then: hadith_subgenre="tabaqat_rijal" and not "hadith_commentary".
  test_type: deterministic
- id: AC-3
  given: One collection organized by companion narrator names and one collection organized by fiqh chapters
  when: hadith classification executes
  then: The first source receives hadith_subgenre="musnad" and the second receives hadith_subgenre="sunan".
  test_type: deterministic
