id: REQ-SRC-0011
type: requirement
status: confirmed
title: Fine-grained hadith classification
topic: metadata
layer: pipeline
step: metadata_deliberation
priority: high
confidence: high
provenance: owner_interview
source: Derived from OF-SRC-0012; amended per both coworker reviews and domain-validator-review-2 (DV-001, DV-016) which found 6 missing hadith subgenres and clarified genre/subgenre orthogonality.
created: '2026-04-14'
updated: '2026-04-14'
depends_on:
- OF-SRC-0012
- CON-SRC-0002
impacts:
- hadith_classification
- benchmark_weighting
behavior:
  trigger: A source is identified as hadith literature or adjacent hadith scholarship.
  preconditions:
  - "hadith_subgenre uses the controlled vocabulary: musannaf, musnad, sunan, jami, juz, tabaqat_rijal, hadith_commentary, mujam, mustadrak, mustakhraj, arbain, ahkam, targhib, shamail, takhrij, atraf, and ilal. The ahkam value was added in Phase 5b follow-up 34 (2026-04-27) for selected-hadith pedagogical anthologies of legal evidences (Kutub al-Aḥkām per al-Kattānī al-Risālah al-Mustaṭrafah p. 41, e.g., Bulūgh al-Marām of Ibn Ḥajar d. 852 AH, ʿUmdat al-Aḥkām of al-Maqdisī d. 600 AH); inference is restricted to compound title patterns (bare أحكام is forbidden because of false-positive collisions with Aḥkām al-Qurʾān of al-Jaṣṣāṣ d. 370 AH, al-Aḥkām al-Sulṭāniyyah of al-Māwardī d. 450 AH, and al-Iḥkām fī Uṣūl al-Aḥkām of al-Āmidī d. 631 AH). The targhib and shamail values were added in Phase 5b follow-up 35 (2026-04-28) after 4-of-4 cross-provider evaluator convergence (Codex CLI structural + Gemini Run A scholarly + Gemini Run B scholarly + arabic-reviewer Anthropic scholarly cross-provider, all through /prompt-architect with anti-priming Step-1/Step-2 protocol). targhib covers Kutub al-Targhīb wa-l-Tarhīb per al-Kattānī al-Risālah al-Mustaṭrafah p. 45 (canonical anchor al-Targhīb wa-l-Tarhīb of al-Mundhirī d. 656 AH; Riyāḍ al-Ṣāliḥīn of al-Nawawī d. 676 AH classified under TARGHIB via the dedicated compound rule). shamail covers Kutub al-Shamāʾil per Ḥājī Khalīfa Kashf al-Ẓunūn 2/1043 (canonical anchor al-Shamāʾil al-Muḥammadiyyah of al-Tirmidhī d. 279 AH); shamail is enum-recognized but EXCLUDED from LEVELED_HADITH_SUBGENRES because al-Tirmidhī's al-Shamāʾil preserves full transmission chains. Inference for both targhib and shamail is restricted to compound title patterns (bare ترغيب and bare شمائل are forbidden because of false-positive collisions with non-hadith taṣawwuf works, sermon collections, and biographical literature). MUKHTASAR was BLOCKED entirely (NOT added to enum) per 3-of-3 cross-provider scholarly verdict: cross-cutting structural descriptor not a standalone hadith subgenre; KR additionally encodes mukhtaṣar at the Genre level via Genre.MUKHTASAR which would render any HadithSubgenre.MUKHTASAR rule structurally redundant and unreachable under the existing pre-condition guard at deliberation.py:537."
  - "hadith_subgenre applies when science_scope includes hadith regardless of genre. A sharh on a hadith collection gets genre=sharh AND hadith_subgenre=hadith_commentary. Genre and hadith_subgenre are orthogonal axes."
  - The source has enough metadata or content evidence to distinguish among the controlled values.
  postconditions:
  - hadith_subgenre is written for every hadith or hadith-adjacent source.
  - Ambiguous cases preserve candidate_subgenres instead of collapsing to generic hadith_collection.
  error_conditions:
  - condition: The source is hadith-related but no controlled subgenre can be selected.
    action: Write candidate_subgenres and set hadith_subgenre=null.
    severity: warning
acceptance_criteria:
- id: AC-1
  given: tests/fixtures/shamela_real/04_hadith/book.htm
  when: hadith classification executes
  then: hadith_subgenre="juz".
  test_type: integration
- id: AC-2
  given: A tabaqat/rijal work about hadith narrators
  when: hadith classification executes
  then: hadith_subgenre="tabaqat_rijal" and not "hadith_commentary".
  test_type: deterministic
- id: AC-3
  given: One collection organized by companion narrator names and one collection organized by fiqh chapters
  when: hadith classification executes
  then: The first source receives hadith_subgenre="musnad" and the second receives hadith_subgenre="sunan".
  test_type: deterministic
