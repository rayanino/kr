source: >-
  Phase 5 scholar-matching DR synthesis (2026-04-30) §2.4
  (Pivot (d) compound 4-condition threshold adjudication) +
  §5.2 (renumbered from ChatGPT DR's stale REQ-SRC-0048 to
  REQ-SRC-0053 per repo verification — slot 0048 already taken
  by "Deferred validation surface for owner_level_override").
  Cross-provider DR sources: Claude DR §6 (single threshold
  0.95) + ChatGPT DR §6 (compound 4-condition: mean ≥ 0.92 AND
  each ≥ 0.90 AND no rival within 0.07 AND ≥2 corroborating
  attributes beyond fragment). Synthesis adopts ChatGPT DR's
  compound rule per knowledge-integrity primacy: strictly more
  conservative in adversarial cases; rival-margin guard
  closes a class of false-definitive errors that the flat
  threshold would miss. 4-evaluator wave: 3-of-4 cross-
  provider HIGH on Pivot (d) + 1 AMEND with partition fix
  (Codex Stage-3 Defect 1 — threshold partition gap
  [0.05, 0.07)). Codex Defect 1 reconciliation applied: the
  disputed routing margin is widened to 0.07 so the
  definitive / disputed / insufficient_evidence predicates
  partition cleanly without the [0.05, 0.07) gap — Codex's
  recommended fix path (cleaner: extend disputed routing to
  "competing within 0.07 OR mean ∈ [0.75, 0.92)" per
  closure §3.1 Defect 1).
