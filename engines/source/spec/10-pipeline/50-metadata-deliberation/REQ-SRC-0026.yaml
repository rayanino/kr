id: REQ-SRC-0026
type: requirement
status: confirmed
title: Authoritative work identity and collection linkage output
topic: identity
layer: pipeline
step: metadata_deliberation
priority: critical
confidence: high
provenance: owner_interview
source: Derived from owner guidance on 2026-04-14 that the source engine must determine exactly which book/source was uploaded and preserve collection linkage explicitly.
created: '2026-04-14'
updated: '2026-04-15'
depends_on:
- REQ-SRC-0019
- CON-SRC-0004
impacts:
- work_identity
- collection_matching
behavior:
  trigger: Metadata deliberation finalizes source-engine metadata for a source candidate.
  preconditions:
  - An intake_dossier exists with work_identity_proposal and collection_match_candidates.
  - "work_output.positions are derived from work_identity_proposal.candidates (from REQ-SRC-0019) plus any additional evidence discovered during metadata deliberation. Intake candidates are starting evidence, not final positions."
  - Metadata deliberation has access to the same evidence dossier used for source-work identification.
  postconditions:
  - work_output is written with non-null status and at least one evidence-backed position.
  - work_output.status is one of definitive, disputed, or insufficient_evidence.
  - A definitive case stores one chosen work position, while a disputed case preserves multiple work positions instead of forcing one bibliographic identity.
  - collection_match_output records whether the source matches an existing admitted work, an existing edition group, or no current collection match.
  - "collection_match_output.match_status is one of: same_work_same_edition, same_work_new_edition, duplicate_same_edition_volume, conflict_mixed_edition, new_work, unknown. This disambiguates the kind of collection match, not just its presence."
  - "collection_match_output.candidate_match_ids are structured as evidence-backed candidates with confidence (aligned with INV-SRC-0009 zero knowledge loss)."
  - "collection_match_output.matched_edition_group_id is the resolved best-match edition group identifier derived from candidate_match_ids when a single candidate has high confidence, or null when no high-confidence match exists. This field is consumed by reconciliation (REQ-SRC-0044)."
  - When the source appears to be one present part of a larger work, collection_match_output records parent_work_id plus present_volumes and missing_volumes when that can be inferred.
  - "present_volumes and missing_volumes are tied to the edition holding view (DEC-SRC-0018), not only the single source view. This enables holding-level completeness computation (INV-SRC-0010)."
  - title_arabic in SourceMetadata is derived from the chosen or preserved work identity evidence rather than from raw upload naming alone.
  error_conditions:
  - condition: Metadata deliberation finalizes SourceMetadata without emitting work_output.
    action: Abort metadata finalization with SRC-E-WORK-OUTPUT-MISSING.
    severity: fatal
  - condition: Metadata deliberation emits a definitive work identity without any evidence-backed work position.
    action: Abort metadata finalization with SRC-E-WORK-EVIDENCE.
    severity: fatal
acceptance_criteria:
- id: AC-1
  given: tests/fixtures/shamela_real/03_fiqh/book.htm with one evidence-backed work candidate
  when: metadata deliberation executes
  then: work_output.status="definitive", len(work_output.positions)=1, and title_arabic is non-empty.
  test_type: integration
- id: AC-2
  given: A source candidate whose intake dossier contains two evidence-backed work candidates for the same uploaded source
  when: metadata deliberation executes
  then: work_output.status="disputed" and len(work_output.positions) is at least 2.
  test_type: deterministic
- id: AC-3
  given: A source candidate whose intake dossier contains no evidence-backed work candidate
  when: metadata deliberation executes
  then: work_output.status="insufficient_evidence".
  test_type: deterministic
- id: AC-4
  given: A source candidate identified as volume 2 of a larger work with only volume 2 currently present
  when: metadata deliberation executes
  then: collection_match_output.parent_work_id is non-null, collection_match_output.present_volumes includes "2", and collection_match_output.missing_volumes is non-empty.
  test_type: deterministic
- id: AC-5
  given: A source candidate that matches an existing admitted work but from a different muhaqqiq (different edition)
  when: metadata deliberation executes
  then: collection_match_output.match_status="same_work_new_edition" and collection_match_output.matched_edition_group_id either differs from the existing edition or is null.
  test_type: deterministic
- id: AC-6
  given: A source candidate that is volume 5 of an already-complete work from the same edition
  when: metadata deliberation executes
  then: collection_match_output.match_status="duplicate_same_edition_volume" and collection_match_output.candidate_match_ids includes the existing edition holding with confidence.
  test_type: deterministic
