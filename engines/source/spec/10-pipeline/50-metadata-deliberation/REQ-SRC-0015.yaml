id: REQ-SRC-0015
type: requirement
status: proposed
title: Honorific-aware name matching
topic: metadata
layer: pipeline
step: metadata_deliberation
priority: high
confidence: high
provenance: coworker_review
source: Added from domain-validator-review.yaml; amended per adversary-review.yaml ADV-010
created: '2026-04-14'
updated: '2026-04-14'
depends_on:
- REQ-SRC-0004
impacts:
- author_matching
- canonical_names
rationale: Honorific stripping follows the authoritative repo list in .claude/rules/arabic-scholarly-conventions.md so the comparison key and displayed name stay synchronized as new scholarly titles are added.
behavior:
  trigger: Attribution matching compares two Arabic scholar names.
  preconditions:
  - Matching strips leading honorific tokens الشيخ, الإمام, العلامة, الحافظ, شيخ الإسلام, حجة الإسلام, القاضي, and المحقق from the comparison key.
  - Matching strips a leading kunya segment of the form أبو + next_token only when at least one additional name token remains after the kunya.
  - Stored display names preserve any honorifics that appear in the source.
  postconditions:
  - canonical_match_name excludes stripped honorific tokens and any stripped leading kunya segment.
  - display_name preserves the original honorific-bearing form from the source record.
  error_conditions:
  - condition: A name string contains only honorific tokens and no base name.
    action: Reject canonical matching with SRC-E-HONORIFIC-ONLY-NAME.
    severity: warning
acceptance_criteria:
- id: AC-1
  given: Name forms "الإمام النووي" and "النووي"
  when: author-name matching executes
  then: Both names resolve to the same canonical_match_name="النووي" while display_name preserves the original source form.
  test_type: deterministic
- id: AC-2
  given: Name forms "القاضي عياض" and "عياض"
  when: author-name matching executes
  then: Both names resolve to the same canonical_match_name="عياض" while display_name preserves the original source form.
  test_type: deterministic
- id: AC-3
  given: Name forms "أبو محمد ابن قدامة" and "ابن قدامة"
  when: author-name matching executes
  then: Both names resolve to the same canonical_match_name="ابن قدامة" while display_name preserves the original source form.
  test_type: deterministic
