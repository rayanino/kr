id: REQ-SRC-0014
type: requirement
status: confirmed
title: Copyist and author disambiguation
topic: metadata
layer: pipeline
step: metadata_deliberation
priority: critical
confidence: high
provenance: coworker_review
source: Added from domain-validator-review.yaml; amended per adversary-review.yaml ADV-006 and Claude DR spec audit 2026-04-15 which identified إعداد as a distinct role (neither author nor editor).
created: '2026-04-14'
updated: '2026-04-29'
depends_on: []
impacts:
- author_attribution
- colophon_parsing
behavior:
  trigger: Attribution parsing reads a metadata card or colophon with or without role-bearing name signals.
  preconditions:
  - "Role markers are mapped as: author={ألفه, صنفه, أملاه, وضعه}, compiler={جمعه, جمع وترتيب, رتبه}, preparer={إعداد}, copyist={كتبه, نسخه, نقله}, editor={المحقق, تحقيق, اعتنى به}, annotator={علق عليه, خرج أحاديثه}, supervisor={إشراف, مراجعة}."
  - "Self-deprecation formulas between a role marker and the scholar name (العبد الفقير إلى الله, أفقر العباد, الحقير, أحوج الناس إلى عفو ربه, بيده الفانية) are treated as transparent filler and skipped during name extraction."
  - "إعداد (preparation) is a distinct role: the preparer organized and arranged existing material for publication but did not create original content or establish text from manuscripts. Institutional إعداد credits (e.g., إعداد مركز الدراسات والبحوث) are common."
  - "جمعه (compilation) is distinct from تأليف (authorship): the compiler collected and arranged from multiple sources but may not have composed original content."
  - Metadata card fields and colophon strings are both available to the attribution parser when present.
  - The no-marker fallback applies only when neither the metadata card nor the colophon contains an explicit author, copyist, or editor role marker.
  postconditions:
  - author_name is populated only from author markers.
  - compiler_name is populated only from compiler markers.
  - preparer_name is populated only from preparer markers.
  - copyist_name is populated only from copyist markers.
  - editor_name is populated only from editor markers.
  - When no explicit role markers appear in metadata or colophon, metadata_card.author is assigned to author_name by default.
  - "confirmed_dual_role mechanical criteria: the same name in both author and editor roles is set to confirmed_dual_role (not attribution_role_conflict) when at least one of: (a) title page explicitly states تأليف وتحقيق or a combined formula, (b) temporal impossibility of being different people (same death_hijri for both roles), (c) research agent confirms the scholar is known to self-edit their own works."
  error_conditions:
  - condition: The same name is assigned to multiple roles without distinct supporting markers and without confirmed_dual_role evidence.
    action: Write attribution_role_conflict and preserve the raw role-bearing strings.
    severity: blocking
acceptance_criteria:
- id: AC-1
  given: Colophon text "كتبه الفقير العبد عبد الله بن محمد"
  when: attribution parsing executes
  then: copyist_name="عبد الله بن محمد" and author_name remains null.
  test_type: deterministic
- id: AC-2
  given: Metadata card text "ألفه محمد بن عبد الوهاب"
  when: attribution parsing executes
  then: author_name="محمد بن عبد الوهاب".
  test_type: deterministic
- id: AC-3
  given: Metadata card author field "ابن قدامة" with no colophon role markers
  when: attribution parsing executes
  then: author_name="ابن قدامة".
  test_type: deterministic
