id: REQ-SRC-0013
type: requirement
status: confirmed
title: Specialized research agents
topic: agent_ergonomics
layer: pipeline
step: metadata_deliberation
priority: high
confidence: high
provenance: owner_interview
source: Derived from OF-SRC-0016; amended per contract-architect-review.yaml and Gemini DR on Islamic scholarly metadata verification sources (2026-04-14) which provides a concrete curated inventory per source_type category.
created: '2026-04-14'
updated: '2026-04-14'
depends_on:
- OF-SRC-0016
- DEC-SRC-0009
- OQ-SRC-0007
impacts:
- research_dispatch
- evidence_quality
behavior:
  trigger: The engine dispatches research work for metadata verification.
  preconditions:
  - research_task.source_type is limited to general_web, scholarly_database, manuscript_catalog, islamic_reference, and library_catalog.
  - research_task.field declares the target metadata field before dispatch.
  - "Curated source inventory per category (from Gemini DR): scholarly_database includes Shamela API, OpenITI corpus, Usul.ai, Al-Manhal; manuscript_catalog includes Suleymaniye Library, Dar al-Kutub al-Misriyya, Chester Beatty Library, Princeton/Qatar Digital Library; islamic_reference includes Dorar.net REST API, ISNAD Database, IslamWeb.net; library_catalog includes Al-Furqan Portal, KSU Digital Library, WorldCat, Brill BABO; general_web includes Ahl al-Hadith forums, SifatuSafwa, publisher sites."
  - "Priority access modalities: Dorar.net via REST API (documented Postman endpoints), Shamela via TypeScript wrapper, OpenITI via GitHub/Zenodo data dumps, ISNAD Database via Mendeley GraphML, remaining sources via web scraping."
  postconditions:
  - High-impact fields author, genre, science_scope, and death_date use at least two distinct research_task.source_type values.
  - Every dispatch writes verification_log with field, source_types, source_count, and completed_at.
  - Non-high-impact fields may use fewer than two source types.
  error_conditions:
  - condition: A high-impact field is verified through only one source_type.
    action: Mark verification_log.status=incomplete_specialized_sources and rerun with additional source types.
    severity: blocking
acceptance_criteria:
- id: AC-1
  given: tests/fixtures/shamela_real/08_death_date/book.htm with research_task.field="death_date"
  when: research dispatch executes
  then: verification_log.field="death_date" and len(verification_log.source_types) is at least 2.
  test_type: integration
- id: AC-2
  given: tests/fixtures/shamela_real/04_hadith/book.htm with research_task.field="author"
  when: research dispatch executes
  then: verification_log.source_types is a subset of {general_web, scholarly_database, manuscript_catalog, islamic_reference, library_catalog}.
  test_type: deterministic
- id: AC-3
  given: A research task with field="author" and only source_type=general_web available
  when: research dispatch executes
  then: verification_log.status="incomplete_specialized_sources".
  test_type: deterministic
