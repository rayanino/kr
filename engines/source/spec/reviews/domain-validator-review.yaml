DOMAIN GAPS:
- Anonymous classical works (no author attribution possible).
- Collective works or compilations (جمع وترتيب) where the compiler is distinct from the original authors.
- Abridgments (mukhtasar) handling where the original author and the abridger are distinct entities.
- Colophon parsing rules: No atom covers the critical distinction between copyist (كتبه) and author (ألفه) which is a major source of attribution errors.
- Persian/Ottoman works in Arabic script within the Shamela collection.

TERMINOLOGY ISSUES:
- "narrator-biography work" in REQ-SRC-0011 is not the correct domain term; it should be `tabaqat` or `rijal`.
- Lack of precise domain terminology (matn, sharh, hashiyah) in the atoms discussing multi-layer detection.

CONVENTION VIOLATIONS:
- Failing to account for stripping honorifics (الشيخ، الإمام، الحافظ) before matching author names, while preserving them in storage.
- No invariant ensures transmission formulas (حدثنا, أخبرنا) are treated as atomic isnad units.

RECOMMENDED NEW ATOMS:
- REQ-SRC-0014: Copyist/Author Disambiguation (Strict differentiation between copyists and authors during attribution).
- REQ-SRC-0015: Base Name Extraction (Strip honorifics during matching but preserve in metadata).
- REQ-SRC-0016: Multi-Science Assignment (Allow source to be tagged with primary and secondary science).
- INV-SRC-0006: Isnad Preservation (Transmission formulas indicate atomic units that must never be split).