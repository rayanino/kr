id: CON-SRC-0004
type: constraint
status: proposed
title: Complete SourceMetadata output schema
topic: handoff
layer: contracts
priority: critical
confidence: high
provenance: coworker_review
source: Added from adversary-review.yaml ADV-002; amended per reference/pdf_fixture_observations_2026-04-14.md, owner guidance on 2026-04-14 about exact source/work identification and staged source admission, and the architecture decision that normalization owns text extraction.
created: '2026-04-14'
updated: '2026-04-14'
depends_on: []
impacts:
- source_metadata
- downstream_contracts
rule:
  statement: Every source-engine accepted source emits one SourceMetadata record with non-null mandatory fields source_id, source_sha256, frozen_blob_path, registry_entry_id, title_arabic, author_output, work_output, genre, science_scope, is_multi_layer, structural_format, trust_decision, completeness_status, integrity_status, volume_count, and intake_timestamp; author_output must always contain status and positions.
  implication: Any source-engine accepted source missing one mandatory field, emitting null for one mandatory field, or naming a conflicting SourceMetadata shape violates the handoff contract; optional fields may appear as muhaqiq_output, death_date_hijri, level, edition_info, publisher, text_fidelity, hint_comparison_results, source_format in {shamela_html, pdf, plain_text}, normalization_route in {html_parse_primary, pdf_ocr_primary, pdf_text_primary, plain_text_parse}, pdf_text_layer_status in {absent, corrupt, presentation_forms, clean}, pdf_text_encoding in {standard_arabic, presentation_forms, mixed}, page_count_physical, page_layout_hint in {single_column, dual_column, marginal_notes, mixed}, and admission_reason in {accepted_clean, accepted_with_flags}.
  violation_severity: critical
acceptance_criteria:
- id: AC-1
  given: Any source_engine_accepted source
  when: source admission and handoff packaging complete
  then: The emitted SourceMetadata record contains all mandatory fields with non-null values, author_output.status is non-null, author_output.positions is present, and work_output is non-null.
  test_type: integration
- id: AC-2
  given: tests/fixtures/waraqat_usul/waraqat.pdf
  when: source admission and handoff packaging complete
  then: The emitted SourceMetadata record may include source_format="pdf", normalization_route="pdf_ocr_primary", pdf_text_layer_status="corrupt", page_layout_hint, page_count_physical=13, completeness_status, and integrity_status without violating the output contract.
  test_type: integration
