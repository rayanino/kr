id: CON-SRC-0004
type: constraint
status: confirmed
title: Complete SourceMetadata output schema
topic: handoff
layer: contracts
priority: critical
confidence: high
provenance: coworker_review
source: >-
  Added from adversary-review.yaml ADV-002; amended per reference/
  pdf_fixture_observations_2026-04-14.md, owner guidance on
  2026-04-14 about exact source/work identification and staged
  source admission, and the architecture decision that normalization
  owns text extraction. Further amended on 2026-04-17 after the
  3-of-3 unanimous OPT-B adjudication on DEC-SRC-0003: (a) added
  the mandatory `level_status` enum field per Gemini DR's middle-
  path proposal, which closes the null-conflation gap that Claude
  DR correctly identified without adopting OPT-C's shallow-signal
  level emission; (b) level_status provenance is the source engine
  at admission time, with values pending_synthesis or
  non_applicable_reference, extended by the synthesis engine to
  assigned or unprocessable_error. Amended on 2026-04-23 (Phase 5b
  item 4, Option E-prime-final) to reconcile the non-applicable
  genre set to a six-value frozenset {mushaf, hadith_collection,
  mashyakhah, thabat, barnamaj, fahrasah} and to cite the 3-axis
  gate defined by INV-SRC-0012 (genre + composite_work_type +
  deferred HadithSubgenre). Non-applicable fatwa_compilation /
  lexicon / biographical_dictionary / rijal_dictionary / majmu
  entries were removed as scholarly category errors per
  2026-04-22 unanimous 2-run Gemini CLI BLOCKER_PRESENT findings;
  AC-3 continues to assume Axis 1 firing (genre="mushaf") while
  AC-4 covers the leveled-genre-no-override-no-composite default
  (composite_work_type is assumed null unless set by REQ-SRC-0038).
  See .kr/runtime/adjudication_gemini_dr_20260417.md sections q5
  and final_recommendation, and follow-ups 21-26. Amended on
  2026-04-23 (Phase 5b item 7, ownership story closure) for the
  3-of-3 UNANIMOUS_OWN_SYNTHESIS HIGH-confidence verdict from Codex
  CLI (gpt-5.4, architectural-fit axis) plus Gemini CLI 2-run
  (gemini-3.1-pro-preview Run A and gemini-2.5-pro Run B,
  classical-scholarly-defensibility axis) on the synthesis-vs-
  taxonomy paper-reconciliation that Phase 5a reviewer wave flagged
  (Codex CAF-2 + CC-adversary ADV-003). Implementation edits:
  (a) enum value `pending_taxonomy` renamed to `pending_synthesis`
  throughout (rule.statement, rule.implication, acceptance_criteria,
  cross-field invariant 2, source-field narrative); (b) per Gemini
  Run B unique catch, the generic wording "a downstream engine" in
  rule.implication lines 74-78 (the `assigned` definition and
  `unprocessable_error` definition) tightened to "the synthesis
  engine" for single-writer discipline (Codex architectural test 1);
  (c) "reserved for downstream engines" tightened to "reserved for
  the synthesis engine"; (d) the 2026-04-17 source-narrative line
  "extended by downstream engines to" tightened to "extended by the
  synthesis engine to". Classical scholarly grounding (Gemini Run A
  + Run B cross-confirmed): al-Fihrist of Ibn al-Nadīm and Kashf
  al-Ẓunūn of Ḥājjī Khalīfa classify by fann + nawʿ but
  systematically omit martaba — martaba is pedagogical not
  bibliographic; Ibn Khaldūn's Muqaddima Book VI on taʿlīm al-
  ʿulūm anchors martaba in content density and tadarruj; al-
  Zarnūjī's Taʿlīm al-Mutaʿallim Chapter IV distinguishes reader-
  level from text-level. Al-Kattānī's al-Risāla al-Mustaṭrafah
  nawʿ-classification of ḥadīth books was considered by Gemini Run
  B as an OWN_TAXONOMY counter-argument but weighed down by the
  bibliographic-vs-pedagogical distinction. New Phase 5b follow-up
  item 28 opened for the architectural unreachability of
  LevelProvenance.TAXONOMY_ENGINE under OWN_SYNTHESIS (not in
  3-evaluator reading list, deferred to a separate dispatch).
  Reviewer outputs:
  .kr/runtime/structural_audit_codex_cli_item7_retry_20260423.md,
  .kr/runtime/domain_validation_gemini_cli_item7_run_A_20260423.md,
  .kr/runtime/domain_validation_gemini_cli_item7_run_B_20260423.md.
  Follow-up 32 amendment on 2026-04-24 resolves atom-vs-contract
  nested-shape drift for REQ-SRC-0046: genre_dispute is explicitly an
  optional evidence-bearing list of alternate genre positions
  (genre_candidate, supporting_evidence, confidence, source_agents),
  ordered by descending confidence and preserved recursively at handoff.
  muhaqiq_output remains the live MuhaqiqAssessment shape; edition_info
  remains a flexible Optional[dict[str, Any]] surface.
created: '2026-04-14'
updated: '2026-04-24'
depends_on:
- REQ-SRC-0014
- REQ-SRC-0004
- CON-SRC-0011
impacts:
- source_metadata
- downstream_contracts
- level_status
rule:
  statement: >-
    Every source-engine accepted source emits one SourceMetadata
    record with non-null mandatory fields source_id, source_sha256,
    frozen_blob_path, registry_entry_id, title_arabic, author_output,
    work_output, genre, science_scope, is_multi_layer,
    structural_format, trust_decision, completeness_status,
    integrity_status, volume_count, intake_timestamp, AND
    level_status. The author_output field must always contain status
    (one of agent_consensus, agent_disagreement, agent_no_evidence,
    co_authored) and positions. The level_status field must always
    contain one of the four enum values defined below.
  implication: >-
    Any source-engine accepted source missing one mandatory field,
    emitting null for one mandatory field, or naming a conflicting
    SourceMetadata shape violates the handoff contract; author_output
    .status values are agent_consensus, agent_disagreement,
    agent_no_evidence, or co_authored (renamed from definitive /
    disputed / insufficient_evidence to avoid collision with
    REQ-SRC-0040 scholarly terminology); each author_output.positions
    entry may include entity_type in {person, institution}.
    level_status is an enum with exactly four values: pending_synthesis
    (admitted, level determination deferred to the synthesis engine),
    non_applicable_reference (admitted, the work fires at least one
    INV-SRC-0012 non-applicability axis — Axis 1 genre-level with the
    six-value set {mushaf, hadith_collection, mashyakhah, thabat,
    barnamaj, fahrasah}, Axis 2 composite_work_type == "majmu", or
    the deferred Axis 3 HadithSubgenre carve-out), unprocessable_error
    (terminal state where the synthesis engine has concluded that level
    cannot be assigned even with further work), and assigned (level is
    non-null and has been authoritatively written by the synthesis
    engine or by a valid owner_level_override per REQ-SRC-0047).
    The source engine at admission time emits ONLY pending_synthesis
    or non_applicable_reference (plus assigned when an accepted
    owner_level_override populated level at intake); the values
    unprocessable_error and assigned-from-downstream are reserved
    for the synthesis engine. Cross-field invariants are mandatory:
    (1) level_status == "assigned" IFF level is non-null; (2)
    level_status in {pending_synthesis, non_applicable_reference,
    unprocessable_error} IMPLIES level is null; (3) level_status ==
    "non_applicable_reference" IMPLIES at least one INV-SRC-0012
    axis fires (Axis 1 genre membership in the six-value set OR
    Axis 2 composite_work_type == "majmu"); (4) level_status is
    NEVER null and NEVER inferred from shallow bibliographic
    signals (it is a processing-state label, not a pedagogical-
    level inference governed by INV-SRC-0011). Optional fields may appear as muhaqiq_output,
    compiler_name, preparer_name, copyist_name, annotator_name,
    supervisor_name, death_date_hijri, level, edition_info,
    publisher, genre_dispute (list of evidence-bearing alternate
    genre positions with genre_candidate, supporting_evidence,
    confidence, source_agents), text_fidelity, hint_comparison_results,
    attribution_confidence in {confirmed, disputed, anonymous,
    pseudepigraphic, collective}, work_relationships (list of typed
    links with relationship_type, target_work_title,
    target_work_author, confidence), composite_work_type in {majmu,
    null}, display_card (source card with progressive disclosure
    tiers), source_format in {shamela_html, pdf, plain_text},
    normalization_route in {html_parse_primary, pdf_ocr_primary,
    pdf_text_primary, plain_text_parse}, pdf_text_layer_status in
    {absent, corrupt, presentation_forms, clean}, pdf_text_encoding
    in {standard_arabic, presentation_forms, mixed},
    page_count_physical, page_layout_hint in {single_column,
    dual_column, marginal_notes, mixed}, matn_embedding_style in
    {interlinear, separated, marginal, mazj, null}, admission_reason
    in {accepted_clean, accepted_with_flags}, edition_group_id
    (resolved or best-guess link to the EditionGroup this source
    belongs to), holding_id (link to the EditionHolding this source's
    volumes are attached to), volume_coverage (list of volume
    numbers or ranges actually present in this source, distinct from
    volume_count which is the observed count), supersession_candidates
    (list of holdings this source may supersede, each with evidence
    and confidence), preferred_rank in {primary, alternate,
    superseded, null} (informational signal for downstream
    orchestration), and holding_completeness_delta (what new volume
    coverage this source adds to a matching EditionHolding, null
    when no match exists; produced by REQ-SRC-0036).
  violation_severity: critical
acceptance_criteria:
- id: AC-1
  given: Any source_engine_accepted source
  when: source admission and handoff packaging complete
  then: >-
    The emitted SourceMetadata record contains all mandatory fields
    with non-null values, author_output.status is one of
    {agent_consensus, agent_disagreement, agent_no_evidence,
    co_authored}, author_output.positions is present, work_output is
    non-null, and level_status is non-null with a value in
    {pending_synthesis, non_applicable_reference, unprocessable_error,
    assigned}.
  test_type: integration
- id: AC-2
  given: tests/fixtures/waraqat_usul/waraqat.pdf
  when: source admission and handoff packaging complete
  then: >-
    The emitted SourceMetadata record may include
    source_format="pdf", normalization_route="pdf_ocr_primary",
    pdf_text_layer_status="corrupt", page_layout_hint,
    page_count_physical=13, completeness_status, and
    integrity_status without violating the output contract.
  test_type: integration
- id: AC-3
  given: >-
    A source_engine_accepted source with genre="mushaf",
    composite_work_type=null, and no owner_level_override at intake.
    Axis 1 fires on the genre (mushaf is in the six-value
    non-applicable set).
  when: source admission and handoff packaging complete
  then: >-
    SourceMetadata.level is null AND SourceMetadata.level_status ==
    "non_applicable_reference" (cross-field invariants 2 and 3 both
    hold, Axis 1 cited).
  test_type: integration
- id: AC-4
  given: >-
    A source_engine_accepted source with genre="sharh" (a leveled
    genre NOT in the Axis 1 non-applicable set), composite_work_type
    =null (Axis 2 does not fire), and no owner_level_override at
    intake.
  when: source admission and handoff packaging complete
  then: >-
    SourceMetadata.level is null AND SourceMetadata.level_status ==
    "pending_synthesis" (cross-field invariant 2 holds; neither
    INV-SRC-0012 axis fires so non_applicable_reference is wrong).
  test_type: integration
- id: AC-5
  given: >-
    A source_engine_accepted source with genre="sharh" and a valid
    owner_level_override="mutawassiṭ" accepted at intake per
    REQ-SRC-0047
  when: source admission and handoff packaging complete
  then: >-
    SourceMetadata.level == "mutawassiṭ" AND SourceMetadata
    .level_status == "assigned" (cross-field invariant 1 holds).
  test_type: integration
- id: AC-6
  given: >-
    Any source_engine_accepted SourceMetadata record emitted by the
    source engine at admission time
  when: the contract validator inspects the emission
  then: >-
    level_status is one of {pending_synthesis,
    non_applicable_reference, assigned} — the source engine NEVER
    emits level_status == "unprocessable_error" at admission (that
    value is reserved for the synthesis engine after attempted
    determination).
  test_type: integration
- id: AC-7
  given: >-
    A malformed SourceMetadata record where level="mutawassiṭ" but
    level_status="pending_synthesis" (cross-field invariant 1
    violation)
  when: the contract validator inspects the record
  then: >-
    The record is rejected as invalid with respect to CON-SRC-0004
    and the rejection message identifies the specific cross-field
    invariant violated.
  test_type: deterministic
