id: CON-SRC-0012
type: constraint
status: confirmed
title: Error severity taxonomy
topic: validation
layer: contracts
priority: high
confidence: high
provenance: coworker_review
source: >-
  Established on 2026-04-21 per Phase 5b item 13 closing Codex CLI's
  Phase 5a reviewer-wave finding S7 ("schema enum {fatal, blocking,
  warning} has no operational definition anywhere"). The JSON Schema
  at engines/source/spec/schema.json $defs/severity pins the three
  permitted values but provides no semantic guidance. With 75+
  behavior.error_conditions severity assignments across the atom
  corpus (24 fatal, 21 blocking, 30 warning as of this atom's
  creation date), the absence of operational semantics means each
  atom author has been free to interpret the values differently,
  silently corrupting the pipeline's error-recovery contract. This
  atom fixes the semantics once and authoritatively.
created: '2026-04-21'
updated: '2026-04-21'
depends_on: []
impacts:
- error_handling
- behavior_error_conditions
- schema_severity_enum
- pipeline_recovery_contract
rationale: >-
  Severity categorization is not cosmetic — it encodes the pipeline's
  recovery contract. A fatal error halts the affected record's
  progression with no recovery path and typically escalates to
  operator attention. A blocking error halts the current attempt but
  leaves a clear correction path (owner resubmits with a valid value,
  upstream engine re-produces missing evidence, downstream engine
  retries after a transient dependency recovers). A warning is
  logged-but-non-halting — it surfaces a condition that deserves
  observability without interrupting the pipeline. Miscategorizing a
  recoverable rejection as fatal silently converts retryable scholarly
  input into a dead-letter outcome, violating the "library never
  refuses knowledge" principle (INV-SRC-0003). Miscategorizing
  unrecoverable corruption as blocking risks surfacing corrupted
  scholarship as valid output — the exact failure mode that the
  knowledge-integrity threat model (reference/KNOWLEDGE_INTEGRITY.md)
  treats as T-1 and T-2. Miscategorizing a halting rejection as
  warning drops the rejection into log noise and silently admits the
  invalid record downstream. The taxonomy below is the authoritative
  rubric for every severity assignment across the source-engine atom
  set and applies recursively to the downstream engines when they
  consume the source handoff bundle.
rule:
  statement: >-
    Every behavior.error_conditions[].severity value in any source-
    engine spec atom carries a defined operational semantic. "fatal"
    means unrecoverable data corruption — the condition indicates
    that scholarly metadata or primary text has been damaged in a way
    that cannot be reconstructed from the inputs available to the
    pipeline, and no downstream engine may proceed with the affected
    record. "blocking" means recoverable rejection — the condition
    prevents the current operation from completing but a specific
    correction path exists (owner resubmits with a valid override,
    upstream re-emits missing evidence, transient dependency
    recovers). "warning" means advisory — the condition is logged
    and the operation continues; suitable for observability signals
    that must not halt the pipeline. These three values are
    mutually exclusive and collectively exhaustive for the severity
    enum.
  implication: >-
    When authoring a new error_condition for any atom: choose "fatal"
    ONLY when the data consequence is unrecoverable corruption (e.g.
    knowledge-integrity threat realized, scholarly attribution
    silently lost, byte-level Arabic text damage, frozen source
    mutated); choose "blocking" when a correction path is available
    (e.g. owner override rejected as invalid per an enum constraint,
    upstream contract violation that can be renegotiated, missing
    required-preserved evidence that upstream can re-emit); choose
    "warning" when the pipeline MUST keep running and the condition
    is diagnostic only (e.g. optional evidence signal absent, non-
    critical validation delta, informational quality flag). Violating
    this taxonomy — using "fatal" where "blocking" applies, or
    "blocking" where "warning" applies, or any combination —
    corrupts the pipeline's recovery contract and must be treated as
    an atom-authoring defect caught at reviewer-wave time.
  violation_severity: high
acceptance_criteria:
- id: AC-1
  given: >-
    An atom whose behavior.error_conditions[] specifies severity
    "fatal" for a condition where the data consequence is
    unrecoverable corruption (e.g. SRC-E-EVIDENCE-DROPPED in
    REQ-SRC-0046, SRC-E-AUTHOR-COPYIST-CONFLATION per REQ-SRC-0014)
  when: the error condition is reviewed against this taxonomy
  then: >-
    The severity assignment is accepted — "fatal" is the correct
    label for unrecoverable data corruption paths that must halt the
    record's progression with no automatic retry.
  test_type: deterministic
- id: AC-2
  given: >-
    An atom whose behavior.error_conditions[] specifies severity
    "blocking" for a condition where a clear correction path exists
    (e.g. SRC-E-LEVEL-OVERRIDE-NONAPPLICABLE per REQ-SRC-0047, an
    owner override rejected against CON-SRC-0011 enum validation)
  when: the error condition is reviewed against this taxonomy
  then: >-
    The severity assignment is accepted — "blocking" is the correct
    label for recoverable rejections where the owner or upstream can
    produce a valid value and re-submit.
  test_type: deterministic
- id: AC-3
  given: >-
    An atom whose behavior.error_conditions[] specifies severity
    "warning" for a condition that is diagnostic only (e.g. an
    optional evidence signal absent, a non-critical validation delta
    logged for observability)
  when: the error condition is reviewed against this taxonomy
  then: >-
    The severity assignment is accepted — "warning" is the correct
    label for advisory conditions that must not halt the pipeline.
  test_type: deterministic
- id: AC-4
  given: >-
    A proposed error_condition whose action is "reject and wait for
    owner correction" but whose severity is authored as "fatal"
  when: the error condition is reviewed against this taxonomy
  then: >-
    The severity assignment is rejected — a correction path exists
    (owner correction), so the correct label is "blocking" not
    "fatal"; the mismatch violates the pipeline recovery contract by
    converting a retryable rejection into a dead-letter outcome.
  test_type: deterministic
- id: AC-5
  given: >-
    A proposed error_condition whose action is "log the anomaly and
    continue processing" but whose severity is authored as "blocking"
  when: the error condition is reviewed against this taxonomy
  then: >-
    The severity assignment is rejected — the action does not halt
    the operation, so the correct label is "warning" not "blocking";
    using "blocking" with a non-halting action corrupts the
    pipeline's understanding of which errors stop progression.
  test_type: deterministic
- id: AC-6
  given: >-
    A proposed error_condition whose action is "abort and emit
    SRC-E-ARABIC-TEXT-BYTES-MUTATED because the frozen source was
    modified" but whose severity is authored as "warning"
  when: the error condition is reviewed against this taxonomy
  then: >-
    The severity assignment is rejected — frozen-source mutation is
    unrecoverable data corruption (T-1 per the knowledge-integrity
    threat model) and MUST be labeled "fatal"; mislabeling such
    corruption as "warning" drops a critical integrity violation
    into log noise.
  test_type: deterministic
