id: CON-SRC-0011
type: constraint
status: confirmed
title: WorkLevel enum — classical pedagogical-level vocabulary
topic: metadata
layer: contracts
priority: high
confidence: high
provenance: deep_research
source: >-
  Established on 2026-04-17 following the 3-of-3 unanimous OPT-B
  adjudication on DEC-SRC-0003. The enum values derive from Gemini
  CLI run 2 classical-defensibility review (R2 finding) which
  identified that the ChatGPT DR amendment set used `mutaqaddim` as
  the "advanced" level value — incorrect classical usage. Mutaqaddim
  (متقدم) denotes chronological priority (an earlier-generation
  scholar relative to a later one), NOT pedagogical advancement. The
  correct classical pedagogical ladder is mubtadiʾ (beginner) →
  mutawassiṭ (intermediate) → muntahī (terminal / advanced),
  documented in al-Zarnūjī's Taʿlīm al-Mutaʿallim, Ibn Khaldūn's
  Muqaddima Book VI (faṣl fī wajh al-ṣawāb fī taʿlīm al-ʿulūm), and
  the standard curriculum language of Dār al-Muṣṭafā and al-
  Qarawiyyīn ḥadīth tracks. See .kr/runtime/
  adjudication_gemini_cli_run1_20260417.md (R2 terminology finding)
  and run2_20260417.md (independent confirmation). Amended 2026-04-23
  (Phase 5b item 5) to break 3 producer-consumer cycles: the original
  depends_on list named INV-SRC-0011, CON-SRC-0004, and REQ-SRC-0047 —
  all of which CONSUME this enum and themselves declare CON-SRC-0011
  as a producer, creating cycles that break scoped atom injection per
  Codex CAF-1. The corrected ordering is strictly producer-before-
  consumer: CON-SRC-0011 defines the WorkLevel vocabulary, so it
  depends only on the architectural decision (DEC-SRC-0003) that
  authorized having a level vocabulary at all; every atom that uses
  the enum (INV-SRC-0011, INV-SRC-0012, CON-SRC-0004, REQ-SRC-0047,
  REQ-SRC-0007) declares CON-SRC-0011 as an upstream producer.
  Further amended 2026-04-23 (Phase 5b item 11) to add the C7 multi-layer
  scope clause: the single scalar SourceMetadata.level, when populated
  for a multi-layer work (matn + sharḥ, sharḥ + ḥāshiya, or deeper
  nestings), refers to the TARGET READERSHIP of the composite work as
  a whole — the pedagogical state of the student for whom the work is
  intended — NOT the level of any contained layer, the author's own
  scholarly stature, or the matn's intrinsic density. Per Gemini CLI
  Run B C7 verdict CONFIRM (interpretation_measured: target_readership,
  `.kr/runtime/domain_validation_gemini_cli_run_B_20260417.md`:95-102)
  and Adversary finding ADV-007 (severity: HIGH; affected_atoms:
  REQ-SRC-0046, CON-SRC-0011, CON-SRC-0004; `.kr/runtime/
  adversary_phase5a_20260417.md`:242-252). Classical-defensibility
  reasoning: all four madhāhib use the mubtadiʾ/mutawassiṭ/muntahī
  terminology to describe the student-state at which the work is
  pitched, not the author's own rank (al-Zarnūjī Taʿlīm al-Mutaʿallim
  IV; Ibn Khaldūn Muqaddima VI, faṣl fī wajh al-ṣawāb fī taʿlīm al-
  ʿulūm). The scope is the owner's own question — "what student can
  read this?" — so the library ladder matches his actual progression.
  A sharḥ authored by a muntahī but composed to teach mubtadiʾ students
  is assigned level="mubtadiʾ"; a ḥāshiya composed for muntahī-level
  Ḥanafī specialists is assigned level="muntahī" regardless of the
  underlying matn's native level. This interpretation is strictly
  stronger than the Adversary's proposed "outer author's work only"
  alternative fix — it refuses the author-rank proxy in favor of the
  pedagogical-fit question the owner actually asks of the library.
  Closure-wave amendment 2026-04-23 (Codex CAF-5 + 2-of-2 Gemini
  DIM1/DIM2 convergent): (a) replaced residual "taxonomy engine"
  wording in rationale with "synthesis engine" per DEC-SRC-0003
  synthesis-owns-level (closes Codex CAF-5); (b) anchored the
  multi-layer scope clause in rule.statement to the classical Arabic
  istiʿdād al-mutaʿallim (استعداد المتعلم) per Ibn Khaldūn Muqaddima
  VI, with al-qāriʾ al-maqṣūd (القارئ المقصود) as equivalent gloss
  (closes 2-of-2 Gemini DIM1 — Run A proposed istiʿdād, Run B
  proposed al-qāriʾ al-maqṣūd; both kept, classical primacy to Ibn
  Khaldūn's exact phrasing); (c) augmented AC-7 from a single
  Hanbali exemplar (Ibn ʿUthaymīn) to a four-madhhab exemplar set
  (Maḥallī Sharḥ al-Waraqāt for Shafiʿi, al-Shurunbulālī Nūr al-
  Īḍāḥ for Hanafi, Zarrūq Sharḥ al-Risālah for Maliki, original
  Ibn ʿUthaymīn retained for Hanbali), avoiding perceived madhhab
  bias and demonstrating that the istiʿdād al-mutaʿallim scope rule
  is universally institutionalized across the Sunni schools
  (closes 2-of-2 Gemini DIM2 convergent finding). Reviewer outputs
  at `.kr/runtime/closure_wave_codex_cli_20260423.md` and
  `.kr/runtime/closure_wave_gemini_cli_run_{A,B}_20260423.md`.
created: '2026-04-17'
updated: '2026-04-23'
depends_on:
- DEC-SRC-0003
impacts:
- level_metadata
- owner_override_validation
- downstream_level_inference
rationale: >-
  The SourceMetadata.level field is populated from one of two
  sources: (a) an owner_level_override supplied at intake, validated
  by REQ-SRC-0047 against this enum; or (b) a downstream authoritative
  write by the synthesis engine after content analysis, per DEC-SRC-0003
  synthesis-owns-level (the earlier "taxonomy engine" wording was
  retired in Phase 5b item 7 and re-ratified by the closure wave). Both pathways
  MUST use the same enum vocabulary, and that vocabulary MUST be
  classically defensible — the owner is a non-technical Muslim
  student building his personal scholarly library, and label
  terminology that misaligns with classical pedagogy corrupts his
  ability to place the text in his own study progression. The
  three-tier ladder mubtadiʾ → mutawassiṭ → muntahī is the classical
  tradition's own vocabulary for learner progression: mubtadiʾ is
  the student before malakah formation begins; mutawassiṭ is the
  student consolidating foundational texts while crossing into the
  sharḥ literature; muntahī is the student who has completed the
  structured curriculum of a given fann and can engage ḥāshiya-level
  commentary and independent reading. The rejected alternative term
  mutaqaddim is NOT a pedagogical term but a historiographic one
  (describing earlier-generation scholars vs mutaʾakhkhirūn later-
  generation scholars). Using mutaqaddim as a learner-level label is
  a category error that R2 Gemini CLI review flagged as corrupting
  both the owner's mental model and downstream taxonomy queries.
rule:
  statement: >-
    The WorkLevel enum is the canonical vocabulary for the
    SourceMetadata.level field and any downstream field that stores
    an authoritative pedagogical-level assignment. It has exactly
    three permitted values: "mubtadiʾ" (beginner / pre-malakah
    student), "mutawassiṭ" (intermediate / foundational-malakah
    student), and "muntahī" (terminal / curriculum-completing
    student). No other string values are valid for a SourceMetadata
    .level assignment. The historiographic term "mutaqaddim" and its
    counterpart "mutaʾakhkhirūn" are REJECTED as WorkLevel values —
    they denote chronological / generational priority among scholars,
    not pedagogical level. For a multi-layer work (matn + sharḥ,
    sharḥ + ḥāshiya, or deeper nestings), the single scalar
    SourceMetadata.level refers to the TARGET READERSHIP of the
    composite work as a whole — the pedagogical state of the student
    for whom the work is intended — NOT the level of any contained
    layer, the author's own scholarly stature, or the matn's intrinsic
    density. The classical Arabic anchor for this scope is
    istiʿdād al-mutaʿallim (استعداد المتعلم) per Ibn Khaldūn
    Muqaddima VI, faṣl fī wajh al-ṣawāb fī taʿlīm al-ʿulūm —
    "wa-muraʿāt istiʿdād al-mutaʿallim wa-qabūlihi" — the readiness
    and receptivity of the learner for whom the work is pitched;
    al-qāriʾ al-maqṣūd (القارئ المقصود) is an acceptable
    equivalent gloss. A sharḥ composed by a muntahī to teach mubtadiʾ
    students is assigned level="mubtadiʾ"; a ḥāshiya composed for
    muntahī-level Ḥanafī specialists is assigned level="muntahī"
    regardless of the underlying matn's native level.
  implication: >-
    Any SourceMetadata record whose level field contains a string
    not in {mubtadiʾ, mutawassiṭ, muntahī} (when level is non-null)
    violates the WorkLevel contract. Violations corrupt owner
    override validation (REQ-SRC-0047) and downstream taxonomy
    queries, and propagate a category-error between historiographic
    and pedagogical vocabularies into the library's metadata. In
    particular, accepting "mutaqaddim" as a level value would silently
    teach the owner to conflate chronological earlier-scholar status
    with pedagogical beginner status — a T-2 knowledge-integrity
    corruption vector. Similarly, in a multi-layer work, populating
    SourceMetadata.level from the author's scholarly rank, the matn's
    intrinsic density, or any layer other than the composite work's
    target readership is a scope-error violation of this contract:
    the owner's downstream "what should I read next?" queries against
    the library would return works whose pedagogical fit is misaligned
    with his actual student state, corrupting the library's ability
    to serve as a personal study ladder (T-2 corruption vector applied
    at the scope-interpretation layer rather than the enum-string
    layer). A sharḥ authored by a muntahī but composed for mubtadiʾ
    students assigned level="muntahī" on author-rank grounds would
    silently withhold the work from beginners it was written to serve.
  violation_severity: critical
acceptance_criteria:
- id: AC-1
  given: >-
    A SourceMetadata record with level="mubtadiʾ"
  when: the enum validator inspects the record
  then: >-
    The record is accepted as valid with respect to CON-SRC-0011.
  test_type: deterministic
- id: AC-2
  given: >-
    A SourceMetadata record with level="mutawassiṭ"
  when: the enum validator inspects the record
  then: >-
    The record is accepted as valid with respect to CON-SRC-0011.
  test_type: deterministic
- id: AC-3
  given: >-
    A SourceMetadata record with level="muntahī"
  when: the enum validator inspects the record
  then: >-
    The record is accepted as valid with respect to CON-SRC-0011.
  test_type: deterministic
- id: AC-4
  given: >-
    A SourceMetadata record with level="mutaqaddim" (historiographic
    term, not a pedagogical-level value)
  when: the enum validator inspects the record
  then: >-
    The record is rejected as invalid with respect to CON-SRC-0011
    and the rejection message explicitly cites the historiographic-
    vs-pedagogical category error.
  test_type: deterministic
- id: AC-5
  given: >-
    A SourceMetadata record with level="advanced" (English string,
    not a classical Arabic enum value)
  when: the enum validator inspects the record
  then: >-
    The record is rejected as invalid with respect to CON-SRC-0011.
  test_type: deterministic
- id: AC-6
  given: >-
    A SourceMetadata record with level=null
  when: the enum validator inspects the record
  then: >-
    The record is accepted with respect to CON-SRC-0011 (null is a
    valid state; the WorkLevel enum only governs non-null level
    values).
  test_type: deterministic
- id: AC-7
  given: >-
    A SourceMetadata record for a multi-layer work (is_multi_layer=
    true) whose outer-layer author is a muntahī-level scholar but
    whose target readership is mubtadiʾ students. Cross-madhhab
    exemplars (any of the four Sunni schools illustrate the same
    istiʿdād al-mutaʿallim scope rule): (Hanbali) شرح الأصول الثلاثة
    of Ibn ʿUthaymīn — a muntahī authoring a foundational sharḥ for
    absolute beginners; (Shafiʿi) شرح الورقات في أصول الفقه of Jalāl
    al-Dīn al-Maḥallī — a muntahī's canonical commentary on the
    mubtadiʾ-targeted al-Waraqāt; (Hanafi) نور الإيضاح ونجاة الأرواح
    of al-Shurunbulālī — a late-era Hanafi muntahī's foundational
    fiqh primer widely taught at the mubtadiʾ stage; (Maliki) شرح
    الرسالة of Zarrūq on Ibn Abī Zayd al-Qayrawānī's mubtadiʾ-
    targeted creed-and-fiqh risāla. Any of the four exemplars,
    with level="mubtadiʾ", demonstrates the rule equivalently.
  when: the enum validator inspects the record and the rule.statement
    multi-layer scope clause is applied
  then: >-
    The record is accepted as valid with respect to CON-SRC-0011 and
    the assignment is semantically correct — the target-readership
    (istiʿdād al-mutaʿallim) scope is the canonical interpretation
    for multi-layer works, so the muntahī authorship of the outer
    sharḥ does NOT override the mubtadiʾ target-readership
    assignment. The converse assignment (level="muntahī" on author-
    rank grounds for the same work) would be a scope-error violation
    even though it too passes enum-string validation — exercised
    contrapositively in the accompanying test.
  test_type: deterministic
