options:
  - id: OPT-A
    label: Generic web search
    description: Use one broad web-search workflow for all source verification tasks.
    status: rejected
    rejection_reason: The owner explicitly said research must be more accurate than generic web search.
  - id: OPT-B
    label: Canonical specialized source categories
    description: Route verification through general_web, scholarly_database, manuscript_catalog, islamic_reference, and library_catalog categories, while leaving the concrete site inventory to OQ-SRC-0007.
    status: chosen
    chosen_reason: This gives REQ-SRC-0013 a stable source-type taxonomy without overcommitting the exact inventory list.
