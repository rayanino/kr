id: DEC-SRC-0011
type: decision
status: proposed
title: Agent self-resolution replaces human_gate
topic: consensus
priority: high
confidence: high
provenance: owner_interview
source: Resolves OQ-SRC-0004; derived from OF-SRC-0011 and REQ-SRC-0009
created: "2026-04-14"
updated: "2026-04-14"
depends_on:
  - OF-SRC-0011
  - REQ-SRC-0009
  - REQ-SRC-0012
impacts:
  - disagreement_resolution
  - escalation_design
options:
  - id: OPT-A
    label: Dedicated agent-gate module
    description: Build a new module that formalizes autonomous disagreement resolution as a distinct component.
    status: rejected
    rejection_reason: The resolution logic is already specified in REQ-SRC-0009 (agent self-resolution with failure analysis and max_resolution_rounds=3). A separate module would duplicate this. The disagreement pipeline IS the gate replacement.
  - id: OPT-B
    label: REQ-SRC-0009 pipeline with multi-position fallback
    description: The existing agent self-resolution pipeline (REQ-SRC-0009) handles disagreements. After max rounds, unresolved cases default to genuine_scholarly_dispute and emit multi-position output per REQ-SRC-0012. No separate gate module needed.
    status: chosen
    chosen_reason: Owner said agents resolve everything. REQ-SRC-0009 already specifies the resolution flow, terminal states, failure analysis, and fallback. Adding a separate module creates unnecessary indirection.
  - id: OPT-C
    label: Supervisor agent veto
    description: Give a supervisor agent final authority over disputes.
    status: rejected
    rejection_reason: A single supervisor is a single point of failure and contradicts the multi-agent consensus principle.
rationale: >
  The owner explicitly said to throw away human gate checkpoints. REQ-SRC-0009
  already provides the complete replacement: agents resolve disagreements with
  structured failure analysis, max 3 rounds, and multi-position fallback for
  genuine scholarly disputes. No additional module is needed at the spec level.
