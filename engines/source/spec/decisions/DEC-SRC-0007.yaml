id: DEC-SRC-0007
type: decision
status: proposed
title: Disputed metadata as multi-position evidence
topic: metadata
priority: high
confidence: high
provenance: owner_interview
source: Derived from OF-SRC-0013; amended per contract-architect-review.yaml
created: "2026-04-14"
updated: "2026-04-14"
depends_on:
  - OF-SRC-0013
impacts:
  - disputed_metadata
  - evidence_preservation
rationale: Multi-position storage is resolved here. OQ-SRC-0006 now covers only ordering, weighting, and primary-display semantics inside that already-chosen structure.
options:
  - id: OPT-A
    label: Force single value
    description: Resolve disputed fields to one final canonical metadata value.
    status: rejected
    rejection_reason: The owner said real disagreement must remain visible rather than be flattened into fake certainty.
  - id: OPT-B
    label: Record all positions in a positions array
    description: Preserve every supported position in a structured positions array together with evidence, confidence, and source agents.
    status: chosen
    chosen_reason: This keeps disputed metadata truthful and gives REQ-SRC-0012 a stable contract to implement.
