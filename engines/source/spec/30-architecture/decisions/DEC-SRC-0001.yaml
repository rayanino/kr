id: DEC-SRC-0001
type: decision
status: proposed
title: Owner hints are cross-validation, not primary data
topic: acquisition
layer: architecture
priority: critical
confidence: high
provenance: owner_interview
source: Derived from OF-SRC-0002
created: '2026-04-14'
updated: '2026-04-14'
depends_on:
- OF-SRC-0002
impacts:
- hint_handling
- inference_order
options:
- id: OPT-A
  label: Hints as authoritative input
  description: Owner hints participate directly in the primary inference path.
  status: rejected
  rejection_reason: The owner explicitly said hints must never bias agent inference.
- id: OPT-B
  label: Hints as cross-validation signals
  description: Owner hints are compared only after agent inference completes.
  status: chosen
  chosen_reason: This matches the owner's drop-and-go workflow and preserves inference independence.
