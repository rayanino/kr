id: DEC-SRC-0012
type: decision
status: confirmed
title: Multi-position metadata ordered by confidence
topic: metadata
layer: architecture
priority: high
confidence: high
provenance: domain_inference
source: Resolves OQ-SRC-0006; builds on DEC-SRC-0007 and REQ-SRC-0012
created: '2026-04-14'
updated: '2026-04-14'
depends_on:
- DEC-SRC-0007
- REQ-SRC-0012
impacts:
- disputed_metadata
- contract_shape
- downstream_display
rationale: 'Multi-position storage is already decided (DEC-SRC-0007, REQ-SRC-0012). The remaining question was ordering and display. Confidence-descending is the simplest rule that gives every downstream consumer a sensible default while preserving all positions for truth-seeking.

  '
options:
- id: OPT-A
  label: Preserve input order
  description: Keep positions in agent-production order with no primary marker.
  status: rejected
  rejection_reason: Downstream consumers need a default display value without parsing the full array. Input order is arbitrary and carries no semantic signal.
- id: OPT-B
  label: Sort by confidence descending with primary marker
  description: Order disputed_field.positions by descending confidence. positions[0] is the primary display position. All positions are preserved for scholarly accuracy.
  status: chosen
  chosen_reason: Confidence ordering gives downstream engines a natural default (positions[0]) while preserving all scholarly positions. The owner's principle is truth-seeking — all positions stay, but the most-evidenced one is first.
- id: OPT-C
  label: Weighted display without reordering
  description: Preserve order but add explicit weights and primary markers.
  status: rejected
  rejection_reason: Adds complexity (weight AND confidence AND primary marker) without benefit over simple confidence ordering.
