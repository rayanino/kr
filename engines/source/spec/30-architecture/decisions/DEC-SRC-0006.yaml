id: DEC-SRC-0006
type: decision
status: confirmed
title: Agents resolve disagreements autonomously
topic: consensus
layer: architecture
priority: critical
confidence: high
provenance: owner_interview
source: Derived from OF-SRC-0011
created: '2026-04-14'
updated: '2026-04-14'
depends_on:
- OF-SRC-0011
- OQ-SRC-0004
impacts:
- disagreement_resolution
- failure_analysis
options:
- id: OPT-A
  label: Human gate checkpoints
  description: Route metadata disagreements to the owner or another human gate for resolution.
  status: rejected
  rejection_reason: The owner explicitly rejected human checkpoints and said the agents should resolve what they can better than he can.
- id: OPT-B
  label: Agent self-resolution with failure analysis
  description: Keep disagreement resolution inside the agent system and require post-mortem analysis from the losing agent.
  status: chosen
  chosen_reason: This matches the owner's desire for autonomous resolution plus system learning.
