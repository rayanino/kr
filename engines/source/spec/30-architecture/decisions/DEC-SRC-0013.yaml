id: DEC-SRC-0013
type: decision
status: confirmed
title: Deliberation cell architecture with deterministic orchestrator
topic: agent_ergonomics
layer: architecture
priority: critical
confidence: high
provenance: deep_research
source: >-
  ChatGPT DR report on agent-team architecture (2026-04-14).
  Resolves OQ-SRC-0003. The DR evaluated fixed roles, dynamic
  composition, and hierarchical escalation, recommending
  dynamic composition with fixed minimums under a
  deterministic orchestrator. Phase 5 amendment 2026-04-30
  (scholar-matching DR synthesis §5.4): add scholar_match_cell
  as a NAMED deliberation-cell pattern. Stage-1 (deterministic
  narrowing per REQ-SRC-0051) is the orchestrator role;
  Stage-2 (≥2 verifier consensus per REQ-SRC-0052) is the
  verifier-cell role. Round-cap and disagreement protocol
  per REQ-SRC-0008 Phase 5 amendment + REQ-SRC-0053. Cross-
  references: CON-SRC-0008 (output contract), CON-SRC-0009
  (evidence packet contract), REQ-SRC-0049 (snapshot
  locking), INV-SRC-0013 (≥2-non-name floor), INV-SRC-0014
  (matching-key honorific exclusion), INV-SRC-0015
  (provenance completeness), INV-SRC-0016 (chosen_id
  closure), INV-SRC-0017 (snapshot version pin). The
  scholar_match_cell is the second NAMED instance of the
  generic deliberation-cell pattern (the first is the
  trust evaluation cell from REQ-SRC-0008).
