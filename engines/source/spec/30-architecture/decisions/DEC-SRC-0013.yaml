options:
- id: OPT-A
  label: LLM supervisor agent
  description: A single LLM agent acts as supervisor, deciding which agents to invoke and when to stop.
  status: rejected
  rejection_reason: Single point of failure. The supervisor's content judgments would override the independence of verification agents. The spec explicitly rejects supervisor-veto architecture.
- id: OPT-B
  label: Deterministic orchestrator with deliberation cells
  description: >-
    A non-LLM workflow executor orchestrates deliberation
    cells. Each cell handles one metadata field or trust
    evaluation. The orchestrator enforces spec rules (agent
    counts, round limits, evidence shapes) but makes no
    content decisions. Agent team composition is dynamic
    based on case complexity, with fixed minimums (2
    independent verification reasoners for high-impact
    fields). Phase 5 amendment 2026-04-30: NAMED cell
    patterns include (a) trust_evaluation_cell (REQ-SRC-0008
    — generic trust shape) and (b) scholar_match_cell
    (REQ-SRC-0049 through REQ-SRC-0053 — specialized for
    scholar identity disambiguation under OPT-4 architecture
    from Phase 5 cross-provider DR synthesis). Each named
    cell pattern inherits the deterministic-orchestrator
    structure but specializes round protocols, threshold
    shapes, and closure invariants for its domain.
  status: chosen
  chosen_reason: >-
    Smallest system that enforces independence, produces
    evidence-traceable outputs, guarantees bounded
    disagreement loops, supports fast-track without
    bypassing logging, and produces always-valid output
    shapes. Deterministic orchestration avoids the LLM
    supervisor single-point-of-failure problem while
    maintaining the agent team's deliberative power. Phase
    5 amendment 2026-04-30: the cell pattern is now
    explicitly EXTENSIBLE — scholar_match_cell is the
    second named instance, demonstrating that the pattern
    accommodates domain specialization (compound 4-condition
    threshold per REQ-SRC-0053; hybrid round-0 / round-1
    protocol per REQ-SRC-0052; F-4 hallucination closure
    per INV-SRC-0016) without architectural changes to
    DEC-SRC-0013's orchestrator core.
- id: OPT-C
  label: Fully dynamic agent composition
  description: No fixed roles at all. Agents are assembled ad hoc per case.
  status: rejected
  rejection_reason: Without fixed minimums, high-impact fields could be decided by a single agent. The spec requires minimum 2 independent verifiers for author attribution and trust evaluation.
