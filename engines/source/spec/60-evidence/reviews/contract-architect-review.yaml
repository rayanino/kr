scope:
  reviewed_atoms: 37
  skipped_atoms:
    - "owner-feedback/* (16 interview atoms skipped per request)"
reviews:
  - atom_id: REQ-SRC-0001
    verdict: AMEND
    confidence: high
    detail: "The file-path trigger is concrete enough, but the postconditions are descriptive rather than assertive and the error surface omits nonexistent-path, unreadable-path, directory, empty-file, and duplicate-intake cases."
    amendment: "Replace the prose postconditions with exact output assertions for the intake artifact (for example `source_metadata.source_sha256`, `frozen_blob_path`, and `handoff_registration_id`) and enumerate missing-path, unreadable-file, directory, empty-file, and duplicate-digest failure codes."
    test_generatable: false
  - atom_id: REQ-SRC-0002
    verdict: AMEND
    confidence: high
    detail: "The atom states the hint policy clearly, but it never defines the hint payload, the exact confidence field that changes, or the shape of the investigation record opened on mismatch."
    amendment: "Define the accepted hint fields, require that hinted values are stored separately from inferred values, name the confidence field(s) that may change, and specify the exact audit/investigation record written on contradiction."
    test_generatable: false
  - atom_id: REQ-SRC-0003
    verdict: AMEND
    confidence: medium
    detail: "Terms such as 'clear metadata cases aggressively' and 'genuinely unresolvable' are not operationalized, so a build agent cannot know which cases must auto-resolve versus reach the owner."
    amendment: "Define explicit owner-routing criteria, a bounded unresolved-case taxonomy, and the exact owner-escalation artifact so the review-load target can be tested without interpretation."
    test_generatable: false
  - atom_id: REQ-SRC-0004
    verdict: FLAG
    confidence: high
    detail: "This requirement depends on two 'independent' attribution agents but never defines independence, the author-output schema, or the insufficient-evidence path, so the core attribution contract is still prose-shaped."
    test_generatable: false
  - atom_id: REQ-SRC-0005
    verdict: AMEND
    confidence: high
    detail: "This is structurally parallel to REQ-SRC-0002 and has the same gaps: no exact science-hint payload, no named confidence field, and no defined investigation artifact."
    amendment: "Mirror REQ-SRC-0002 with a concrete science-hint schema, exact preserved fields, explicit confidence-write behavior, and a structured contradiction record."
    test_generatable: false
  - atom_id: REQ-SRC-0006
    verdict: FLAG
    confidence: high
    detail: "The normal 'new science discovered' branch is modeled as an error condition, and the atom never says what metadata is emitted when the owner declines or defers expansion even though intake must continue."
    test_generatable: false
  - atom_id: REQ-SRC-0007
    verdict: AMEND
    confidence: medium
    detail: "The atom usefully prevents silent invention of a level detector, but it mixes runtime handoff behavior with spec-governance behavior and still depends on an unresolved architecture question."
    amendment: "Split this into a concrete handoff-preservation contract for the `level` field and a separate readiness/blocker rule tied to OQ-SRC-0001 or DEC-SRC-0003."
    test_generatable: false
  - atom_id: REQ-SRC-0008
    verdict: FLAG
    confidence: high
    detail: "The atom requires an agent-team trust workflow, but the minimum roles, trust-decision output shape, and monitor-feedback schema are all undefined while the team architecture is still open in OQ-SRC-0003."
    test_generatable: false
  - atom_id: REQ-SRC-0009
    verdict: FLAG
    confidence: high
    detail: "The requirement assumes a formal disagreement module exists, but OQ-SRC-0004 leaves that module unresolved and the atom does not define terminal states for 'resolved error' versus 'real scholarly dispute'."
    test_generatable: false
  - atom_id: REQ-SRC-0010
    verdict: FLAG
    confidence: high
    detail: "The contract references 'graduated levels' and uses `barely_known` in an acceptance criterion, but the standing enum, evidence thresholds, and stored fields are never defined."
    test_generatable: false
  - atom_id: REQ-SRC-0011
    verdict: FLAG
    confidence: high
    detail: "The atom requires fine-grained hadith sub-genres without defining a controlled vocabulary, so an implementation could satisfy it with arbitrary labels that remain structurally unreviewable."
    test_generatable: true
  - atom_id: REQ-SRC-0012
    verdict: AMEND
    confidence: high
    detail: "The multi-position principle is sound, but the position-object schema and field-level rules are incomplete, and the atom partially pre-answers OQ-SRC-0006 while still depending on it."
    amendment: "Resolve or narrow OQ-SRC-0006, then define the exact position-object fields, cardinality rules, evidence shape, and confidence semantics for disputed metadata fields."
    test_generatable: true
  - atom_id: REQ-SRC-0013
    verdict: AMEND
    confidence: high
    detail: "The atom chooses specialized research dispatch, but 'high-impact' is undefined, source-type taxonomy is implicit, and completion output is not named even though the acceptance criterion depends on it."
    amendment: "Define a `research_task` contract with enumerated `source_type` values, a rule for what counts as high-impact verification, and an explicit verification log proving that two distinct source types were used."
    test_generatable: true

  - atom_id: INV-SRC-0001
    verdict: AMEND
    confidence: high
    detail: "The invariant intent is clear, but 'base inference output' is too broad because the atom never states which fields are compared before versus after cross-validation side effects."
    amendment: "Define the comparison surface as the core inferred metadata fields only, and require an audit marker showing that hint comparison happened strictly after base inference completion."
    test_generatable: true
  - atom_id: INV-SRC-0002
    verdict: FLAG
    confidence: high
    detail: "This is a priority statement rather than a programmatically checkable invariant: AC-1 measures attribution accuracy, but it does not verify that attribution outranks other trade-offs in design or execution."
    test_generatable: true
  - atom_id: INV-SRC-0003
    verdict: CONFIRM
    confidence: high
    detail: "The rejection guard is precise, the implication states the exact fallback behavior, and the acceptance criterion directly checks that unknown sciences do not block intake."
    test_generatable: true
  - atom_id: INV-SRC-0004
    verdict: AMEND
    confidence: medium
    detail: "The invariant captures the right principle, but 'when the real answer is that scholars disagree' still needs a concrete evidentiary threshold before an implementation can know when multi-position output is mandatory."
    amendment: "Define the minimum dispute-qualification rule, such as two evidence-backed positions from independent verification, and bind the invariant to the exact multi-position schema from REQ-SRC-0012."
    test_generatable: true
  - atom_id: INV-SRC-0005
    verdict: CONFIRM
    confidence: high
    detail: "The statement is precise, the implication is actionable, and the acceptance criterion directly verifies that unknown muhaqiq standing does not gate intake."
    test_generatable: true

  - atom_id: DEC-SRC-0001
