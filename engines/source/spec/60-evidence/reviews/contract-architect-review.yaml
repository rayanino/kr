    confidence: medium
    detail: "The direction away from numeric trust scoring is clear, but the chosen option still leaves the minimum team composition and resolution protocol too implicit for REQ-SRC-0008."
    amendment: "Record the minimum required roles or explicitly narrow the remaining unknowns to OQ-SRC-0003 so the trust requirement has a stable architectural base."
    test_generatable: false
  - atom_id: DEC-SRC-0005
