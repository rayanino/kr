    amendment: "Replace 'proportional' with a measurable benchmark-weight rule, such as a minimum hadith-case share or explicit weight floor tied to the 48.7 percent figure."
    test_generatable: false
  - atom_id: CON-SRC-0003
    verdict: CONFIRM
