summary:
  "INPUTS NOT COVERED":
    - "Duplicate-intake scenarios where the same frozen digest or source identity is submitted more than once."
    - "Sources with commentary or multi-layer structure; OQ-SRC-0002 exists, but no requirement currently handles that input path."
    - "Author-attribution cases with insufficient evidence, anonymous works, or irreducible ambiguity despite having two agents available."
    - "Owner-declined or owner-deferred science-registry expansion after a new science is inferred."
    - "Unreadable, missing, directory, or empty-path intake requests are implied but not fully contracted."
  "OUTPUTS NOT PRODUCED":
    - "A concrete `SourceMetadata` field schema for intake output."
    - "A named frozen-artifact contract beyond 'bytes are frozen with a SHA-256 digest'."
    - "A concrete handoff-registration payload for downstream normalization."
    - "A concrete trust-decision schema and monitor-feedback schema."
    - "A concrete disagreement-module output for autonomous resolution versus genuine scholarly dispute."
    - "A concrete registry-expansion request/result payload for new sciences."
  "ERROR PATHS NOT SPECIFIED":
    - "Nonexistent or unreadable file paths during intake."
    - "Duplicate source submission or repeated frozen digest."
    - "Insufficient author evidence even when the required number of agents is available."
    - "Registry-expansion decline, timeout, or write failure for new sciences."
    - "Research-source unavailability or partial-source failure inside REQ-SRC-0013."
    - "Trust-workflow disagreement when agent roles exist but cannot converge."
  "DEPENDENCY GAPS":
    - "No broken `depends_on` references and no circular dependencies were found."
    - "REQ-SRC-0007 and DEC-SRC-0003 depend on unresolved OQ-SRC-0001 but still describe partial runtime behavior."
    - "REQ-SRC-0008 depends on OQ-SRC-0003 while also requiring monitor feedback without depending on OQ-SRC-0005."
    - "REQ-SRC-0009 depends on OQ-SRC-0004, but the escalation target it needs is still unspecified."
    - "REQ-SRC-0013 depends on OQ-SRC-0007, and DEC-SRC-0009 does not yet fix the source-type taxonomy that requirement needs."
    - "OQ-SRC-0002 exposes a real multi-layer boundary gap, but no current requirement or decision consumes it."
  "CONTRADICTIONS":
    - "REQ-SRC-0012 and DEC-SRC-0007 already commit the contract to multi-position storage, while OQ-SRC-0006 still frames representation choice as open."
  "TESTABILITY": "15 of 31 acceptance criteria are directly testable."
