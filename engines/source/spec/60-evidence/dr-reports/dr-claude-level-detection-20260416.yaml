    paragraphs:
      - id: p4_classical_ladder_matn_sharh_hashiya
        claim: >-
          Classical Islamic book culture organized texts into 4-stage ladder:
          matn → sharḥ → ḥāshiya → taqrīr (with takmila for continuations).
          Corresponds roughly to beginner → intermediate → advanced →
          expert-critical. Matn = memorizable primer ("general understanding
          of the topic", Daily Sabah synthesis of UC Berkeley Hashiya and
          Islamic Intellectual History conference 2012). Sharḥ has 3 subtypes:
          phrase-clarification, conceptual exposition, advanced argumentation
          (Harun Saleh, malikifiqhqa.com). Ḥāshiya characteristically critiques
          the sharḥ (Maverd, 2015). Working ladders: Shāfiʿī Safīnat al-Najāh
          → Matn Abī Shujāʿ (Ibn Qāsim sharḥ, Bājūrī ḥāshiya) → Minhāj al-
          Ṭālibīn → Tuḥfat al-Muḥtāj. Hanafī Tumurtāshī Tanwīr al-Abṣār →
          Ḥaṣkafī al-Durr al-Mukhtār → Ibn ʿĀbidīn Radd al-Muḥtār
          (SeekersGuidance 2024-2025). Depth in stack correlates with difficulty.
          Tradition exposes this via TEXTUAL BEHAVIOR (isnād density,
          technical-term density, cross-reference assumptions, absence of
          glosses, debate-and-evidence argumentation), NOT titles.
        implementation_target:
          kind: cross_engine_commitment
          engine: taxonomy  # DIVERGES from ChatGPT's synthesis assignment
          note: >-
            Strong convergence with ChatGPT DR p1_relational_difficulty and
            p21_science_layer_refinement. Claude DR adds explicit curricular
            ladders per madhhab — useful calibration reference for taxonomy.
            DIVERGES on which engine owns the classification.
        divergence_flag: true
        convergence_partner: p1_relational_difficulty  # ChatGPT DR

      - id: p5_mukhtasar_khalil_paradox
        claim: >-
          Title tokens LEAST reliable. Canonical counter-example:
          Mukhtaṣar Khalīl ibn Isḥāq al-Jundī (d. 776/1374) — name promises
          brevity but every Mālikī curriculum guide warns "pregnant in meaning
          and difficult in expression... invariably studied with commentary"
          (islamclass.wordpress.com, 2014 Mālikī curriculum). Al-Ḥaṭṭāb
          (d. 954 AH) and al-Dardīr (d. 1201 AH) treat as school's MOST
          AUTHORITATIVE text, approached only after al-ʿAshmāwiyya, al-Risāla
          Ibn Abī Zayd, al-Murshid al-Muʿīn. Parallel failures:
          Mukhtaṣar al-Qudūrī (intro Hanafī) vs Mukhtaṣar al-Muzanī (advanced
          Shāfiʿī); al-ʿUmda Ibn Qudāma (intro Hanbalī) but al-Muqniʿ ascends,
          al-Mughnī is specialist-level. Al-Minhāj al-Nawawī carries humble
          "path" token but sits intermediate-advanced. Title tokens produce
          SYSTEMATIC false readings Islamic students know about and that
          OPT-A would encode as metadata. Ibn Khaldūn Muqaddima Book VI
          (Rosenthal 1958) + al-Zarnūjī Taʿlīm al-Mutaʿallim: appropriate
          level is function of student readiness + book's internal density,
          NOT title. Dajani, Procedia Social and Behavioral Sciences 192,
          2015, 308-312.
        implementation_target:
          kind: conditional_on_opt_c
          atom_id_target: INV-SRC-0011  # reversal-amendment if OPT-C wins
          note: >-
            Strongly convergent with ChatGPT DR p17_tradition_argument and
