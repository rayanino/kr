          Match tokens against lexical inventory of al-Jurjānī's
          al-Taʿrīfāt (d. 816 AH), al-Tahānawī's Kashshāf Iṣṭilāḥāt al-Funūn
          (18th c.), Mawsūʿa Fiqhiyya Kuwaytiyya. Work using fann terminology
          without gloss = advanced. Work defining wuḍūʾ and ṭahāra = beginner.
        reliability: medium_high
        stage: atomization (taxonomy refines against fann)
        tool: dictionary lookup + CAMeL Tools lemmatizer (Obeid et al., LREC 2020)
        classical_ranking: 3

      - id: f4_muqaddima_audience_markers
        name: Muqaddima audience markers (قرائن الجمهور في المقدمة)
        mechanism: >-
          Regex + small classifier over first ~200 tokens after hamdala.
          Explicit phrases: هذا مختصر للمبتدئين / رتبته للمتوسطين /
          جمعته للمحققين / لا يخفى على المنتهي. AGENTS.md rule already
          codified: everything before أما بعد is formulaic preamble;
          everything after until first chapter heading is the author's
          muqaddimah.
        reliability: high_when_present_sparse_overall
        stage: passaging (structural tree marks muqaddimah boundary)
        tool: regex + CAMeLBERT-CA classifier (Inoue/Alhafni/Baimukan/Bouamor/Habash WANLP 2021)
        classical_ranking: 4

      - id: f5_vocabulary_rarity_classical_baseline
        name: Vocabulary rarity against OpenITI/CAMeLBERT-CA classical frequency baseline
        mechanism: >-
          Tokens below median frequency rank in CAMeL Arabic Frequency Lists
          Classical-Arabic split (Khalifa/Inoue/Alhafni/Baimukan/Bouamor/
          Habash 2021; ~17.3B-token pretraining baseline, CA subset).
          RIGHT baseline for turāth (not modern-news-derived).
        reliability: medium_high
        stage: taxonomy (whole-book token distribution)
        tool: CAMeL frequency lists
        classical_ranking: 5

      - id: f6_citation_explanation_mode
        name: Explanation-mode of Qurʾān/ḥadīth citations
        mechanism: >-
          For every Qurʾānic verse detected (exact match against mushaf
          corpus) or ḥadīth detected (passim alignment against Ṣiḥāḥ
          al-Sitta + Muwaṭṭaʾ, KITAB methodology), classify whether
          following 1-3 sentences constitute explanation (lexical gloss,
          asbāb al-nuzūl, legal extraction) or bare citation. Work citing
          without explanation assumes reader met citation before → advanced.
        reliability: medium
        stage: excerpting
        tool: regex + classifier
        classical_ranking: 6

      - id: f7_cross_reference_density
        name: Cross-reference density (كثافة الإحالات)
        mechanism: >-
          Occurrences of أحلت تفصيله على... / سبق لنا في كتاب... /
          كما فصّلناه في... / انظر / راجع. High density presumes reader
          familiar with author's corpus or school's standard references →
          advanced.
        reliability: medium
        stage: passaging (preserves cross-reference formulas per AGENTS.md)
        tool: regex
        classical_ranking: 7

      - id: f8_evidential_verb_density
        name: Evidential verb density (قال، روى، أخبرنا، حدثنا، نقل، ذكر)
        mechanism: >-
          Trivial regex, already used in KITAB's isnād detection.
          Correlates with ḥadīth/tarājim genres rather than with
          beginner-advanced axis per se. Useful as discipline prior.
        reliability: medium_as_genre_low_as_level_alone
        stage: atomization
        tool: regex
        classical_ranking: 8

      - id: f9_footnote_gloss_density_by_edition
        name: Footnote/gloss density as preserved by the edition
        mechanism: >-
          If editor added hāmish with lexical explanations, edition pitched
          lower level than same text printed bare. Feature describes the
          EDITION's target audience, not the work's.
        reliability: medium
        stage: source (visible in container shape)
        tool: structural tagging
        note: >-
          Per AGENTS.md these must be tagged layer_type: editorial and
          attributed to the muḥaqqiq not the author.
        classical_ranking: 9

      - id: f10_sentence_morphological_complexity_osman
        name: Sentence and morphological complexity, OSMAN-style
        mechanism: >-
          OSMAN (El-Haj & Rayson, LREC 2016) and successors are diacritization-
          and syllable-sensitive. Marginal signal but validated on UN-parallel
          MSA not turāth; drop low.
        reliability: low_on_classical_text
        stage: normalization
        tool: OSMAN jar + CAMeL Tools morphological analyzer
        note: Research-only for this corpus.
        classical_ranking: 10

      - id: f11_title_tokens_publisher_series
        name: Title tokens (مختصر، كبير، سلم، نخبة، عمدة، منهاج) + publisher series metadata
        mechanism: >-
          THIS IS THE SOURCE-ENGINE HYPOTHESIS. Tradition warns these mislead
          (Mukhtaṣar Khalīl, al-Mughnī, etc.).
        reliability: low
        stage: source (metadata_deliberation)
        source_engine_role: >-
          CLAUDE DR POSITION: emit as level_candidate with confidence=low,
          NEVER as authoritative. CHATGPT DR POSITION (committed): preserve
          these signals as features but NEVER drive level inference from them.
        tool: token list + publisher lookup
        classical_ranking: 11
        divergence_flag: true
        convergence_partner: f11_title_card_cues  # ChatGPT DR

      - id: f12_barec_caveat
        name: BAREC — strongest Arabic readability corpus, but domain-gap caveat
        claim: >-
          BAREC (Elmadani/Habash/Taha-Thomure, Findings of ACL 2025;
          barec.camel-lab.com) — 69,441 sentences across 19 levels, 81.8%
          quadratic-weighted κ inter-annotator agreement — is the STRONGEST
          Arabic readability resource in existence but was built chiefly
          from curricular, news, and literary materials, NOT classical
          turāth. It is a feature engine, not an out-of-the-box label
          source: use its sentence-level scores as one input among the 11
          features above, but never as the level itself. Gap between BAREC's
          training distribution and the classical-Islamic-scholarship
          distribution is the single biggest caveat any future KR-specific
          level classifier must address. Realistic path: fine-tune
          CAMeLBERT-CA (classical-Arabic variant in CAMeLBERT family) on
          a KR-specific labeled subset.
        implementation_target:
          kind: cross_engine_commitment
          engine: taxonomy (classifier training path)
          note: >-
            Convergent with ChatGPT DR p13_tooling_maturity and p14_transfer_problem
            (OSMAN/AARI demoted to weak-signal). Claude DR names BAREC
            specifically and gives the CAMeLBERT-CA fine-tuning path.

  - id: s7_correction_mechanism
    paragraph_count: 4

    paragraphs:
      - id: p12_append_only_level_assessments
        claim: >-
          Correction is a first-class pipeline event, not a mutation. Level
          record = append-only list of assessments. Example entry: {stage,
          value, confidence, provenance, models, timestamp,
          reconciliation (optional)}. Displayed level = projection from list
          (most recent high-confidence wins; ties surface as `disputed`),
          not a mutable field. Keeps D-023 literal (no upstream value
          deleted/overwritten; every stage adds its view). Keeps
          frozen-source rule literal (none of this touches primary text).
        implementation_target:
          kind: cross_engine_commitment
          engine: multiple (source + taxonomy + display)
          note: >-
            STRONG convergence with ChatGPT DR p22_append_only_history.
            Both DRs propose the same data-model pattern. Minor schema
            differences: ChatGPT DR's LevelAssessment has engine_owner +
            model_ensemble_ids + feature_snapshot_id; Claude DR's entry has
            stage + provenance + models + reconciliation. Substantively
            identical intent.
        divergence_flag: false
        convergence_partner: p22_append_only_history  # ChatGPT DR

      - id: p13_four_correction_triggers
        claim: >-
          Triggers for new assessment: (a) downstream disagreement —
          taxonomy features contradict source candidate by >1 level on
          3-level scale → reconciliation automatic, new entry appended;
          (b) owner flag — library UI exposes one-click "this feels wrong"
          → creates stage: owner.flag entry with owner's note → triggers
          owner-validates gate (CLAUDE.md principle 1) + re-inference
          subagent dispatch; (c) re-ingestion — new edition of same work
          (new EditionHolding per CON-SRC-0004) → level re-inferred for
          that edition specifically; work-level level updated if and only
          if editions agree; (d) model-version bump — when taxonomy
          classifier retrained, existing books re-scored as batch, every
          change flipping displayed level appends new assessment entry.
        implementation_target:
          kind: cross_engine_commitment
          engine: taxonomy + human_gate + UI
          note: >-
            Convergent with ChatGPT DR p23_four_detection_channels. Both
            DRs propose 4 triggers. Claude DR's (c) re-ingestion trigger
            makes the edition-specific re-inference more explicit than
            ChatGPT DR's "structural conflict" channel. Both intentionally
            preserve immutability.
        divergence_flag: false
        convergence_partner: p23_four_detection_channels  # ChatGPT DR

      - id: p14_no_upstream_rerun_on_correction
        claim: >-
          Re-processing on correction NOT mandatory. Level field is metadata;
          downstream artifacts (passages, atoms, excerpts, taxonomy
          placements) indexed against work ID, not level. Level change
          invalidates caches that depend on level (e.g., level-filtered
          search indexes) but does NOT force passaging or atomization to
          re-run. Taxonomy placements that were DERIVED from a level (rare —
          placements should be derived from fann/madhhab/author, not
          difficulty) are marked dirty and re-computed.
          scripts/verify_metadata_flow.py already enforces D-023 pass-through
          checks across such boundaries.
        implementation_target:
          kind: cross_engine_commitment
          engine: taxonomy
          note: >-
            Convergent with ChatGPT DR p24_no_upstream_rerun. Both DRs
            insist correction is O(level classifier) not O(pipeline).
        divergence_flag: false
        convergence_partner: p24_no_upstream_rerun  # ChatGPT DR

      - id: p15_owner_ux_provenance_pill
        claim: >-
          UI renders current consensus value with small provenance pill:
          "advanced — taxonomy, high confidence, disagrees with source hint."
          Clicking pill expands full assessment history. Silent rewrites
          structurally impossible (list is append-only). Two stages disagree
          at equal confidence → field shown as `disputed` (matches
          Truth-seeking-not-consensus-forcing principle). One-click flag
          opens human-gate flow (critical rule 5) WITHOUT ever asking owner
          to name DEC or OPT atom (AGENTS.md communication rule).
        implementation_target:
          kind: cross_engine_commitment
          engine: UI + human_gate
          note: >-
            Convergent with ChatGPT DR p25_owner_ux_by_certainty. Claude DR
            adds the explicit provenance-pill UI pattern. Claude DR also
            explicitly names the disagreement display (which ChatGPT DR's
            UI commitment s implies but doesn't spell out).
        divergence_flag: false
        convergence_partner: p25_owner_ux_by_certainty  # ChatGPT DR

  - id: s8_risks
    paragraph_count: 9

    risks:
      - id: r1_multi_layer_works
        claim: >-
          A printing of Sharḥ al-ʿAqāʾid al-Nasafiyya with al-Taftāzānī's
          commentary and al-Khayālī's ḥāshiya on same page is three works
          at three levels co-bound. Single level label on container = category
          error. Level field emitted per CONSTITUENT WORK inside container
          using source engine container classification (REQ-SRC-0017/0020/0041)
          to enumerate constituents; taxonomy engine levels each
          independently. Container itself carries `level: composite` rather
          than averaged value.
        implementation_target:
          kind: cross_engine_commitment
          engine: source (constituent enumeration) + taxonomy (per-constituent)
          source_engine_role: >-
            is_multi_layer already mandatory in CON-SRC-0004. composite_work_type
            + sub_work_inventory fields needed for per-constituent enumeration
            (already flagged as metadata-plumbing gap by Gemini Run B).
          note: >-
            Convergent with ChatGPT DR r1_multi_layer_works. Both DRs propose
            per-constituent level. Claude DR names the canonical Nasafiyya +
            Taftāzānī + Khayālī printing as the paradigmatic example.

      - id: r2_mukhtasar_paradox_test_fixture
        claim: >-
          Mukhtaṣar Khalīl, Mukhtaṣar al-Muzanī, Mukhtaṣar al-Ṭaḥāwī and
          similar expose systematic failure of title-token inference.
          Architecture tolerates by flagging source: title_tokens with
          confidence: low and letting content-based features correct it.
          Recommended test fixture: Mukhtaṣar Khalīl — if pipeline emits
          `beginner` at source, flags `low confidence`, and taxonomy overrides
          to `advanced` with high confidence citing term-density and
          cross-reference-to-Mudawwana features, architecture is working as
          designed.
        implementation_target:
          kind: conditional_on_opt_c + cross_engine_commitment
          engine: source + taxonomy (reconciliation flow)
          note: >-
            Convergent with ChatGPT DR r2_abridgement_title_trap on the
            evidence, divergent on the prescription. ChatGPT DR cites r2 as
            reason to reject OPT-A entirely. Claude DR cites r2 as the
            paradigmatic reconciliation scenario — exactly why confidence
            markers + downstream correction are needed. Same evidence,
            opposite prescription.

      - id: r3_abridgements_pitched_down
        claim: >-
          Inverse problem: al-Taqrīrāt al-Sadīda of al-Kāf (modern beginner-
          facing work whose title reads advanced); Fatḥ al-Qarīb al-Mujīb
          (introductory sharḥ whose title carries "fatḥ", an advanced-sounding
          token). Same correction mechanism applies in opposite direction.
          Title tokens must NEVER commit high confidence.
        implementation_target:
          kind: conditional_on_opt_c
          note: >-
            Extends the mukhtaṣar-paradox argument to the symmetric case.
            No direct ChatGPT DR paragraph addresses this inverse failure
            mode — Claude DR surfaces a new risk dimension. Flag for
            adjudicator consideration.

      - id: r4_series_vs_volume_mismatch
        claim: >-
          Multi-volume Mawsūʿa Fiqhiyya not uniformly one level — early
          volumes on ʿibādāt often more introductory than later volumes on
          qaḍāʾ. Level field emitted at EditionHolding/VolumeHolding
          granularity (DEC-SRC-0018, REQ-SRC-0044) rather than at
          EditionGroup level. Library view aggregates per user query.
        implementation_target:
          kind: cross_engine_commitment
          engine: source + taxonomy
          source_engine_role: >-
            Granularity commitment is source-engine responsibility: holding_id
            and volume_count already preserved; per-volume level emission
            requires taxonomy to respect volume boundary in output.
          note: >-
            Convergent with ChatGPT DR r3_series_volume_mismatch. Same prescription:
            granularity = volume, not series.

      - id: r5_edition_level_divergence
        claim: >-
          Same Arabic text (e.g., Matn Abī Shujāʿ) published bare, with
          Ibn Qāsim's sharḥ, with Bājūrī's ḥāshiya, or as a ḥarakāt-full
          teaching edition. Each edition has a DIFFERENT effective level
          because level is a property of the READING EXPERIENCE, not of
          the abstract work. Work record holds work-level level derived
          from bare-text features; each edition appends edition-specific
          assessment that can differ. Users search editions; discovery
          respects both.
        implementation_target:
          kind: cross_engine_commitment
          engine: source (edition distinction) + taxonomy (per-edition level)
          note: >-
            Convergent with ChatGPT DR r4_edition_divergence. Claude DR adds
            the specific example (Matn Abī Shujāʿ across its editions) and
            the "reading experience" framing. Both propose per-edition level.

      - id: r6_works_where_level_inapplicable
        claim: >-
          Qurʾān muṣḥaf, Lisān al-ʿArab, al-Qāmūs al-Muḥīṭ, Ṣaḥīḥ al-Bukhārī,
          fatwā compilations, biographical dictionaries. Controlled
          vocabulary MUST include `reference` and `inapplicable` as
          first-class values. Taxonomy engine detects by discipline
          (lugha / ḥadīth-jāmiʿ / tarājim / muṣḥaf) and suppresses
          beginner-advanced axis. Forcing numeric level = most common
          real-world mislabeling in Arabic digital libraries; absence of
          level exposure in OpenITI, Shamela, al-Warraq probably reflects
          that reality (al-Raqmiyyāt, Digital Islamic Corpora, 2016; OpenITI
          YAML metadata schema at kitab-project.org/docs/openITI).
        implementation_target:
          kind: cross_engine_commitment
          engine: source (non-applicable genre enum) + taxonomy (discipline-based suppression)
          note: >-
            Convergent with ChatGPT DR r5_non_applicable_genres and SEC-2.
            Claude DR EXPANDS the list (Qurʾān muṣḥaf, dictionaries, hadith
            jāmiʿ, fatwā compilations, biographical dictionaries) and
            introduces `reference` AND `inapplicable` as distinct first-class
            values.
        flagged_for_domain_review: true
        flag_reason: >-
          Claude DR classifies Ṣaḥīḥ al-Bukhārī as "reference/inapplicable."
          Bukhārī is both a hadith collection AND a core teaching text read
          cover-to-cover in many curricula (Dār al-Muṣṭafā; al-Qarawiyyīn
          ḥadīth track). Gemini CLI domain-validator must verify whether
          reference-only classification is defensible or over-broad.

      - id: r7_audience_specialized_works
        claim: >-
          Children's catechisms (ʿaqīdat al-ṣibyān), women's fiqh primers
          (Bughyat al-Mustarshidīn subset), judicial manuals for qāḍīs
          (Tabṣirat al-Ḥukkām). Difficulty not on same axis as curriculum
          ladder. Solution: complementary intended_audience field with
          values {general | mubtadiʾ | women | youth | qāḍī | scholar}
          co-existing with level, both filling into taxonomy placement.
        implementation_target:
          kind: cross_engine_commitment
          engine: source (new field) + taxonomy (placement inputs)
          source_engine_role: >-
            New intended_audience field in SourceMetadata. Controlled
            vocabulary listed. Extracted from muqaddimah audience markers
            (F4) and from container-shape cues (children's editions have
            distinctive typography).
          note: >-
            NOT addressed in ChatGPT DR. New risk dimension Claude DR
            surfaces — genuinely orthogonal problem (audience specialization
            ≠ difficulty on curriculum ladder). Flag for adjudicator
            consideration — is this a new atom or deferred to taxonomy build?

      - id: r8_front_vs_back_loaded_difficulty
        claim: >-
          Dense muqaddima followed by easy body (Jamʿ al-Jawāmiʿ famously)
          or reverse. Whole-book scalar level = lossy summary. Excerpting
          engine already emits per-teaching-unit features; taxonomy engine
          should report level (scalar) + level_curve (per-chapter scores)
          so UI can surface variation. Progressive enhancement, not blocker.
        implementation_target:
          kind: cross_engine_commitment
          engine: taxonomy + UI
          note: >-
            NOT addressed in ChatGPT DR. Claude DR proposes two-part output:
            scalar level + level_curve. Progressive enhancement framing means
            not MVP-blocking. Flag for taxonomy-engine spec when that engine
            is built.

      - id: r9_model_drift_training_data_leakage
        claim: >-
          CAMeLBERT-CA, BAREC, and any future KR-trained classifier will
          drift as the library grows. level_assessments list already carries
          model hashes; corpus-wide re-scoring run on model bump is the
          institutional answer. Per critical rule 13 of root CLAUDE.md,
          every assessment feeds back as future training data, so the
          system improves with use rather than calcifying around a snapshot.
        implementation_target:
          kind: cross_engine_commitment
          engine: taxonomy (retraining cadence) + MLOps infrastructure
          note: >-
            Aligns with Critical Rule 13 (all data is future training
            material). Both DRs implicit on this, Claude DR makes it
            explicit. No atom-level action — bind to taxonomy-engine spec
            when built.

  - id: s9_closing
    paragraph_count: 1

    paragraphs:
      - id: p16_net_result_emit_the_hint
        claim: >-
          Architectural choice narrower than it looks. 7-engine pipeline
          already routes every book past source engine's weak metadata and
          through taxonomy engine's rich semantics. Only real question:
          whether weak signal is allowed to pretend to be strong (OPT-A),
          thrown away (pure OPT-B), or emitted with honesty about its
          confidence and corrected downstream (OPT-C). Tradition's own
          distinction between matn and ḥāshiya, failure mode Mukhtaṣar
          Khalīl has taught Mālikī students for 6 centuries, OF-SRC-0007,
          CLAUDE.md + AGENTS.md rules all point to same answer. "Emit the
          hint. Label it as a hint. Let the content speak. Record every
          view. Never overwrite. The level field is ready to be written
          the moment the pipeline is built; it is ready to be corrected
          the moment it is wrong; and at no point does any engine pretend
          to know more than it does."
        implementation_target:
          kind: summary
          note: >-
            Binding summary of the Claude DR. Directly opposes ChatGPT DR
            p46_net_result: ChatGPT DR says "OPT-B is the best architectural
            choice... late, content-derived, science-conditioned, with
            strong provenance and no silent overwrite." Claude DR says
            OPT-C-asymmetric is the best choice — same late-content-
            derived-science-conditioned-provenanced-no-overwrite semantics
            PLUS an honest low-confidence source hint.

# ===== SOURCE-ENGINE COMMITMENTS (CONDITIONAL ON OPT-C WIN) =====
# These do NOT activate unless adjudication verdict is OPT-C. If OPT-B wins,
# the committed SEC-1 through SEC-7 in the ChatGPT DR evidence file stand;
# the commitments below become the rejected dissenting position.

source_engine_commitments_conditional:

  - id: SEC-CLAUDE-1_emit_level_candidate
    statement: >-
      Source engine at metadata_deliberation MUST emit a level_candidate
      field inside SourceMetadata. Controlled vocabulary:
      {beginner, intermediate, advanced, reference, inapplicable, unknown}.
      Confidence field MUST be capped at `low` for source-stage emissions.
      Source (provenance) field MUST be one of
      {title_tokens, publisher_series, container_shape, composite}.
      features_observed field MUST list specific features that contributed.
      Runs through D-041 multi-model consensus on two models minimum.
    binds_atom: CON-SRC-0004 extension + new CON-SRC-0011 (enum anchor)
    conflict_with_committed: INV-SRC-0011 (must be reversed)
    source_paragraphs: [p8, p11, f11]
    severity: critical

  - id: SEC-CLAUDE-2_confidence_cap
    statement: >-
      Source engine MUST NOT emit confidence > low from shallow signals
      (title_tokens, publisher_series, container_shape). A source-stage
      emission at confidence >= medium is a violation of the asymmetric
      architecture and must raise LEVEL_CANDIDATE_OVERCONFIDENT
      (violation_severity: critical).
    binds_atom: INV-SRC-0011 reversal/renaming (INV-SRC-0011-candidate-emission)
    source_paragraphs: [p8, p11]
    severity: critical

  - id: SEC-CLAUDE-3_disputed_emission
    statement: >-
      If signals contradict (e.g., title = "mukhtaṣar" but publisher
      series is reference encyclopedia), source engine MUST emit
      level_candidate with value=`disputed` and both sub-hypotheses
      preserved in evidence. Aligns with "disputed metadata IS valid
      output" axiom.
    binds_atom: new atom for disputed-emission semantics
    source_paragraphs: [p8, p10]
    severity: high

  - id: SEC-CLAUDE-4_evidence_preservation
    statement: >-
      Source engine MUST preserve all metadata signals downstream level
      classification requires (title_arabic, genre, science_scope,
      is_multi_layer, structural_format, edition_group_id, edition_info,
      publisher, muhaqiq_output, page_layout_hint, matn_embedding_style,
      pdf_text_layer_status, contains_isnad_chains, acquisition_path,
      volume linkage). D-023 preservation applies.
    binds_atom: CON-SRC-0004 postcondition strengthening
    conflict_with_committed: CONVERGES with ChatGPT DR SEC-3 — NO conflict
    source_paragraphs: [p7, f1-f11]
    severity: critical
    note: >-
      CONVERGENT with ChatGPT DR SEC-3. Present in both DRs regardless
      of adjudication outcome. Already partially addressed by Gemini Run B
      metadata-plumbing finding (composite_work_type, sub_work_inventory,
      contains_isnad_chains missing at handoff).

  - id: SEC-CLAUDE-5_owner_flag_as_assessment_entry
    statement: >-
      Owner flag via library UI MUST create a level_assessments entry with
      stage: owner.flag carrying the owner's note, triggering the
      owner-validates gate (CLAUDE.md principle 1) and a re-inference
      subagent dispatch. Owner flag is a first-class correction trigger
      equal to downstream disagreement, re-ingestion, and model-version bump.
    binds_atom: new atom for owner-flag semantics
    source_paragraphs: [p13, p15]
    severity: medium

  - id: SEC-CLAUDE-6_non_applicable_genres_expanded
    statement: >-
      Expand non-applicable genre list beyond ChatGPT DR's
      {mushaf, hadith_collection, rijal_dictionary, majmu}. Add: Qurʾān
      muṣḥaf (if distinct from mushaf), Arabic lexicon dictionaries
      (Lisān al-ʿArab, Qāmūs al-Muḥīṭ), hadith jāmiʿ compilations, fatwā
      compilations, biographical dictionaries (tarājim, ṭabaqāt).
      Controlled vocabulary must distinguish `reference` (consulted, not
      read cover-to-cover) from `inapplicable` (ladder-of-difficulty
      doesn't apply at all).
    binds_atom: INV-SRC-0012 amendment + CON-SRC-0011 enum extension
    conflict_with_committed: CONVERGES with ChatGPT DR SEC-2 with expansion
    source_paragraphs: [r6]
    severity: low
    note: >-
      VERIFY with Gemini CLI: Ṣaḥīḥ al-Bukhārī classification as
      `reference/inapplicable` may be over-broad.

  - id: SEC-CLAUDE-7_reconciliation_output_surface
    statement: >-
      Library view MUST surface level_authoritative when present at
      confidence >= medium, fall back to level_candidate when not, and
      display visible disagreement marker when level_candidate and
      level_authoritative disagree. No silent overwrite. No implicit
      precedence rule hidden inside display logic.
    binds_atom: new atom for UI reconciliation rule (UI engine)
    source_paragraphs: [p10, p15]
    severity: medium

# ===== CROSS-ENGINE COMMITMENTS =====
# These apply regardless of OPT-B / OPT-C outcome where they converge with
# ChatGPT DR. DIVERGENCES are flagged.

cross_engine_commitments:

  taxonomy_engine:
    ownership:
      - "Taxonomy owns level_authoritative (p9). DIVERGENT from ChatGPT DR (synthesis)."
      - "Science-tree placement and level computation are inseparable (p9)."
      - "Taxonomy outputs: level (scalar) + level_curve (per-chapter) + reconciliation_verdict (vs source candidate)."
    feature_set:
      - "f1 depth-in-stack (passim text-reuse against OpenITI matn-sharh-hashiya graph) — RANK 1"
      - "f2 isnād density (conditional-by-science via riwāya detection)"
      - "f3 specialized-term density (al-Jurjānī Taʿrīfāt, al-Tahānawī Kashshāf)"
      - "f5 vocabulary rarity (CAMeLBERT-CA classical baseline, not modern MSA)"
      - "f12 BAREC fine-tuning path for KR-specific classifier"
    divergence_from_chatgpt_dr: >-
      ChatGPT DR assigned ownership to synthesis. Adjudication determines
      which engine owns authoritative level.

  synthesis_engine:
    role_under_opt_c: >-
      CONSUMES level; does NOT produce it. Uses level as input feature for
      cross-source synthesis (e.g., "this excerpt from advanced work X
      on same topic as beginner excerpt from work Y").
    divergence_from_chatgpt_dr: >-
      ChatGPT DR assigns authoritative level PRODUCTION to synthesis
      engine. Claude DR explicitly disqualifies synthesis as the owner.

  excerpting_engine:
    role: >-
      Feature extraction: f3 term density, f4 muqaddima audience markers
      (already in excerpts via pre-hamdala structural boundary), f6
      citation-explanation mode, f7 cross-reference density, f8 evidential
      verb density. Respect AGENTS.md isnād-atomic-units rule.
    convergence_with_chatgpt_dr: >-
      CONVERGES with ChatGPT DR excerpting_engine.level_features.

  normalization_engine:
    role: >-
      f1 layer detection (matn/sharh/hashiya/mazj/interlinear/marginal)
      via page geometry + typographic cues; f4 muqaddima boundary
      detection (before أما بعد); f9 edition apparatus separation
      (footnote/gloss vs author prose); f10 sentence-morphological
      complexity (OSMAN + CAMeL Tools, low reliability on turāth —
      research-only).
    convergence_with_chatgpt_dr: >-
      CONVERGES with ChatGPT DR normalization_engine.level_features.

  ui_engine:
    role: >-
      Provenance pill rendering: "advanced — taxonomy, high confidence,
      disagrees with source hint." Click expands assessment history
      drawer. Disagreement flag when confidence-equal conflict.
      "level pending" display for unknown/null.
    convergence_with_chatgpt_dr: >-
      CONVERGES with ChatGPT DR ui_engine_or_scholar_interface.level_display
      on the no-silent-overwrite + provenance-visibility + history-audit
      commitments. ADDS explicit provenance-pill UI pattern.

  human_gate:
    role: >-
      Owner-flag as first-class assessment entry. Re-inference subagent
      dispatch gated by owner validation. Non-technical owner questions
      per AGENTS.md communication rule (no DEC-SRC-NNNN, no OPT-X).
    convergence_with_chatgpt_dr: >-
      CONVERGES with ChatGPT DR human_gate.level_review.

