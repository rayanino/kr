# ===== HEADLINE =====

headline_recommendation: OPT-B
headline: >-
  Reading-level inference is a downstream, content-based decision.
  Authoritative ownership sits in the synthesis engine. The source engine
  preserves evidence but does NOT populate the `level` field except in the
  rare case of explicit owner override. Level must be science-conditioned
  and layer-conditioned (classify within fiqh/usul/nahw/hadith/tafsir AND
  within matn/sharh/hashiyah BEFORE assigning mubtadi/mutawassit/mutaqaddim).
  Level is stored as a history of assessments with provenance, never as a
  single scalar that can be silently overwritten.

dr_self_confidence: high
accepted_as_binding: conditional_on_twin_dr_convergence

# ===== PARAGRAPH INVENTORY (46 units) =====
