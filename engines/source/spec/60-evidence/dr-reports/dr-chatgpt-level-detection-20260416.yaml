      - claim: "6_mukhtasar_functions_as_scaffold_and_can_be_harder"
        verdict: VERIFIED
        confidence: HIGH
        sharpening: >-
          Mukhtasar Khalil (Khalil b. Ishaq al-Jundi, d. 776/1374) is the
          definitive counterexample — 348+ manuscripts and sharhs exist
          because the matn is structurally opaque without a teacher. This is
          stronger than "can be harder": the mukhtasar genre is pedagogically
          engineered to require a sharh. The "title tokens lie" invariant in
          INV-SRC-0011 has structural grounding, not merely probabilistic.
