    binds_atom: DEC-SRC-0003 (close + amend options)
    source_paragraphs: [p16, p17, p18, p19, p20, p21, p46]
    severity: critical  # blocks all other source-engine level work

  - id: SEC-7_oq_src_0001_closure
    statement: >-
      OQ-SRC-0001 closes as superseded by DEC-SRC-0003. The ownership
