# ===== SOURCE-ENGINE COMMITMENTS (binding) =====
# These generate atom amendments/new atoms in the source engine.

source_engine_commitments:

  - id: SEC-1_no_title_token_inference
    statement: >-
      The source engine MUST NOT compute or infer the level field from title
      tokens, series cues, publisher metadata, or any shallow bibliographic
      signal. The level field remains null unless explicit owner override is
      provided at intake.
    binds_atom: INV-SRC-NEW-1 (new non-inference invariant)
    source_paragraphs: [p2, p9, p17, r2]
    severity: critical  # violation = silent level corruption

  - id: SEC-2_non_applicable_genres_null
    statement: >-
      For genres where the reading-level concept does not apply (mushaf,
      hadith_collection, rijal_dictionary, majmu, and similar archival or
      transmission-document genres), the source engine MUST serialize level
      as null. Forcing a label for these genres creates false scholarly
      authority.
    binds_atom: INV-SRC-NEW-2 (new non-applicable-genres invariant)
    source_paragraphs: [r5]
    severity: high

  - id: SEC-3_evidence_preservation
    statement: >-
      The source engine MUST preserve all metadata signals downstream level
      classification requires: title_arabic, genre, science_scope,
      is_multi_layer, structural_format, edition_group_id, edition_info,
      publisher, muhaqiq_output, page_layout_hint, matn_embedding_style,
      pdf_text_layer_status, contains_isnad_chains, acquisition_path, volume
      linkage. D-023 metadata preservation applies.
    binds_atom: REQ-SRC-NEW-1 (new evidence-preservation requirement) or amend CON-SRC-0004 postconditions
    source_paragraphs: [p10, f2, f9, f11, r1, r3, r4, r7]
    severity: critical

  - id: SEC-4_owner_override_pathway
    statement: >-
      The source engine SHALL accept an optional owner_level_override at
      intake (via RawUploadRecord or equivalent intake surface). When
      provided, the override value populates SourceMetadata.level with
      provenance="owner_override" and records the override in the audit
      trail. Without override, level remains null.
    binds_atom: REQ-SRC-NEW-2 (new owner-override requirement)
    source_paragraphs: [p16, p43, p146]
    severity: medium

  - id: SEC-5_req_src_0007_amendment
    statement: >-
      REQ-SRC-0007 is amended per contract-architect-review's prior AMEND
      verdict. The prior blocker (dependency on unresolved DEC-SRC-0003/
      OQ-SRC-0001) is now resolved by the OPT-B decision. REQ-SRC-0007 is
      split into a pure handoff-preservation contract (level key always
      present, null when unknown, passed through unchanged if populated)
      with no remaining architectural dependency.
    binds_atom: REQ-SRC-0007 (amendment)
    source_paragraphs: [p18]
    severity: medium

  - id: SEC-6_dec_src_0003_closure
    statement: >-
      DEC-SRC-0003 closes as confirmed. Option B (downstream content
      analysis) is chosen. Option A (source-metadata-only) is rejected
      because title tokens systematically lie (paragraphs p2, p9, r2).
      Option C (dual inference with reconciliation) is rejected because the
