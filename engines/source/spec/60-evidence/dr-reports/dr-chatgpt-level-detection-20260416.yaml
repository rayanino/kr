          atom_id_target: INV-SRC-NEW-2  # non-applicable-genres invariant
          note: "Source engine invariant: level MUST be null for genre in {mushaf, hadith_collection, rijal_dictionary, majmu}. Synthesis respects this even when feature signals exist."

      - id: r6_science_relative_inversion
        claim: "Longer≠harder, shorter≠easier. Usul, mantiq, kalam vulnerable to compression-with-high-difficulty. All scoring must be science-conditioned."
        implementation_target:
          kind: cross_engine_commitment
          engine: synthesis
          note: "Science-conditioning is mandatory — reiterates p5 and p21."

      - id: r7_edition_apparatus_contamination
        claim: "If footnotes, takhrij, marginal corrections, editor introductions not separated from authorial prose, lexical rarity and sentence complexity features drift upward, overclassify advanced. Normalization hygiene issue, not just a model issue."
        implementation_target:
