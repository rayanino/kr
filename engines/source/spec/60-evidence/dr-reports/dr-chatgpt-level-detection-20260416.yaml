      only sharpen evidence file language and future citation accuracy.

post_verification_corrections:
  # Corrections applied to evidence-file phrasing after the researcher's
  # cross-check. Original DR text (sections[].paragraphs[].claim) is preserved
  # verbatim as historical record; these corrections layer on top.

  - paragraph_id: p2_ibn_khaldun_tadarruj
    correction_type: sharpening
    corrected_claim: >-
      Ibn Khaldun's Muqaddimah (Book VI, Chapter 6) critiques mukhtasar works
      for presenting "ultimate findings" before the student has formed the
      mental habitus (malakah) to receive them. He advocates tadarruj — a
      graduated scaffolded exposition — as the pedagogically sound alternative.
      Modern studies consistently reconstruct his pedagogy this way. The
      consequence relevant to KR: a book called mukhtasar may be harder than
      a fuller exposition because it presupposes the prior formation (malakah)
      that scaffolded works explicitly build.
    original_weakness: >-
      Original claim phrased as "critique of excessive abbreviation" — correct
      but misses the precision that Ibn Khaldun's argument is about premature
      compression of conclusions before the learner's habitus is formed.
    note: >-
      The atoms DEC-SRC-0003 and INV-SRC-0011 already capture this via
      "presupposes prior formation" language. No atom edit required.

  - paragraph_id: p3_internal_textual_signals
    correction_type: factual_correction
    corrected_claim: >-
      Strongest traditional signals are INTERNAL: author-declared audience
      markers in muqaddimah. Examples: explicit phrases indicating beginners,
      children, first introductions, or clarification for students already
      studying a science. Ibn Abi Zayd al-Qayrawani's al-Risala was
      pedagogically functional for BOTH "the young who want to teach that,
      and the adults who need it" (per Ibn Abi Zayd's own stated audience),
      not exclusively a children's book as the DR originally framed it.
      Al-Ajurrumiyyah commentaries of varying complexity are documented
      (100+ extant), but the specific claim that a preface self-positions as
      beginner-facing because earlier commentaries were too difficult is
      UNVERIFIED at the preface-text level and should be treated as an
      illustrative pattern rather than a cited authority.
    original_weakness: >-
      Original claim overstated al-Risala's audience (children only, not
      adults) and cited al-Ajurrumiyyah commentary self-positioning without
      primary-text verification.
    note: No atom references al-Risala or al-Ajurrumiyyah by name. No atom edit required.

  - paragraph_id: p4_structural_cues
    correction_type: sharpening
    corrected_claim: >-
      Beginner-facing works unpack terminology, explain citations, define
      technical vocabulary, reduce unresolved objections/branching cases/cross-
      book dependencies. Advanced works assume prior study, multiply
      references, engage disagreement literature, write as gloss on technical
      base text. The native scholarly hierarchy is 4–5 tier:
      matn → sharh → hashiya → taʿliqa/taqrir → takmila. Matn compresses,
      sharh explicates, hashiya clarifies remaining difficulty, taʿliqa
      extracts lecture-style oral clarifications, and takmila continues or
      supplements an earlier work. The DR mentioned only the first three tiers.
    original_weakness: Omitted taʿliqa/taqrir and takmila tiers.
    note: >-
      No atom prescribes exactly the ladder depth; synthesis engine spec
      (when written) should use the 4–5 tier language.

  - paragraph_id: p5_science_relative
    correction_type: sharpening
    corrected_claim: >-
      Difficulty is science-relative and genre-relative, not absolute. Short
      usul text can be more demanding than longer sira. Hadith collection with
      dense isnad and little explanatory prose is advanced for general readers
      but foundational inside hadith transmission culture. The broader point
      is not that classical scholars "rejected title-based classification"
      (an anachronism — no systematic title metadata existed at the scale
      modern NLP faces) but that they relied on reading capacity and internal
      comprehension signals rather than assuming title difficulty is fixed.
    original_weakness: >-
      Paragraph 2 carried "NOT title-based classification" framing which
      projects a modern NLP distinction back onto classical scholars.
    note: No atom uses the phrase "title-based classification." No atom edit required.

  - paragraph_id: p13_tooling_maturity_barec
    correction_type: nuance
    corrected_claim: >-
      BAREC (Balanced Arabic Readability Evaluation Corpus) has 19 levels with
      inter-annotator agreement measured by Quadratic Weighted Kappa at
      81.3–81.8% ("substantial") and ACC±1 at 94.6%. However, exact-match IAA
      on the 19-level scale is only 61.4% (kindergarten band) to 72.4%
      (school band). "High IAA" in the BAREC literature refers to QWK, which
      tolerates ±1 level disagreement; on fine-grained exact level, humans
      frequently disagree.
    original_weakness: >-
      Original claim said "high inter-annotator agreement" without noting
      the distinction between QWK (tolerant) and exact-match (strict).
    note: >-
      Relevant for synthesis-engine confidence calibration. No source-engine
      atom cites BAREC. No atom edit required.

