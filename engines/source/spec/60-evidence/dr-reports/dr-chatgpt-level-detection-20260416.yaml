sections:

  - id: s1_islamic_scholarly_tradition
    paragraph_count: 5

    paragraphs:
      - id: p1_relational_difficulty
        claim: "Difficulty in classical tradition is relational (to science, curriculum, prior memorization, position in matn→sharh→hashiyah ladder), not universal grade-level. Mukhtasar functions as pedagogical condensation and memorization scaffold; commentaries and glosses belong to professionalized scholastic layer."
        implementation_target:
          kind: cross_engine_commitment
          engine: synthesis
          note: "Synthesis classifier must condition level on pipeline-position (matn/sharh/hashiyah) derived from normalization layer-detection. Binds feature F2 in §4b."

      - id: p2_ibn_khaldun_tadarruj
        claim: "Ibn Khaldun's Muqaddimah critique: excessive abbreviation and terminological variation impede acquisition. Modern studies reconstruct his pedagogy as tadarruj (graduated) scaffolded exposition, NOT title-based classification. Consequence: a book called mukhtasar may be harder than a fuller exposition if it presupposes prior formation."
        implementation_target:
          kind: source_engine_atom
          atom_id_target: INV-SRC-NEW-1  # non-inference invariant
          note: "Grounds the source-engine commitment that title tokens must never drive level inference."

      - id: p3_internal_textual_signals
        claim: "Strongest traditional signals are INTERNAL: author-declared audience markers in muqaddimah. Examples: explicit phrases indicating beginners, children, first introductions, clarification for students already studying. Ibn Abi Zayd's al-Risalah records original pedagogical function as a book for teaching children; a commentary on al-Ajurrumiyyah records author saying earlier commentaries were difficult for the beginner."
        implementation_target:
          kind: cross_engine_commitment
          engine: normalization
          note: "Feature F1 — preface extraction must preserve audience-marker phrases for synthesis consumption. Rank = High reliability."

      - id: p4_structural_cues
        claim: "Beginner-facing works unpack terminology, explain citations, define technical vocabulary, reduce unresolved objections/branching cases/cross-book dependencies. Advanced works assume prior study, multiply references, engage disagreement literature, write as gloss on technical base text. Matn compresses, sharh explicates, hashiyah clarifies remaining difficulty or enters denser scholastic disputation."
        implementation_target:
          kind: cross_engine_commitment
          engine: excerpting + synthesis
          note: "Features F3 (term density), F4 (explanatory gloss rate), F5 (cross-reference burden) ride on this insight. Synthesis aggregates these excerpt-level features into book-level level judgment."

      - id: p5_science_relative
        claim: "Difficulty is science-relative and genre-relative, not absolute. Short usul text can be more demanding than longer sira. Hadith collection with dense isnad/narrator formulae and little explanatory prose is advanced for most readers but foundational inside hadith transmission culture. Isnad density should be treated as conditional-by-science, not universal."
        implementation_target:
          kind: cross_engine_commitment
          engine: synthesis
          note: "Science-conditioning is mandatory — not a nice-to-have. Binds feature F10 (science-conditional evidential density). Source engine already preserves genre + science_scope which feeds this."

  - id: s2_digital_library_precedents
    paragraph_count: 5

    paragraphs:
      - id: p6_usul_no_level_facet
        claim: "Usul.ai public interface: discovery axes are author, genre, region, empire/era, edition/publisher. NO public-facing beginner/intermediate/advanced facet. Architecture is bibliographic/scholarly, not pedagogical-level."
        implementation_target:
          kind: informational
          note: "Validates OPT-B: the leading curated Arabic scholarly interface does not pre-commit to level at ingestion either. KR aligns with this precedent."

      - id: p7_shamela_edition_plurality
        claim: "Al-Maktaba Al-Shamela: foregrounds section/category/author/editor/publisher/edition/page count/full-text search. Multiple edition records for same classical work (e.g. Tarikh al-Khulafa). NO level field. Practical lesson: Arabic scholarly libraries are forced to model edition plurality; title-token level assignment is especially fragile here."
        implementation_target:
          kind: source_engine_atom
          atom_id_target: CON-SRC-0004  # already includes edition_group_id, edition_info, publisher
          note: "Current CON-SRC-0004 already models edition_group_id, edition_info, publisher. This paragraph validates that design. No change needed but confirms the existing architecture."

      - id: p8_waraq_noor_no_level
        claim: "Al-Waraq and Noor Library: no stable scholarly-level facet. Noor especially looks category-driven and crowdsource-friendly rather than curator-driven."
        implementation_target:
          kind: informational
          note: "Further confirmation that no major Arabic library commits to level at ingestion."

      - id: p9_three_failure_modes
        claim: "Three recurring failure modes when libraries try to infer level: (a) edition drift — same work in pedagogically sparse critical edition vs didactic classroom edition with vowelization/exercises/notes; (b) series/volume mismatch — one volume beginner, later volume advanced; (c) title-token false positives — al-Wasit, al-Mukhtasar, al-Taysir, al-Mubassat encode marketing/positioning not difficulty. Example: 'The Intermediate in Fundamentals of Jurisprudence' — title advertises level label but system is surfacing bibliographic title."
        implementation_target:
          kind: source_engine_atom + cross_engine_commitment
          atom_id_target: INV-SRC-NEW-1  # title-token non-inference invariant
          note: "Directly motivates source-engine invariant prohibiting level inference from title tokens. Risks R3 (series/volume), R4 (edition) logged for synthesis."

      - id: p10_precedent_lesson
        claim: "Digital-library precedent is: store rich bibliographic evidence, model editions carefully, avoid pretending public metadata alone settles pedagogical level. Aligns with owner feedback (OF-SRC-0007) that title cards and shallow metadata routinely misrepresent level."
        implementation_target:
          kind: source_engine_atom
          atom_id_target: REQ-SRC-NEW-1  # evidence-preservation requirement
          note: "Grounds the source-engine evidence-preservation requirement: preserve title, series, edition_info, publisher, page_layout_hint so downstream can reason — but do not infer level."

  - id: s3_measurable_features
    paragraph_count: 5

    paragraphs:
      - id: p11_readability_research_gap
        claim: "Arabic readability research exists but benchmarks are school/L2/general MSA, not classical Islamic scholarly prose. Useful takeaway is a menu of feature families to transfer carefully. Arabic L2 study: 170 features reduced to smaller subsets while preserving performance; best result 86.15%. Feature groups: POS frequencies, type/token ratios, lemma frequency, word length, vocabulary load, word class, sentence length."
        implementation_target:
          kind: cross_engine_commitment
          engine: synthesis
          note: "Synthesis classifier must treat generic Arabic readability benchmarks as weak transfer sources, not authoritative. Domain calibration against KR corpus required (Risk R8)."

      - id: p12_feature_selection_hybrid
        claim: "2023 feature-selection study: aggressive reduction helps; fine-tuned Arabic-BERT outperforms embedding baselines; combining embeddings with selected linguistic features performs best. 2021 sentence-difficulty classifier best with fine-tuned Arabic-BERT but compared against POS tags, dependency trees, readability scores, learner-oriented frequency lists. Implication: HYBRID (rules + embeddings) > pure rules or pure embeddings."
        implementation_target:
          kind: cross_engine_commitment
          engine: synthesis
          note: "Synthesis level classifier architecture must be hybrid. Binds hybrid-model architecture for downstream spec."

      - id: p13_tooling_maturity
        claim: "Farasa (production-ready Arabic segmentation: stems, prefixes, suffixes, lexicons, stem templates). CAMeL Tools (open-source Arabic preprocessing + morphological modeling). AraBERT (Arabic language representations). BAREC (19-level Arabic readability corpus, high IAA). Building blocks, not sufficient for turath."
        implementation_target:
          kind: cross_engine_commitment
          engine: normalization + synthesis
          note: "Approved tooling stack for Features F8 (sentence complexity). Normalization owns Farasa/CAMeL integration; synthesis consumes segmented tokens."

      - id: p14_transfer_problem
        claim: "Arabic difficulty shaped by diglossia, orthographic opacity, vowelization practice, root-pattern morphology. English readability formulas do not transfer cleanly. OSMAN validated on narrative/parallel data; AARI on Jordanian school curricula — useful as WEAK auxiliary signals only, NOT authoritative classifiers for classical Islamic scholarly books."
        implementation_target:
          kind: cross_engine_commitment
          engine: synthesis
          note: "OSMAN/AARI explicitly demoted to weak-signal status in synthesis classifier. Not authoritative."

      - id: p15_kr_specific_signals
        claim: "Most promising signals for KR: terminology density, explanatory gloss frequency, cross-reference density, author-declared audience markers, quote-vs-exposition ratios, conditional sentence complexity, vocabulary rarity vs in-house scholarly baseline, science-conditional features (isnad density, commentary-layer identification). First five are closest to pre-modern pedagogical reality."
        implementation_target:
          kind: cross_engine_commitment
          engine: multiple
          note: "Drives the 12-feature architecture in §4b. First-five priority ordering is binding."

  - id: s4a_architectural_recommendation
    paragraph_count: 6

    paragraphs:
      - id: p16_opt_b_headline
        claim: "OPT-B RECOMMENDED: level inference is downstream, content-based; authoritative ownership in synthesis end of pipeline; source engine preserves evidence but does NOT populate `level` except rare owner override."
        implementation_target:
          kind: source_engine_atom
          atom_id_target: DEC-SRC-0003  # close as confirmed with OPT-B chosen
          note: "This is THE decision. DEC-SRC-0003 closes as confirmed, OPT-B chosen, OPT-A and OPT-C rejected with documented rationale."

      - id: p17_tradition_argument
        claim: "Book's own discourse is the most authoritative signal — whether it defines/presupposes terminology, explains/cites, writes as base or gloss, preface names audience (children/beginners/specialists). Rejects OPT-A: title tokens (mukhtasar, taysir, wasit, mubassat) can help but are not trustworthy enough to OWN the field. Ibn Khaldun's critique of abbreviation pedagogically harmful reinforces this."
        implementation_target:
          kind: source_engine_atom
          atom_id_target: INV-SRC-NEW-1
          note: "Source-engine invariant: must NOT infer level from title tokens or shallow metadata."

      - id: p18_engineering_argument
        claim: "KR already tolerates 'unknown' cleanly. Source contract includes optional `level` in SourceMetadata; source-to-normalization handoff requires `level` key always serialized, null when unknown. Choosing OPT-B does NOT create schema mismatch — uses the schema as designed."
        implementation_target:
          kind: source_engine_atom
          atom_id_target: REQ-SRC-0007  # already encodes this, confirm + execute prior AMEND
          note: "REQ-SRC-0007 (level key always present, null when unknown) was correct by construction. Execute contract-architect's prior AMEND verdict: split handoff-preservation from the readiness-blocker (now resolved by DEC-SRC-0003)."

      - id: p19_pipeline_argument
        claim: "Taxonomy v1 is only for placing excerpts at leaves; NOT the place for broad source-level metadata deliberation. Excerpting groups segments into teaching units and preserves upstream metadata. Synthesis is the first place where the book can be seen as distributed pedagogical units; it is the least distortive place to attach a late-bound owner-facing judgment."
        implementation_target:
          kind: cross_engine_commitment
          engine: synthesis
          note: "Assigns level-classification ownership to synthesis engine. Logged for synthesis spec when that engine is built."

      - id: p20_ux_argument
        claim: "In a personal scholarly library, wrong visible level is more harmful than temporarily unknown level. Source contract legitimizes null. Newly ingested book = 'level pending' or null; late authoritative classification once content-derived feature bundle available. OPT-C unnecessary — the system never needs to fake certainty."
        implementation_target:
          kind: cross_engine_commitment
          engine: synthesis + ui
          note: "'Level pending' is the owner-facing default. Binds UI spec when written."

      - id: p21_science_layer_refinement
        claim: "Within OPT-B, level should be classified WITHIN science and textual layer, not globally. First locate as fiqh/usul/nahw/hadith/tafsir, and where relevant as matn/sharh/hashiyah/edition-with-apparatus. Only THEN classify into mubtadi/mutawassit/mutaqaddim. Mirrors tradition, reduces cross-science false equivalence, makes measurable features more meaningful."
        implementation_target:
          kind: cross_engine_commitment
          engine: synthesis
          note: "Synthesis classifier is a THREE-STAGE cascade: science → layer → level. Logged for synthesis spec."

