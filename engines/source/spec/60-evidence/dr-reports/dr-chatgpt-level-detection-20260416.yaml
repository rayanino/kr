  - id: s4c_correction_mechanism
    paragraph_count: 4

    paragraphs:
      - id: p22_append_only_history
        claim: "Store level as HISTORY of assessments, not scalar. Each record: level, confidence, engine owner, model ensemble IDs, feature snapshot ID, evidence excerpts, timestamp, predecessor record. Active level projects into nullable `level` field. NO later correction silently overwrites prior judgment. D-023-aligned."
        implementation_target:
