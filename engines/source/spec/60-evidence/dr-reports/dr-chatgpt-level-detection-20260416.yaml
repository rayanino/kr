          note: "Synthesis data model: LevelAssessment record type (history list), LevelAssessmentProjection (active level). Modeled after INV-SRC-0010's derived-never-asserted pattern for holding completeness."

      - id: p23_four_detection_channels
        claim: "Correction detection has 4 channels: (1) confidence failure (classifier below threshold or deterministic/model disagreement), (2) structural conflict (later analysis finds multi-layer, different edition group, different science/layer), (3) cross-edition divergence (another edition of same work gives stable conflicting assessment), (4) owner review (in personal library, owner correction is high-value evidence preserved as own provenance-bearing assessment)."
        implementation_target:
          kind: cross_engine_commitment
          engine: synthesis + human_gate
          note: "Four correction triggers. Owner-review channel interacts with human_gate subsystem."

      - id: p24_no_upstream_rerun
        claim: "Correction does NOT trigger upstream re-processing. Level is LATE METADATA OVERLAY. Re-run only the level-assessment component; selectively invalidate artifacts explicitly displaying/narrativizing level (search indexes, book cards, synthesis outputs mentioning it). Keeps frozen source untouched, localizes recomputation."
        implementation_target:
          kind: cross_engine_commitment
          engine: synthesis
          note: "Level correction cost = O(level classifier) not O(pipeline). Critical design invariant for synthesis engine."

      - id: p25_owner_ux_by_certainty
        claim: "Owner-facing behavior by certainty: first ingestion → unknown/pending; routine late classification → active level + explainable provenance; correction → visible history entry explaining why changed; hard confirmation gate appropriate at category boundaries, consensus failures, long-stable reversals; high-confidence updates automatic but history always inspectable. NEVER silent rewrite."
        implementation_target:
          kind: cross_engine_commitment
          engine: synthesis + ui + human_gate
          note: "UI commitments for level display. Binds UI spec and human_gate behavior."

  - id: s4d_risks
    risk_count: 8

    risks:
      - id: r1_multi_layer_works
        claim: "Beginner-level matn with advanced hashiyah yields contradictory signals in same source. Whole-book label lossy. Classifier must detect layers first, classify dominant readable layer, or keep book-level null with layer-level assessments."
        implementation_target:
          kind: cross_engine_commitment
          engine: normalization (layer detection) + synthesis (per-layer classification)
          source_engine_role: "is_multi_layer is already mandatory in CON-SRC-0004. Preserve this signal — synthesis consumes it."

      - id: r2_abridgement_title_trap
        claim: "Work called mukhtasar can be hard because maximally compressed. Title tokens dangerous. Strongest argument against OPT-A and over-weighting source metadata."
        implementation_target:
          kind: source_engine_atom
          atom_id_target: INV-SRC-NEW-1
          note: "Directly grounds the non-inference invariant."

      - id: r3_series_volume_mismatch
        claim: "Series marketed as beginner/intermediate; later volumes become technical. Assign level at work-or-volume granularity, not inherited from series card."
        implementation_target:
          kind: cross_engine_commitment
          engine: synthesis
          source_engine_role: "Source engine already preserves volume_count, edition_group_id, holding_id. Synthesis must not inherit level across volumes without evidence."

      - id: r4_edition_divergence
        claim: "Same classical work in pedagogical edition (punctuation, vowelization, headings, rehearsal questions, explanatory notes) vs critical edition (minimal/heavy apparatus). Work-level level detached from edition is unsafe."
        implementation_target:
          kind: cross_engine_commitment
          engine: synthesis
          source_engine_role: "edition_group_id, edition_info, muhaqiq_output already preserved. Synthesis ties level to edition, not work."

      - id: r5_non_applicable_genres
        claim: "mushaf, hadith collection, rijal dictionary, purely archival majmu' may resist beginner/intermediate/advanced trichotomy. Under nullable schema, safest: level=null with provenance explaining concept was judged non-applicable. Forcing a label creates false authority."
        implementation_target:
