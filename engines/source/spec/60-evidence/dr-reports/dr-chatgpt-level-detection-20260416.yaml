        claim: "Arabic readability benchmarks less mature than English; strongest corpora school/L2-oriented not classical scholarly. BAREC, OSMAN, AARI useful but transfer sources. KR classifier needs domain calibration against own corpus; must expose confidence honestly."
        implementation_target:
