candidates:
  - id: OPT-A
    label: Position array
    description: Store every disputed field as an array of position, evidence, and confidence records.
    likelihood: likely
  - id: OPT-B
    label: Primary plus alternatives
    description: Keep one primary value plus a side channel of alternatives and evidence.
    likelihood: unlikely
