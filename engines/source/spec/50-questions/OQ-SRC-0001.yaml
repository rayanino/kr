rationale: >-
  Resolved by DEC-SRC-0003 on 2026-04-16 per ChatGPT Deep Research
  (dr-chatgpt-level-detection-20260416). Ownership answer: the synthesis engine
  owns authoritative level classification. The source engine preserves evidence
  and honors owner-override but does not infer level. The candidate set below
  is preserved as historical record of the alternatives that were considered
  before the DR-backed decision was taken.
candidates:
- id: OPT-A
  label: Source metadata only
  description: Infer level from title cards and shallow source metadata inside the source engine.
  likelihood: unlikely
- id: OPT-B
  label: Downstream content analysis
  description: Compute level after content analysis has richer evidence about difficulty and pedagogy.
  likelihood: likely
- id: OPT-C
  label: Dual inference with reconciliation
  description: Let source emit a provisional level signal while a downstream stage confirms or corrects it.
  likelihood: possible
