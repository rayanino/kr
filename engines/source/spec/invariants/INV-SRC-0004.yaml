id: INV-SRC-0004
type: invariant
status: proposed
title: Truth-seeking over consensus-forcing
topic: consensus
priority: high
confidence: high
provenance: owner_interview
source: Derived from OF-SRC-0013; amended per contract-architect-review.yaml
created: "2026-04-14"
updated: "2026-04-14"
depends_on:
  - OF-SRC-0013
  - DEC-SRC-0007
  - REQ-SRC-0012
impacts:
  - disputed_metadata
  - evidence_preservation
rule:
  statement: A metadata field qualifies as genuine scholarly dispute only when at least two independent agents provide evidence-backed positions for that field.
  implication: Qualified disputes must be emitted through the REQ-SRC-0012 positions array instead of a forced single value.
  violation_severity: high
acceptance_criteria:
  - id: AC-1
    given: A disputed authorship case with two independent agents and two non-empty evidence lists
    when: metadata finalization executes
    then: The output field is serialized through disputed_field.positions instead of a single scalar author value.
    test_type: integration
