id: INV-SRC-0002
type: invariant
status: proposed
title: Author attribution role separation is mandatory
topic: metadata
priority: critical
confidence: high
provenance: owner_interview
source: Derived from OF-SRC-0004; amended per domain-validator-review.yaml
created: "2026-04-14"
updated: "2026-04-14"
depends_on:
  - OF-SRC-0004
  - REQ-SRC-0014
impacts:
  - author_attribution
  - role_assignment
rationale: Attribution accuracy remains the top source-engine quality metric, so the role boundaries feeding author attribution must be mechanically enforceable.
rule:
  statement: Author attribution must map author markers to author_name, copyist markers to copyist_name, and editor markers to editor_name without cross-populating those fields.
  implication: Names following ألفه or صنفه may populate author_name, names following كتبه or نسخه may populate copyist_name, and names following المحقق or تحقيق may populate editor_name.
  violation_severity: critical
acceptance_criteria:
  - id: AC-1
    given: tests/fixtures/shamela_real/13_format_b/book.htm
    when: author attribution executes
    then: author_name="محمد بن عبد الوهاب" and editor_name="أبو مالك محمد شكري الآلوسي".
    test_type: integration
  - id: AC-2
    given: Colophon text "كتبه عبد الله بن محمد"
    when: author attribution executes
    then: copyist_name="عبد الله بن محمد" and author_name remains null.
    test_type: deterministic
