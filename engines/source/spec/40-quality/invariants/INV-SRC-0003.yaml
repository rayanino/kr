id: INV-SRC-0003
type: invariant
status: proposed
title: Library never refuses knowledge
topic: metadata
layer: quality
priority: critical
confidence: high
provenance: owner_interview
source: Derived from OF-SRC-0006 and broadened on 2026-04-14 after owner clarification that only structurally invalid uploads should be blocked from the official source flow.
created: '2026-04-14'
updated: '2026-04-14'
depends_on:
  - OF-SRC-0006
  - DEC-SRC-0002
  - REQ-SRC-0025
impacts:
  - science_registry
  - intake_admission
rule:
  statement: No structurally valid source is rejected solely because its science label is absent from science_registry, because its metadata remains disputed, or because its completeness or integrity verdict carries non-fatal flags.
  implication: Unknown sciences trigger registry_expansion_request handling, and structurally valid but partial or suspicious sources remain admissible with explicit flags while only structurally invalid uploads are blocked from official source admission.
  violation_severity: critical
acceptance_criteria:
  - id: AC-1
    given: A source classified as mustalah_al_hadith while science_registry lacks that label
    when: science classification executes
    then: source admission remains accepted and registry_expansion_request.status="pending_owner_confirmation".
    test_type: integration
  - id: AC-2
    given: A structurally valid upload whose intake_dossier.completeness_status="partial" and intake_dossier.integrity_status="suspicious"
    when: source admission executes
    then: source admission remains accepted_with_flags rather than rejected.
    test_type: deterministic
