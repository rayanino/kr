id: INV-SRC-0011
type: invariant
status: confirmed
title: Source engine must not infer level from shallow metadata
topic: metadata
layer: quality
priority: critical
confidence: high
provenance: deep_research
source: 'dr-reports/dr-chatgpt-level-detection-20260416.yaml (SEC-1)'
created: '2026-04-16'
updated: '2026-04-16'
depends_on:
- DEC-SRC-0003
- CON-SRC-0004
impacts:
- level_metadata
- source_normalization_boundary
rationale: >-
  ChatGPT Deep Research dr-chatgpt-level-detection-20260416 (paragraphs p2, p9,
  p17, and risk r2) established that title tokens such as mukhtasar, wasit,
  taysir, mubassat, kabir, and lil-mubtadi'in encode marketing and positioning
  rather than difficulty. Ibn Khaldun's critique of abbreviation (p2) and the
  abridgement-title trap (r2) together establish that a work called mukhtasar
  may be harder than a fuller exposition when it presupposes prior formation.
  Treating shallow bibliographic signals as authoritative for level therefore
  corrupts the scholarly library's reading-level metadata at the earliest
  pipeline stage.
rule:
  statement: >-
    The source engine MUST NOT compute or infer the level field of
    SourceMetadata from title tokens, series cues, publisher metadata, or any
    shallow bibliographic signal. The level field remains null unless an
    explicit owner_level_override is provided at intake.
  implication: >-
    Violation means the source engine has usurped the synthesis engine's
    ownership of level classification (per DEC-SRC-0003) and silently asserted
    a reading-level judgment not earned from content analysis. The resulting
    level value would be marked with source-engine provenance while encoding
    nothing more than a title-token guess, producing false scholarly authority
    in the owner's library.
  violation_severity: critical
acceptance_criteria:
- id: AC-1
  given: tests/fixtures/shamela_real/03_fiqh/book.htm (title "أحكام الاضطباع والرمل في الطواف") processed with no owner_level_override and no explicit level value supplied upstream
  when: the source engine emits SourceMetadata
  then: SourceMetadata.level is null.
  test_type: deterministic
- id: AC-2
  given: A source whose title_arabic contains the token "مختصر" (for example "مختصر خليل" or a variant containing "mukhtasar") with no owner_level_override
  when: the source engine emits SourceMetadata
  then: SourceMetadata.level is null and no level inference is attempted from the title token.
  test_type: deterministic
- id: AC-3
  given: tests/fixtures/shamela_real/06_usul/book.htm submitted with owner_level_override="intermediate"
  when: the source engine emits SourceMetadata
  then: SourceMetadata.level="intermediate" (the override value, not a value inferred from shallow metadata).
  test_type: deterministic
