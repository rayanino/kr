id: INV-SRC-0012
type: invariant
status: confirmed
title: Non-applicable works require level null
topic: metadata
layer: quality
priority: high
confidence: high
provenance: deep_research
source: >-
  Initial formulation on 2026-04-16 from
  dr-reports/dr-chatgpt-level-detection-20260416.yaml (SEC-2).
  Amended on 2026-04-17 (Phase 5b item 2) to rewrite AC-1 through
  AC-4 in the CON-SRC-0011 classical WorkLevel vocabulary (mubtadiʾ,
  muntahī, mutawassiṭ, muntahī respectively). Amended on 2026-04-23
  (Phase 5b item 4, Option E-prime-final) to introduce the 3-axis
  non-applicability gate after a 3-cycle pre-commit dispatch with 3
  evaluators per cycle (Codex CLI structural + Gemini CLI 2
  independent scholarly runs, all through /prompt-architect): the
  prior A/B/C/D cycle blocked unanimously on classical-taxonomy
  category errors (majmu is a structural composite not a fann;
  biographical_dictionary is an English alias for tarajim / parent of
  Genre.TABAQAT; rijal_dictionary is a nawʿ of tabaqat/tarikh/hadith);
  the Option E cycle blocked unanimously on DIM4 archival-genre
  regression (the reduced 2-value {mushaf, hadith_collection} set
  left existing archival Genres MASHYAKHAH / THABAT / BARNAMAJ
  silently level-applicable); the Option E-prime cycle returned
  unanimous AMEND_REQUIRED adding FAHRASAH as convergent scholarly
  guidance (same archival-reference class as mashyakhah / thabat /
  barnamaj) with Codex PROCEED_WITH_AMENDMENTS confirming structural
  soundness of the 6-value expansion. Axis 1 now enumerates six
  Genre members; Axis 2 adds the composite_work_type == "majmu"
  signal from IntakeDossier (REQ-SRC-0038); Axis 3 was deferred to
  Phase 5b item 23 (HadithSubgenre ARBAIN pedagogical carve-out)
  and is activated below.
  Amended on 2026-04-26 (Phase 5b item 23) to ACTIVATE Axis 3 with
  the conservative single-value carve-back set
  LEVELED_HADITH_SUBGENRES = {arbain}, with Path A semantics (default
  None subgenre fires Axis 3 — transmission-by-default per the
  *iḥtiyāṭ* / *tawaqquf* principle, Ibn Ḥajar *Nuzhat al-Naẓar*
  Bāb al-Khabar al-Maqbūl, al-Suyūṭī *Tadrīb al-Rāwī* Nawʿ 23).
  3-evaluator wave (Codex CLI structural + Gemini CLI 2 independent
  scholarly runs, all through /prompt-architect): 3-of-3 BLOCKED the
  original draft's plan to overload HadithSubgenre.ARBAIN as a
  generic pedagogical proxy for Bulūgh al-Marām and Riyāḍ al-Ṣāliḥīn
  (Codex CRITICAL DIM4 BLOCK + 2-of-2 Gemini CRITICAL DIM4 amend);
  3-of-3 PROCEEDED on Path A default (al-Kattānī *al-Risālah al-
  Mustaṭrafah* p. 69-72 *Kutub al-Arbaʿīniyyāt* + iḥtiyāṭ); 2-of-2
  Gemini AMEND on Arabic-anchor injection (كُتُب الرِّوَايَة into
  rejection error strings); Codex AMEND on queue-path regression
  tests + named-test strengthening (Axis 3 substring + hadith_subgenre
  pin). The Geminis' constructive proposal to introduce
  HadithSubgenre.AHKAM and MUKHTARAT enum values for famous
  pedagogical anthologies (Bulūgh al-Marām → AHKAM; Riyāḍ al-Ṣāliḥīn
  → MUKHTARAT, per al-Kattānī *al-Risālah al-Mustaṭrafah* p. 41/44
  *Kutub al-Aḥkām*) is deferred to NEW follow-up 34 — substantive
  contract-change scope beyond ARBAIN-only carve-back. New AC-5
  (ARBAIN positive — al-Arbaʿīn al-Nawawī accepts owner override)
  and AC-6 (MUSNAD negative — Musnad Aḥmad rejects with explicit
  Axis 3 citation) added. The "مصنف" → MUSANNAF inference extension
  bundled (Codex CRITICAL DIM4 fix). See follow-up items 21
  (FATAWA/MUJAM naming resolution), 22 (mawsūʿa/muʿjam/fihris
  non-applicable expansion), 24 (majmuʿ constituent-rasāʾil leveling
  architecture), and 34 (HadithSubgenre.AHKAM + MUKHTARAT enum
  addition for selected-hadith pedagogical anthologies).
  Amended on 2026-04-27 (Phase 5b follow-ups 25 + 26 paired closure)
  to EXTEND NON_APPLICABLE_GENRE_VALUES from six values to eight by
  adding ``mujam`` and ``tabaqat``, after a paired-PRELIMINARY-
  confirmation dispatch wave (Gemini CLI Run B scholarly + Codex CLI
  structural, both through /prompt-architect). Run B scholarly
  verdicts: FU-25 AMEND HIGH (Option A genre-level — disagreed with
  Run-A item4e's Option B sub-genre-only carve-out, on the basis that
  BOTH linguistic lexicons AND hadith muʿjam works share the same
  non-linear alphabetical-index reference architecture); FU-26
  CONFIRM HIGH (Option α genre-level — full convergence with Run-A
  item4eprime). Run B governing principle (own-words): a genre belongs
  in NON_APPLICABLE_GENRE_VALUES when its organizing architecture
  operates as a static repository of attestation, indexing, or
  archival documentation rather than a graduated didactic curriculum.
  Codex CLI structural reasoning (executable Python probes of
  ``_infer_genre`` outputs, ripgrep across all source-engine tests
  and fixtures, direct read of GenreDisputePosition contract):
  zero existing test ripple (no fixtures or override tests assert
  Genre.MUJAM or Genre.TABAQAT behavior); double-classification of
  hadith-muʿjam and hadith-ṭabaqāt titles is real but harmless
  because Axis 1 fires before Axis 3 for non-hadith_collection
  genres in ``_non_applicability_axis``; **Option B/β subgenre-only
  carve-out is structurally inadequate on the dispute path** because
  GenreDisputePosition (contracts.py:770) carries only
  ``genre_candidate``, not a hadith-subgenre candidate, so the
  override-queue's unanimous-nonapplicable branch can only adjudicate
  via ``genre_candidate ∈ NON_APPLICABLE_GENRE_VALUES``. The genre-
  level fix (Option A + Option α) was therefore the only
  architecturally complete path. Classical anchors: al-Kattānī,
  *al-Risālah al-Mustaṭrafah*, "Kutub al-Maʿājim" section (~p. 110+
  in Dār al-Bashāʾir ed.); al-Suyūṭī, *Tadrīb al-Rāwī*, Nawʿ 61
  (*Maʿrifat al-Ṭabaqāt*); Ibn Khallikān, *Wafayāt al-Aʿyān*,
  author's introduction; Ibn al-Nadīm, *al-Fihrist*. New AC-7
  (MUJAM positive — al-Muʿjam al-Kabīr li-l-Ṭabarānī rejects owner
  override on Genre.MUJAM Axis 1) and AC-8 (TABAQAT positive — al-
  Ṭabaqāt al-Kubrā li-Ibn Saʿd rejects owner override on
  Genre.TABAQAT Axis 1) added. Documented limitation: hadith-muʿjam
  and hadith-ṭabaqāt titles double-classify (Genre.MUJAM/TABAQAT +
  HadithSubgenre.MUJAM/TABAQAT_RIJAL fire simultaneously); under the
  Axis 1 firing on the genre, the redundant subgenre is harmless
  metadata. Documented latent gap: GenreDisputePosition carries no
  hadith-subgenre candidate; future need for subgenre-level dispute
  adjudication would require widening that contract — captured for
  potential future follow-up if/when the need surfaces.
  Amended on 2026-04-27 (Phase 5b follow-up 22 closure) to EXTEND
  NON_APPLICABLE_GENRE_VALUES from eight values to nine by adding
  ``mawsuah``, after a focused single-evaluator dispatch wave (Gemini
  CLI Run-B-style scholarly with anti-priming protocol — Step-1 first-
  principles commitment locked before Step-2 confrontation with prior
  runs — through /prompt-architect). 2-of-2 cross-time independent
  Gemini scholarly convergence: original Run-A item-4 DIM4 (2026-04-21)
  verdict CONFIRM = ADD, plus FU-22 paired-confirmation Run B
  (2026-04-27) verdict ADD high. Original Run-B AMEND (2026-04-21,
  raising classical-vs-modern anachronism risk on retroactive
  application of the modern term to classical works) explicitly
  reconciled: the structural fact that ``_infer_genre`` (deliberation.py
  :496-504) has no keyword trigger for "موسوعة" — the deterministic
  classifier never assigns Genre.MAWSUAH from a title; it can only
  enter the system through deliberate owner_metadata override or a
  future agent-layer classifier, where the assignment is deliberate
  precisely because the work *functions* as an encyclopedia. The
  modern Arabic loan موسوعة (mawsūʿa, 19th–20th-century calque of
  European *encyclopedia*) names comprehensive reference works
  arranged alphabetically or thematically for lookup, not sequential
  reading; classical functional analogues (Ibn al-Athīr's al-Nihāyah
  fī Gharīb al-Ḥadīth d. 606 AH; Ḥājī Khalīfa's Kashf al-Ẓunūn
  d. 1067 AH; Ibn al-Nadīm's al-Fihrist d. ~385 AH) share the same
  static-repository architecture. Governing inclusion principle
  (distilled from FU-25/26 Run-B verdicts): "a genre belongs in
  NON_APPLICABLE_GENRE_VALUES when its organizing architecture
  operates as a static repository of attestation, indexing, or
  archival documentation rather than a graduated didactic curriculum."
  Mawsūʿa satisfies all three branches — attestation (jāmiʿ-scale
  comprehensive compilation: al-Ṭabarī's Jāmiʿ al-Bayān, Ibn Rajab's
  Jāmiʿ al-ʿUlūm wa-l-Ḥikam), indexing (alphabetical organization),
  archival documentation (al-Khaṭīb al-Baghdādī's Tārīkh Baghdād).
  New AC-9 (MAWSUAH positive — al-Mawsūʿa al-Fiqhiyya al-Kuwaytiyya
  rejects owner override on Genre.MAWSUAH Axis 1) added. Documented
  limitation: hybrid works titled "موسوعة الناشئة" (youth encyclopedia)
  with internal pedagogical sequence are rare exceptions; the
  invariant correctly prioritizes the dominant architectural function.
  Open follow-ups remaining: 18, 21, 24, 27, 28, 34.
  Amended on 2026-04-27 (Phase 5b follow-up 34 closure) to ACTIVATE
  HadithSubgenre.AHKAM in the carve-back set, expanding LEVELED_HADITH_
  SUBGENRES from {arbain} to {arbain, ahkam}. 3-evaluator wave (Codex
  CLI structural + Gemini CLI 2 independent scholarly runs, all through
  /prompt-architect with RISEN + Step-Back + CAI Critique-Revise hybrid):
  2-of-2 Gemini scholarly convergence at HIGH confidence on ADD AHKAM
  (Run A AMEND_REQUIRED + Run B PROCEED, both demanding compound-
  keyword discipline) and on BLOCK MUKHTARAT (al-Ḍiyāʾ al-Maqdisī's
  *al-Aḥādīth al-Mukhtārah* d. 643 AH is primary transmission with full
  isnāds despite the name; *Mukhtārāt* is a cross-cutting descriptor not
  a standalone subgenre per al-Kattānī's bibliographic taxonomy).
  Codex CLI returned CRITICAL DIM5 BLOCK on the dispute-path latent gap
  (GenreDisputePosition carried only genre_candidate, so disputed
  hadith_collection works with leveled subgenres would auto-reject on
  Axis 1 alone), resolved by widening GenreDisputePosition with
  hadith_subgenre_candidate (contracts.py:820-826) and updating
  _resolve_disputed (override_queue.py:295-345) to consult the carve-
  back. DIM6 AMEND aligned migration._default_level_status with Axis 3
  membership (legacy hadith_collection payloads with leveled subgenres
  now default to pending_synthesis, not non_applicable_reference).
  AHKAM inference is restricted to compound-keyword patterns per Run A's
  S1.Q3 keyword-reliability ceiling and Run B's Q4a recommendation:
  6 ordered compound rules (بلوغ + المرام / عمدة + الأحكام / الإلمام +
  الأحكام / المنتقى + الأحكام / أدلة + الأحكام / أحاديث + الأحكام); bare
  أحكام is FORBIDDEN due to false-positive collisions with Aḥkām
  al-Qurʾān (al-Jaṣṣāṣ d. 370 AH — fiqh-tafsīr), al-Aḥkām al-Sulṭāniyyah
  (al-Māwardī d. 450 AH — siyāsah), al-Iḥkām fī Uṣūl al-Aḥkām (al-Āmidī
  d. 631 AH — Uṣūl al-Fiqh), and Iḥkām al-Aḥkām Sharḥ ʿUmdat al-Aḥkām
  (Ibn Daqīq al-ʿĪd d. 702 AH — sharḥ, not primary aḥkām collection).
  المحرر alone is also forbidden because it collides with al-Muḥarrar
  fī al-Fiqh (Majd al-Dīn Ibn Taymiyyah). The AHKAM compound rules are
  inserted AFTER the HADITH_COMMENTARY branch in _infer_hadith_subgenre
  so that a sharḥ on an aḥkām collection (e.g., Iḥkām al-Aḥkām Sharḥ
  ʿUmdat al-Aḥkām) is correctly tagged HADITH_COMMENTARY rather than
  AHKAM. Constructive Gemini Run-B proposals to also add HadithSubgenre.
  TARGHIB (Kutub al-Targhīb wa-l-Tarhīb per al-Kattānī p. 45),
  HadithSubgenre.MUKHTASAR (Kutub al-Mukhtaṣarāt), and HadithSubgenre.
  SHAMAIL (al-Shamāʾil al-Muḥammadiyyah of al-Tirmidhī d. 279 AH) were
  deferred to NEW follow-up 35 — substantive contract-change scope
  beyond FU-34's AHKAM + MUKHTARAT charter. New AC-10 (AHKAM positive
  — Bulūgh al-Marām accepts owner override), AC-11 (AHKAM
  scope-disambiguation negative — al-Muntaqā of Ibn al-Jārūd is
  transmission-style despite aḥkām theme, no compound rule fires), and
  AC-12 (AHKAM false-positive guard — al-Iḥkām fī Uṣūl al-Aḥkām of
  al-Āmidī inferred as None subgenre because no compound matches "Uṣūl
  al-Aḥkām" pattern) added. Open follow-ups remaining after FU-34
  closure: 18, 24, 27, 28, 35 (NEW).
  Amended on 2026-04-28 (Phase 5b follow-up 24 (a-lite) closure) to
  CLOSE the AC-3 / AC-4 deferred-promise ("Constituent-rasāʾil leveling
  is tracked as Phase 5b item 24" / "Individual-fatwa-level pedagogy
  remains tracked as Phase 5b item 24") via the hybrid-resolution path:
  the SubWorkInventoryEntry contract is widened with a per-constituent
  placeholder triple (level: Optional[WorkLevel] = None, level_status:
  LevelStatus = PENDING_SYNTHESIS, level_provenance: Optional[
  LevelProvenance] = None) plus a pair-consistency model_validator
  mirroring SourceMetadata invariants 1-2; ``IntakeDossier.sub_work_
  inventory`` propagates onto ``SourceMetadata.sub_work_inventory`` via
  ``_populate_deterministic_metadata`` so the constituent placeholder
  surface flows through the source→normalization handoff via the
  existing dispatcher ``model_copy(deep=True)`` (D-023). Container
  Axis 2 firing on ``composite_work_type=="majmu"`` REMAINS UNCHANGED;
  the placeholder surface is independent of the container's non-
  applicability gate. Source engine never WRITES per-constituent level
  (DEC-SRC-0003 — synthesis owns level writes). 4-evaluator dispatch
  wave was launched for FU-24 (Codex CLI structural + Gemini Run A
  scholarly + Gemini Run B scholarly + arabic-reviewer Anthropic Agent,
  all through /prompt-architect with RISEN + Step-Back + CAI Critique-
  Revise hybrid framework). Codex (a-lite) ISOMORPHIC at source-model
  level + NEW at first cross-engine boundary. Gemini Run A and Run B
  both recommended (a+b) HIGH at 2-of-2 cross-time independent scholarly
  convergence (classical anchors: al-Kattānī al-Risālah al-Mustaṭrafah
  on majmūʿāt + rasāʾil; Ibn Khaldūn Muqaddima Book VI on tadarruj /
  pedagogical progression; al-Zarnūjī Taʿlīm al-Mutaʿallim Ch. IV on
  tawaqquf in text selection). The arabic-reviewer Agent dispatch
  FAILED twice (Anthropic billing extra-usage cap + 600s stream
  watchdog stall); CC main-thread substituted with the structural
  cross-provider DIM-AR2 check (codebase fact-finding, objectively
  verifiable) and a non-independent scholarly framework alignment
  (with full disclosure of prior Gemini exposure). The substantive
  scholarly verdict (a+b) is converged 3-of-4 at HIGH but the cross-
  provider Anthropic-side check is methodologically incomplete.
  Hybrid-resolution chosen: implement (a-lite) NOW (boundary widening
  + placeholder surface; minimum scope; CRIT-1 cross-engine ripple
  MOOT because ``sub_work_inventory`` rides ``SourceMetadata`` through
  the dispatcher's existing ``model_copy(deep=True)``; CRIT-2 keyspace
  explosion MOOT because intake override stays single-keyed at source
  level; CRIT-3 legacy migration addressed via DEC-SRC-0021 rule
  (vii.a/b/c)) and OPEN NEW follow-up 37 to track the constituent-
  level owner-override-entrance widening (REQ-SRC-0047 entrance
  signature widened to per-constituent keying + PendingLevelOverride
  keyspace from source_id to (source_id, constituent_idx)) plus the
  arabic-reviewer Agent retroactive validation that failed this
  session. The Geminis' BLOCK on (a-lite) ("decisively incomplete")
  is honored by FU-37 carrying the obligation forward, NOT by silent
  denial. Owner UX gap is documented as known limitation pending
  FU-37. New AC-FU24-A added below capturing the constituent
  placeholder semantics. Open follow-ups remaining after FU-24
  closure: 18, 27, 28, 36, 37 (NEW).
created: '2026-04-16'
updated: '2026-04-28'
depends_on:
- DEC-SRC-0003
impacts:
- level_metadata
rationale: >-
  ChatGPT Deep Research dr-chatgpt-level-detection-20260416 (risk r5)
  identified that mushaf copies, hadith collections, and purely archival
  majmu' compilations resist the classical pedagogical trichotomy. (The
  original ChatGPT DR draft described the trichotomy as mubtadi /
  mutawassit / mutaqaddim; Gemini CLI R2 review corrected mutaqaddim to
  muntahī because mutaqaddim is a historiographic term for an earlier-
  generation scholar, not a pedagogical tier, and CON-SRC-0011 now pins
  the canonical enum as mubtadiʾ → mutawassiṭ → muntahī.) The Phase 5b
  item 4 pre-commit dispatch cycle (2026-04-22) refined non-applicability
  along two orthogonal axes: the FANN (science/form) axis — mushaf
  (revelation), hadith_collection (transmission), mashyakhah / thabat /
  barnamaj / fahrasah (archival attestation of teachers / licenses /
  curricula / catalogs) — and the STRUCTURE axis — composite works (majmuʿ)
  whose organizing principle is aggregation, not pedagogy. Forcing any
  CON-SRC-0011 level label onto a work that fires either axis creates
  false scholarly authority and misleads the owner about how to approach
  the text. The classical scholarly tradition (see al-Kattānī's
  al-Risālah al-Mustaṭrafah on archival genres) treats mashyakhah,
  thabat, barnamaj, and fahrasah as reference tools documenting
  transmission rather than pedagogical works to be read in graduated
  sequence.
rule:
  statement: >-
    For works where the reading-level concept does not apply, the source
    engine MUST serialize SourceMetadata.level as null regardless of any
    owner override attempt. Non-applicability fires along three axes, any
    of which is sufficient: Axis 1 (fann-level) — the work's Genre is one
    of the nine non-applicable members {mushaf, hadith_collection,
    mashyakhah, thabat, barnamaj, fahrasah, mujam, tabaqat, mawsuah};
    Axis 2 (structural) — the
    work's composite_work_type == "majmu" (a structural composite whose
    container-level pedagogy does not apply even when the declared Genre
    is otherwise leveled); Axis 3 (hadith-subgenre) — when Axis 1 fires
    for Genre.HADITH_COLLECTION, attribution is refined by hadith_subgenre.
    Subgenres in the carve-back set LEVELED_HADITH_SUBGENRES (currently
    {arbain, ahkam, targhib}) reverse the Axis 1 firing — the work is
    treated as a pedagogical hadith curriculum: ARBAIN covers al-Arbaʿīn
    al-Nawawī of al-Nawawī (d. 676 AH) and the broader arbaʿūniyyāt
    genre per al-Kattānī, al-Risālah al-Mustaṭrafah p. 69-72 Kutub
    al-Arbaʿīniyyāt; AHKAM covers selected-hadith pedagogical
    anthologies of legal evidences per al-Kattānī, al-Risālah
    al-Mustaṭrafah p. 41 Kutub al-Aḥkām (Bulūgh al-Marām min Adillat
    al-Aḥkām of Ibn Ḥajar d. 852 AH; ʿUmdat al-Aḥkām of ʿAbd al-Ghanī
    al-Maqdisī d. 600 AH; al-Muntaqā fī al-Aḥkām of Majd al-Dīn Ibn
    Taymiyyah d. 652 AH; al-Ilmām bi-Aḥādīth al-Aḥkām of Ibn Daqīq
    al-ʿĪd d. 702 AH); TARGHIB covers Kutub al-Targhīb wa-l-Tarhīb per
    al-Kattānī, al-Risālah al-Mustaṭrafah p. 45 (canonical anchor
    al-Targhīb wa-l-Tarhīb of al-Mundhirī d. 656 AH) plus Riyāḍ
    al-Ṣāliḥīn of al-Nawawī d. 676 AH classified under TARGHIB via
    the dedicated compound rule "رياض" + "الصالحين" closing the FU-34
    documented limitation. AHKAM was activated by Phase 5b follow-up
    34 (2026-04-27) after 2-of-2 cross-time independent Gemini
    scholarly convergence at HIGH confidence and Codex CRITICAL DIM5
    BLOCK resolution that widened GenreDisputePosition with
    hadith_subgenre_candidate to enable correct dispute-path
    adjudication. TARGHIB was activated by Phase 5b follow-up 35
    (2026-04-28) after 4-of-4 cross-provider evaluator convergence
    (Codex CLI structural ISOMORPHIC + Gemini Run A scholarly + Gemini
    Run B scholarly + arabic-reviewer Anthropic scholarly cross-
    provider, all through /prompt-architect with anti-priming Step-1/
    Step-2 protocol; 3-of-3 cross-provider scholarly verdict at HIGH
    confidence on every cell). The level applies to AHKAM and TARGHIB
    works. SHAMAIL is enum-recognized (Ḥājī Khalīfa, Kashf al-Ẓunūn
    2/1043 lists shamāʾil as a distinct fann; al-Kattānī recognizes
    Kutub al-Shamāʾil) but EXCLUDED from LEVELED_HADITH_SUBGENRES
    because its canonical anchor al-Shamāʾil al-Muḥammadiyyah of
    al-Tirmidhī (d. 279 AH) PRESERVES full transmission chains
    (cited isnād from "Bāb Mā Jāʾa fī Khātam al-Nubuwwah":
    حدثنا قتيبة بن سعيد، قال: حدثنا حاتم بن إسماعيل، عن الجعد بن
    عبد الرحمن، قال: سمعت السائب بن يزيد يقول...). Per the iḥtiyāṭ
    precautionary framework plus arabic-reviewer's compound BLOCK
    criterion (chain-preservation + absence of pedagogical muqaddimah
    + comprehensive-not-graduated organization), SHAMAIL hadith_
    collection works are correctly tagged but Axis 3 carve-back does
    NOT fire — owner override is REJECTED under Axis 1. MUKHTASAR
    was BLOCKED entirely (NOT added to enum) per 3-of-3 cross-provider
    scholarly verdict at HIGH: cross-cutting structural descriptor not
    a standalone hadith subgenre (Ḥājī Khalīfa lists mukhtaṣarāt under
    source works as derivatives, not in a dedicated chapter); the
    arabic-reviewer's structural cross-provider check additionally
    surfaced that KR already encodes mukhtaṣar at the Genre level
    (Genre.MUKHTASAR at contracts.py:145, mapped from keywords
    مختصر/خلاصة/تهذيب/تقريب/ملخص/وجيز in deliberation.py:55) — adding
    HadithSubgenre.MUKHTASAR would create semantic redundancy and the
    pre-condition early-exit at deliberation.py:537 would render any
    HadithSubgenre.MUKHTASAR rule unreachable for Genre.MUKHTASAR
    works. All other hadith subgenres
    — including null subgenre per Path A (transmission-by-default,
    iḥtiyāṭ / tawaqquf principle, Ibn Ḥajar Nuzhat al-Naẓar Bāb
    al-Khabar al-Maqbūl) — confirm Axis 1 firing under Axis 3 (the work
    is kutub al-riwāyah, transmission collection). Forcing a reading-
    level label onto an Axis-1 (post-carve-back), Axis-2, or Axis-3
    firing work creates false scholarly authority because its organizing
    principle is transmission, archival reference, or structural
    compilation, not graduated pedagogical exposition.
  implication: >-
    Violation means the library has attached a pedagogical-level label to
    a text whose scholarly form does not support that dimension. A mushaf
    labeled 'beginner', a hadith_collection labeled 'advanced', a
    mashyakhah / thabat / barnamaj / fahrasah labeled at any level, or a
    مجموع (majmuʿ) container labeled as though its contained rasāʾil were
    a single graduated work misrepresents the work's scholarly character
    and corrupts downstream synthesis, search, and owner-facing displays.
  violation_severity: high
acceptance_criteria:
- id: AC-1
  given: >-
    A source with SourceMetadata.genre="mushaf" submitted with
    owner_level_override="mubtadiʾ" (a valid CON-SRC-0011 WorkLevel
    enum value — the pre-malakah beginner tier). The override is
    well-formed per the enum whitelist, so the rejection below is
    driven by the genre being in the Axis 1 non-applicable set, not
