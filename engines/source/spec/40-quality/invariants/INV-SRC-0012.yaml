id: INV-SRC-0012
type: invariant
status: confirmed
title: Non-applicable genres require level null
topic: metadata
layer: quality
priority: high
confidence: high
provenance: deep_research
source: >-
  Initial formulation on 2026-04-16 from
  dr-reports/dr-chatgpt-level-detection-20260416.yaml (SEC-2).
  Amended on 2026-04-17 (Phase 5b item 2) to rewrite AC-1 through
  AC-4 in the CON-SRC-0011 classical WorkLevel vocabulary (mubtadiʾ,
  muntahī, mutawassiṭ, muntahī respectively). AC-4's "specialist"
  placeholder has no fourth-tier equivalent in the three-tier
  CON-SRC-0011 enum; "muntahī" is the semantic replacement preserving
  the topmost-tier-override rejection intent. Rule statement,
  rationale, implication, and violation_severity are unchanged. The
  non-applicable genre set listed in the rule statement still lags
  behind CON-SRC-0004's seven-value frozenset (four of seven values
  are not yet in the Genre enum — see NON_APPLICABLE_GENRE_VALUES in
  contracts.py); reconciliation is tracked as Phase 5b item 4.
created: '2026-04-16'
updated: '2026-04-17'
depends_on:
- DEC-SRC-0003
impacts:
- level_metadata
rationale: >-
  ChatGPT Deep Research dr-chatgpt-level-detection-20260416 (risk r5)
  identified that mushaf copies, hadith collections, rijal dictionaries, and
  purely archival majmu' compilations resist the classical pedagogical
  trichotomy. (The original ChatGPT DR draft described the trichotomy as
  mubtadi / mutawassit / mutaqaddim; Gemini CLI R2 review corrected
  mutaqaddim to muntahī because mutaqaddim is a historiographic term for
  an earlier-generation scholar, not a pedagogical tier, and CON-SRC-0011
  now pins the canonical enum as mubtadiʾ → mutawassiṭ → muntahī.) These
  non-applicable genres are organized around transmission, reference, or
  compilation rather than graduated pedagogical exposition, so forcing
  any CON-SRC-0011 level label onto them creates false scholarly authority
  and misleads the owner about how to approach the text.
rule:
  statement: >-
    For genres where the reading-level concept does not apply — mushaf,
    hadith_collection, rijal_dictionary, and majmu — the source engine MUST
    serialize SourceMetadata.level as null regardless of any owner override
    attempt. Forcing a reading-level label onto these genres creates false
    scholarly authority because their organizing principle is transmission,
    reference, or compilation, not graduated pedagogical exposition.
  implication: >-
    Violation means the library has attached a pedagogical-level label to a
    text whose scholarly form does not support that dimension. A mushaf labeled
    'beginner', a hadith_collection labeled 'advanced', a rijal_dictionary
    labeled 'intermediate', or a majmu labeled 'specialist' misrepresents the
    work's scholarly character and corrupts downstream synthesis, search, and
    owner-facing displays.
  violation_severity: high
acceptance_criteria:
- id: AC-1
  given: >-
    A source with SourceMetadata.genre="mushaf" submitted with
    owner_level_override="mubtadiʾ" (a valid CON-SRC-0011 WorkLevel
    enum value — the pre-malakah beginner tier). The override is
    well-formed per the enum whitelist, so the rejection below is
    driven by the genre being in the non-applicable set, not by enum
    validation.
  when: the source engine emits SourceMetadata
  then: SourceMetadata.level is null and SRC-E-LEVEL-OVERRIDE-NONAPPLICABLE is raised at the override boundary.
  test_type: deterministic
- id: AC-2
  given: >-
    tests/fixtures/shamela_real/04_hadith/book.htm classified as
    SourceMetadata.genre="hadith_collection" and submitted with
    owner_level_override="muntahī" (a valid CON-SRC-0011 WorkLevel
    enum value — the terminal / curriculum-completing tier that the
    earlier English placeholder "advanced" mapped to).
  when: the source engine emits SourceMetadata
  then: SourceMetadata.level is null and SRC-E-LEVEL-OVERRIDE-NONAPPLICABLE is raised at the override boundary.
  test_type: deterministic
- id: AC-3
  given: >-
    A source classified as SourceMetadata.genre="rijal_dictionary"
    (for example a tabaqat-style narrator dictionary) submitted with
    owner_level_override="mutawassiṭ" (a valid CON-SRC-0011 WorkLevel
    enum value — the foundational-malakah intermediate tier).
  when: the source engine emits SourceMetadata
  then: SourceMetadata.level is null and SRC-E-LEVEL-OVERRIDE-NONAPPLICABLE is raised at the override boundary.
  test_type: deterministic
- id: AC-4
  given: >-
    A source whose intake dossier sets composite_work_type="majmu"
    (for example "مجموع فتاوى ابن تيمية") with
    SourceMetadata.genre="majmu" submitted with
    owner_level_override="muntahī" (a valid CON-SRC-0011 WorkLevel
    enum value). The earlier English placeholder for this AC was
    "specialist" — a fourth pedagogical tier that does not exist in
    the three-tier CON-SRC-0011 ladder (mubtadiʾ → mutawassiṭ →
    muntahī). "muntahī" is chosen as the semantic substitute because
    the AC's purpose is to verify non-applicable-genre rejection
    under a topmost-tier override, and muntahī is the topmost tier
    the enum admits.
  when: the source engine emits SourceMetadata
  then: SourceMetadata.level is null and SRC-E-LEVEL-OVERRIDE-NONAPPLICABLE is raised at the override boundary.
  test_type: deterministic
