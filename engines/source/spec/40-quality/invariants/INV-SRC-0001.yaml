id: INV-SRC-0001
type: invariant
status: proposed
title: Owner hints never bias inference
topic: acquisition
layer: quality
priority: critical
confidence: high
provenance: owner_interview
source: Derived from OF-SRC-0002 and OF-SRC-0005; amended per contract-architect-review.yaml
created: '2026-04-14'
updated: '2026-04-14'
depends_on:
- OF-SRC-0002
- OF-SRC-0005
- DEC-SRC-0001
impacts:
- inference_order
- hint_handling
rule:
  statement: Hint comparison may inspect only inferred_metadata.author_name, inferred_metadata.genre, and inferred_metadata.science_scope after base inference finishes.
  implication: hint_comparison_audit must record stage=post_inference and compared_fields=["author_name", "genre", "science_scope"] before any hint affects confidence fields.
  violation_severity: critical
acceptance_criteria:
- id: AC-1
  given: tests/fixtures/shamela_real/06_usul/book.htm processed once with owner_hint_payload.author_name="النووي" and once without hints
  when: base inference completes for both runs
  then: inferred_metadata.author_name, inferred_metadata.genre, and inferred_metadata.science_scope are identical across both runs and hint_comparison_audit.stage="post_inference".
  test_type: deterministic
