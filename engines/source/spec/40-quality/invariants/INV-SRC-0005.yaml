id: INV-SRC-0005
type: invariant
status: confirmed
title: Muhaqiq never gates trust decisions
topic: trust
layer: quality
priority: high
confidence: high
provenance: owner_interview
source: Derived from OF-SRC-0010
created: '2026-04-14'
updated: '2026-04-14'
depends_on:
- OF-SRC-0010
- DEC-SRC-0005
impacts:
- muhaqiq_metadata
- trust_separation
rule:
  statement: Muhaqiq standing may annotate parsing confidence, but it may never reject a source or block trust_decision finalization.
  implication: Unknown or low muhaqiq standing leaves source admission intact while trust_decision still completes.
  violation_severity: high
acceptance_criteria:
- id: AC-1
  given: A source with muhaqiq_assessment.standing_level="unknown"
  when: trust evaluation executes
  then: trust_decision is still emitted and source admission is not rejected.
  test_type: deterministic
