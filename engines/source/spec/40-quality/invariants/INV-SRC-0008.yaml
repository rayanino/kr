id: INV-SRC-0008
type: invariant
status: proposed
title: PDF-derived text is never silently trusted at source handoff
topic: trust
layer: quality
priority: critical
confidence: high
provenance: domain_inference
source: Added from reference/pdf_fixture_observations_2026-04-14.md and the 2026-04-14 architecture decision that normalization owns PDF-to-text conversion
created: '2026-04-14'
updated: '2026-04-14'
depends_on:
- REQ-SRC-0022
impacts:
- pdf_handoff_trust
- downstream_confidence_propagation
rule:
  statement: No PDF-derived text may be treated as normalized source text by the source engine; every PDF handoff must carry source_metadata.pdf_text_layer_status and source_metadata.normalization_route=pdf_ocr_primary.
  implication: Every PDF-derived handoff forwarded to normalization preserves the text-layer verdict as provenance, routes through OCR-primary normalization, and keeps any direct-extraction samples diagnostic only.
  violation_severity: critical
acceptance_criteria:
- id: AC-1
  given: tests/fixtures/waraqat_usul/waraqat.pdf
  when: SourceMetadata is finalized
  then: source_metadata.source_format="pdf", source_metadata.pdf_text_layer_status="corrupt", source_metadata.normalization_route="pdf_ocr_primary", and the handoff contains no normalized_text field.
  test_type: integration
- id: AC-2
  given: A temporary PDF generated during the test run with one Arabic page containing clean embedded text
  when: SourceMetadata is finalized
  then: source_metadata.source_format="pdf", source_metadata.pdf_text_layer_status="clean", source_metadata.normalization_route="pdf_ocr_primary", and the handoff contains no normalized_text field.
  test_type: integration
