id: CON-SRC-0004
type: constraint
status: proposed
title: Complete SourceMetadata output schema
topic: handoff
priority: critical
confidence: high
provenance: coworker_review
source: Added from adversary-review.yaml ADV-002; amended per reference/pdf_fixture_observations_2026-04-14.md and the 2026-04-14 architecture decision that normalization owns PDF-to-text conversion
created: "2026-04-14"
updated: "2026-04-14"
depends_on: []
impacts:
  - source_metadata
  - downstream_contracts
rule:
  statement: Every successful intake emits one SourceMetadata record with non-null mandatory fields source_id, source_sha256, frozen_blob_path, registry_entry_id, title_arabic, author_output, genre, science_scope, is_multi_layer, structural_format, trust_decision, volume_count, and intake_timestamp; author_output must always contain status and positions.
  implication: Any successful intake missing one mandatory field, emitting null for one mandatory field, or naming a conflicting SourceMetadata shape violates the handoff contract; optional fields may appear as muhaqiq_output, death_date_hijri, level, edition_info, publisher, text_fidelity, hint_comparison_results, source_format in {shamela_html, pdf, plain_text}, normalization_route in {html_parse_primary, pdf_ocr_primary, plain_text_parse}, pdf_text_layer_status in {absent, corrupt, clean}, page_count_physical, and page_layout_hint in {single_column, dual_column, marginal_notes, mixed}.
  violation_severity: critical
acceptance_criteria:
  - id: AC-1
    given: Any successfully intaken source
    when: intake completes
    then: The emitted SourceMetadata record contains all mandatory fields with non-null values, author_output.status is non-null, and author_output.positions is present.
    test_type: integration
  - id: AC-2
    given: tests/fixtures/waraqat_usul/waraqat.pdf
    when: PDF intake completes
    then: The emitted SourceMetadata record may include source_format="pdf", normalization_route="pdf_ocr_primary", pdf_text_layer_status="corrupt", page_layout_hint, and page_count_physical without violating the output contract.
    test_type: integration
