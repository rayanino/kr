id: CON-SRC-0001
type: constraint
status: confirmed
title: Shamela HTML is the only production format
topic: acquisition
priority: high
confidence: high
provenance: owner_interview
source: Derived from OF-SRC-0001
created: "2026-04-14"
updated: "2026-04-14"
depends_on:
  - OF-SRC-0001
impacts:
  - format_detection
  - intake_scope
rule:
  statement: The production collection is the existing ~2,519 Shamela HTML books, and no other format is currently in production scope.
  implication: Plain text may remain a worst-case test format, but production intake rules are calibrated first for Shamela HTML.
  violation_severity: high
acceptance_criteria:
  - id: AC-1
    given: A production book from the active collection.
    when: Intake format detection runs.
    then: The source is recognized as Shamela HTML rather than a generic fallback format.
    test_type: integration
  - id: AC-2
    given: A plain-text stress-test fixture.
    when: Non-production testing runs.
    then: The fixture is treated as a worst-case test input rather than a production format expansion.
    test_type: deterministic

