id: CON-SRC-0001
type: constraint
status: confirmed
title: Shamela HTML is the only production format
topic: acquisition
priority: high
confidence: high
provenance: owner_interview
source: Derived from OF-SRC-0001
created: "2026-04-14"
updated: "2026-04-14"
depends_on:
  - OF-SRC-0001
impacts:
  - format_detection
  - intake_scope
rule:
  statement: The production collection is the existing Shamela HTML library, and no other format is in production scope for source intake.
  implication: Non-Shamela fixtures may be used only for stress testing and must not silently expand production format scope.
  violation_severity: high
acceptance_criteria:
  - id: AC-1
    given: tests/fixtures/shamela_real/03_fiqh/book.htm
    when: intake format detection executes
    then: source_format="shamela_html".
    test_type: integration
  - id: AC-2
    given: tests/fixtures/alfiyyah_versified/alfiyyah.txt
    when: non-production source testing executes
    then: source_format="plain_text" and production_scope=false.
    test_type: deterministic
