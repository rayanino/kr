strongest_local_reason_for_final_questionnaire_choice: Numbering must not decide excerpting;
  content and function do, which makes C the strongest owner-faithful answer.
highest_risk_numbering_mistake: Treating bullet/list status as a primary split or
  merge rule.
highest_risk_function_flattening_mistake: Reducing multi-function points to a single
  role and a single placement.
highest_risk_reassurance_failure: Extracting point 2 without enough surrounding reassurance
  about its relation to neighboring points and the list introduction.
highest_risk_books_vs_library_failure: Building a library that feels like chopped
  book fragments and therefore offers too little reason to choose it over books.
most_important_packaging_insight: A point and its attached explanation often need
  to stay together, even if other points from the same list split apart.
most_important_placement_insight: Multiple functions can justify multiple placements,
  but only when grounded in content rather than formatting.
