  item_text: keeping the exact original text untouched
  owner_rank: 2
  rank_status: solid
  role_type: hard_constraint
  why_this_rank: Violating it causes false attribution and catastrophic corruption, but the system still exists for the higher purpose of producing study-worthy teaching units.
